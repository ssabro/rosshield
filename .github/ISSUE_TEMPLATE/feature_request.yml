name: 💡 Feature Request
description: Lodestar에 새 기능 또는 개선을 제안합니다.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        새 기능 제안에 감사드립니다. 본 프로젝트는 설계 원칙([docs/design/01-principles.md](https://github.com/ssabro/rosshield/blob/main/docs/design/01-principles.md))과 비목표([docs/design/12-migration-and-non-goals.md](https://github.com/ssabro/rosshield/blob/main/docs/design/12-migration-and-non-goals.md) §12.7)를 먼저 읽어주시면 토론이 빨라집니다.

  - type: textarea
    id: problem
    attributes:
      label: 사용자 가치 — 해결하려는 문제
      description: "어떤 사용자가 어떤 상황에서 어떤 어려움을 겪고 있나요?"
      placeholder: "예: 운영자가 fleet 내 30대 robot의 ROS2 SROS2 설정을 일괄 검사하려는데 현재는 robot당 SSH 접속 필요"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 — 어떻게 해결?
      description: "구현 방향(UI · CLI · API · pack 등) + 사용자 경험"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 검토
      description: "다른 해결 방법은? 왜 제안한 방법이 더 나은가?"

  - type: textarea
    id: design-impact
    attributes:
      label: 설계 영향
      description: |
        - 어떤 설계서(`docs/design/*.md`) 갱신이 필요한가?
        - 설계 원칙 12개 중 어느 것에 영향?
        - 도메인 경계 · 멀티테넌시 · audit chain · LLM 옵트인 영향?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 범위
      options:
        - 코어 (Apache-2.0)
        - Enterprise (BSL 1.1, internal/enterprise/*)
        - Pack (packs/*)
        - 둘 다 (코어 + Enterprise)
        - 확실하지 않음
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 사전 점검
      options:
        - label: 설계 원칙 12개([01-principles.md](https://github.com/ssabro/rosshield/blob/main/docs/design/01-principles.md))와 충돌하지 않음
          required: true
        - label: 비목표([12 §12.7](https://github.com/ssabro/rosshield/blob/main/docs/design/12-migration-and-non-goals.md))에 해당하지 않음 (예: 자율 공격 · 자체 HW · LLM 필수 경로 등)
          required: true
        - label: 기존 issue · discussion 검색했음
          required: true
