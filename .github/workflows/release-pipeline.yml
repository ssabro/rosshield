name: Release Build

# rosshield release pipeline (E26 Phase 4).
#
# Trigger:
#   - tag push v*.*.* (자동)
#   - workflow_dispatch (수동, ref=v* 권장)
#
# 산출:
#   - 5 platform × 3 binary = 15 artifact (rosshield-server·rosshield·rosshield-audit-verify)
#   - 각 binary cosign keyless 서명 (.sig + .cert) — Sigstore Rekor public log
#   - SBOM (syft) SPDX JSON 1건
#   - GitHub Release 자동 게시 + checksums.sha256 + cosign verify 절차 README
#
# 외부 검증 (R30-4 — private repo + binary verify):
#   cosign verify-blob \
#     --certificate <binary>.cert \
#     --signature <binary>.sig \
#     --certificate-identity-regexp 'https://github.com/ssabro/rosshield/.github/workflows/release.yml@refs/tags/.*' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     <binary>

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      ref:
        description: '빌드할 ref (예: v0.2.0). 비우면 dispatch ref 사용.'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write
  packages: read

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ''
          - os: linux
            arch: arm64
            ext: ''
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''
          - os: windows
            arch: amd64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web (produces internal/web/dist for embed)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode release pack signer key (ROSSHIELD_PACK_SIGNER_KEY → raw 64B)
        env:
          PACK_SIGNER_KEY_B64: ${{ secrets.ROSSHIELD_PACK_SIGNER_KEY }}
        run: |
          set -e
          if [ -z "$PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::ROSSHIELD_PACK_SIGNER_KEY secret not set — falling back to dev signer (release binary will trust dev pubkey only)"
            # Fallback: 본 repo에 commit된 dev signer 키는 .gitignore라 워크플로우에서 직접 사용 불가.
            # release secret 미설정 시 임시 dev signer 새로 생성 + dev pubkey가 binary에 embed된 trust bundle과 매칭.
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
            # WARNING: 이 keygen은 매 release run마다 새 키 → dev pubkey 상수와 mismatch
            # → seed loader가 dev trust 시도 실패 후 release trust로 fallback할 것 (release secret 없는 한 그것도 실패)
            # → 결과: built-in pack 0개로 부팅 (degraded mode). 사용자가 secret 등록하면 production 동작.
            echo "::warning::No release secret + dev signer fresh-generated → built-in pack will fail signature verification at first boot. Set ROSSHIELD_PACK_SIGNER_KEY for production builds."
          else
            mkdir -p scripts
            # base64로 등록된 secret을 raw 64B 파일로 decode.
            echo "$PACK_SIGNER_KEY_B64" | base64 -d > scripts/release-pack-signer.key
            chmod 600 scripts/release-pack-signer.key
            # KEY 사이즈 검증 (raw 64B ed25519).
            SIZE=$(wc -c < scripts/release-pack-signer.key)
            if [ "$SIZE" != "64" ]; then
              echo "::error::release pack signer key has size $SIZE, want 64 bytes (raw Ed25519 private key)"
              exit 1
            fi
            echo "Release signer key decoded ($SIZE bytes)."
          fi

      - name: Build built-in pack archives (E12 Stage E)
        env:
          DEV_PACK_SIGNER_KEY: scripts/release-pack-signer.key
        run: |
          set -e
          # release secret이 있으면 그 키로, 없으면 fallback dev key로.
          if [ ! -f scripts/release-pack-signer.key ]; then
            export DEV_PACK_SIGNER_KEY=scripts/dev-pack-signer.key
          fi
          make pack-archive
          ls -la internal/builtin/packs/_archives/

      - name: Resolve build metadata
        id: meta
        run: |
          set -e
          # tag push면 GITHUB_REF_NAME=v*.*.*, dispatch면 inputs.ref 또는 ref_name
          VERSION="${{ inputs.ref }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=${VERSION}, commit=$(git rev-parse --short HEAD)"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          set -e
          mkdir -p dist
          LDFLAGS="-s -w \
            -X main.Version=${{ steps.meta.outputs.version }} \
            -X main.BuildCommit=${{ steps.meta.outputs.commit }} \
            -X main.BuildTime=${{ steps.meta.outputs.build_time }}"
          SUFFIX="${{ steps.meta.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

          go build -trimpath -ldflags "$LDFLAGS" -o "dist/rosshield-server-${SUFFIX}" ./cmd/rosshield-server
          go build -trimpath -ldflags "$LDFLAGS" -o "dist/rosshield-${SUFFIX}" ./cmd/rosshield
          go build -trimpath -ldflags "$LDFLAGS" -o "dist/rosshield-audit-verify-${SUFFIX}" ./cmd/rosshield-audit-verify

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign binaries with cosign keyless
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -e
          for f in dist/*; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.cert" \
              "$f"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: rosshield-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: rosshield-sbom.spdx.json
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: tag
        run: |
          set -e
          TAG="${{ inputs.ref }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Flatten artifacts + checksums
        run: |
          set -e
          mkdir -p release
          find artifacts -type f \( -name 'rosshield*' -o -name '*.sig' -o -name '*.cert' \) -exec cp {} release/ \;
          cp artifacts/sbom/rosshield-sbom.spdx.json release/ || true
          (cd release && sha256sum rosshield-* > checksums.sha256)
          ls -la release/

      - name: Write release notes
        run: |
          set -e
          cat > release-notes.md <<EOF
          Release ${{ steps.tag.outputs.tag }}.

          ## 검증

          See README "Release 검증" 섹션:
          - cosign verify-blob (Sigstore Rekor public log)
          - sha256sum -c checksums.sha256
          - ./rosshield version (commit·built·go 메타)
          - ./rosshield-audit-verify --bundle <report.tar.gz>

          상세는 https://github.com/ssabro/rosshield/blob/main/README.md 참조.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "rosshield ${{ steps.tag.outputs.tag }}" \
            --notes-file release-notes.md \
            release/*
