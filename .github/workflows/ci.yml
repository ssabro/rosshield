name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Tidy check
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum 2>/dev/null; then
            echo "::error::go.mod/go.sum drift — run 'go mod tidy'"
            git diff -- go.mod go.sum
            exit 1
          fi

      # E12 — built-in pack archive는 .gitignore라 fresh clone에 없음.
      # //go:embed _archives/*.tar.gz 패턴이 vet 단계에서 실패 → archive 사전 build.
      # Secret DEV_PACK_SIGNER_KEY_B64 (base64 인코딩 64B raw Ed25519 private key) 우선.
      # Secret 미설정 시 fallback keygen — vet/build PASS는 보장하나 InstallPack Verify는
      # embed.go DevSignerPublicKeyHex const와 mismatch로 fail 가능.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key (DEV_PACK_SIGNER_KEY_B64 → raw 64B)
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::DEV_PACK_SIGNER_KEY_B64 secret not set — falling back to fresh keygen (built-in pack Verify will mismatch embed.go DevSignerPublicKeyHex const)"
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
            SIZE=$(wc -c < scripts/dev-pack-signer.key)
            if [ "$SIZE" != "64" ]; then
              echo "::error::dev pack signer key has size $SIZE, want 64 bytes (raw Ed25519 private key)"
              exit 1
            fi
            echo "Dev signer key decoded ($SIZE bytes)."
          fi

      - name: Build built-in pack archives (populates internal/builtin/packs/_archives/)
        run: make pack-archive

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        # -timeout=20m — default 10m은 cmd/rosshield-server (race + 19 test 파일 +
        # 88 t.Parallel + sshpool/scanrun e2e + intake_e2e_test 492줄 결합)가 일관 초과.
        run: go test -race -count=1 -timeout=20m ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=3m

  web:
    name: Web tsc, vitest, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (vite build + tsc -b --noEmit)
        run: pnpm build

      - name: Vitest
        run: pnpm exec vitest run

  go-enterprise:
    name: Go build·test (enterprise build tag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # embed.go _archives/*.tar.gz는 .gitignore — vet 전 archive 빌드 필수.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key (DEV_PACK_SIGNER_KEY_B64 → raw 64B)
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::DEV_PACK_SIGNER_KEY_B64 secret not set — falling back to fresh keygen"
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
          fi

      - name: Build built-in pack archives
        run: make pack-archive

      - name: Vet (enterprise)
        run: go vet -tags rosshield_enterprise ./...

      - name: Build (enterprise)
        run: go build -tags rosshield_enterprise ./...

      - name: Test (enterprise)
        # -timeout=20m — go job과 동일 사유 (cmd/rosshield-server 600s 일관 초과).
        run: go test -tags rosshield_enterprise -race -count=1 -timeout=20m ./...

  pg-integration:
    name: PG integration (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # embed.go _archives/*.tar.gz는 .gitignore — go test의 import 그래프가
      # internal/builtin/packs를 끌어들이면 fail. 사전 archive build.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key (DEV_PACK_SIGNER_KEY_B64 → raw 64B)
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::DEV_PACK_SIGNER_KEY_B64 secret not set — falling back to fresh keygen"
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
          fi

      - name: Build built-in pack archives
        run: make pack-archive

      - name: Run PG integration tests
        # TESTCONTAINERS_RYUK_DISABLED=true — GitHub Actions runner에서 Reaper(Ryuk)
        # connect가 8분 hang (chan receive, testcontainers-go reaper.go:535). Ryuk은
        # leaked container cleanup용이지만 GitHub Actions는 job 종료 시 runner 정리되어
        # 의미 0. ha 패키지 480s timeout 원인.
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test -tags=integration -count=1 -timeout=8m ./internal/platform/storage/postgres/... ./internal/platform/ha/...

  cis-synth-integration:
    name: CIS converter synth bash regression
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # bash는 ubuntu-latest에 기본 가용 (GNU bash 5.x). resolveBash가 PATH lookup.
      - name: Run CIS synth integration tests
        run: go test -tags=cis_synth_integration -count=1 -timeout=4m -v ./cmd/pack-tools/converter/

  tpm-integration:
    name: TPM integration (go-tpm-tools simulator)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # go-tpm-tools/simulator는 ms-tpm-20-ref C 라이브러리 + OpenSSL 헤더에
      # cgo로 link합니다. swtpm 데몬은 불필요 (in-process simulator).
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Run TPM integration tests (simulator)
        env:
          CGO_ENABLED: '1'
        run: go test -tags=tpm_integration -count=1 -timeout=4m ./internal/platform/keystore/tpm/...

  e2e:
    name: Playwright E2E (smoke)
    needs: [go, web]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # embed.go _archives/*.tar.gz는 .gitignore — go binary 빌드 전 archive 사전 빌드.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key (DEV_PACK_SIGNER_KEY_B64 → raw 64B)
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::DEV_PACK_SIGNER_KEY_B64 secret not set — falling back to fresh keygen"
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
          fi

      - name: Build built-in pack archives
        run: make pack-archive

      - name: Install (web)
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web (produces internal/web/dist)
        working-directory: web
        run: pnpm build

      - name: Install Playwright browsers (chromium)
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: pnpm exec playwright test
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: web/playwright/test-results
          retention-days: 14
          if-no-files-found: ignore
