name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Tidy check
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum 2>/dev/null; then
            echo "::error::go.mod/go.sum drift вҖ” run 'go mod tidy'"
            git diff -- go.mod go.sum
            exit 1
          fi

      # E12 вҖ” built-in pack archiveлҠ” .gitignoreлқј fresh cloneм—җ м—ҶмқҢ.
      # //go:embed _archives/*.tar.gz нҢЁн„ҙмқҙ vet лӢЁкі„м—җм„ң мӢӨнҢЁ вҶ’ archive мӮ¬м „ build.
      # Secret DEV_PACK_SIGNER_KEY_B64 (base64 мқёмҪ”л”© 64B raw Ed25519 private key) мҡ°м„ .
      # Secret лҜём„Өм • мӢң fallback keygen вҖ” vet/build PASSлҠ” ліҙмһҘн•ҳлӮҳ InstallPack VerifyлҠ”
      # embed.go DevSignerPublicKeyHex constмҷҖ mismatchлЎң fail к°ҖлҠҘ.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key (DEV_PACK_SIGNER_KEY_B64 вҶ’ raw 64B)
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::DEV_PACK_SIGNER_KEY_B64 secret not set вҖ” falling back to fresh keygen (built-in pack Verify will mismatch embed.go DevSignerPublicKeyHex const)"
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
            SIZE=$(wc -c < scripts/dev-pack-signer.key)
            if [ "$SIZE" != "64" ]; then
              echo "::error::dev pack signer key has size $SIZE, want 64 bytes (raw Ed25519 private key)"
              exit 1
            fi
            echo "Dev signer key decoded ($SIZE bytes)."
          fi

      - name: Build built-in pack archives (populates internal/builtin/packs/_archives/)
        run: make pack-archive

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        # -timeout=20m вҖ” default 10mмқҖ cmd/rosshield-server (race + 19 test нҢҢмқј +
        # 88 t.Parallel + sshpool/scanrun e2e + intake_e2e_test 492мӨ„ кІ°н•©)к°Җ мқјкҙҖ мҙҲкіј.
        run: go test -race -count=1 -timeout=20m ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=3m

  web:
    name: Web tsc, vitest, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (vite build + tsc -b --noEmit)
        run: pnpm build

      - name: Vitest
        run: pnpm exec vitest run

  go-enterprise:
    name: Go buildВ·test (enterprise build tag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # embed.go _archives/*.tar.gzлҠ” .gitignore вҖ” vet м „ archive л№Ңл“ң н•„мҲҳ.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key (DEV_PACK_SIGNER_KEY_B64 вҶ’ raw 64B)
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::DEV_PACK_SIGNER_KEY_B64 secret not set вҖ” falling back to fresh keygen"
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
          fi

      - name: Build built-in pack archives
        run: make pack-archive

      - name: Vet (enterprise)
        run: go vet -tags rosshield_enterprise ./...

      - name: Build (enterprise)
        run: go build -tags rosshield_enterprise ./...

      - name: Test (enterprise)
        # -timeout=20m вҖ” go jobкіј лҸҷмқј мӮ¬мң  (cmd/rosshield-server 600s мқјкҙҖ мҙҲкіј).
        run: go test -tags rosshield_enterprise -race -count=1 -timeout=20m ./...

  pg-integration:
    name: PG integration (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # embed.go _archives/*.tar.gzлҠ” .gitignore вҖ” go testмқҳ import к·ёлһҳн”„к°Җ
      # internal/builtin/packsлҘј лҒҢм–ҙл“Өмқҙл©ҙ fail. мӮ¬м „ archive build.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key (DEV_PACK_SIGNER_KEY_B64 вҶ’ raw 64B)
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::DEV_PACK_SIGNER_KEY_B64 secret not set вҖ” falling back to fresh keygen"
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
          fi

      - name: Build built-in pack archives
        run: make pack-archive

      - name: Run PG integration tests
        # TESTCONTAINERS_RYUK_DISABLED=true вҖ” GitHub Actions runnerм—җм„ң Reaper(Ryuk)
        # connectк°Җ 8л¶„ hang (chan receive, testcontainers-go reaper.go:535). RyukмқҖ
        # leaked container cleanupмҡ©мқҙм§Җл§Ң GitHub ActionsлҠ” job мў…лЈҢ мӢң runner м •лҰ¬лҗҳм–ҙ
        # мқҳлҜё 0. ha нҢЁнӮӨм§Җ 480s timeout мӣҗмқё.
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test -tags=integration -count=1 -timeout=8m ./internal/platform/storage/postgres/... ./internal/platform/ha/...

  minio-integration:
    name: MinIO S3 backend integration (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # embed.go _archives/*.tar.gz fixture вҖ” pg-integration jobкіј лҸҷмқј нҢЁн„ҙ.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
          fi

      - name: Build built-in pack archives
        run: make pack-archive

      - name: Run MinIO integration tests
        # S3BackendлҠ” enterprise build tag, MinIO containerлҠ” integration tag.
        # RyukмқҖ GitHub Actions runnerм—җм„ң hang мң„н—ҳ вҶ’ disable (pg-integrationкіј лҸҷмқј).
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test -tags="rosshield_enterprise integration" -count=1 -timeout=8m -run MinIO ./internal/domain/audit/rotation/...

  cis-synth-integration:
    name: CIS converter synth bash regression
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # bashлҠ” ubuntu-latestм—җ кё°ліё к°Җмҡ© (GNU bash 5.x). resolveBashк°Җ PATH lookup.
      - name: Run CIS synth integration tests
        run: go test -tags=cis_synth_integration -count=1 -timeout=4m -v ./cmd/pack-tools/converter/

  tpm-integration:
    name: TPM integration (go-tpm-tools simulator)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # go-tpm-tools/simulatorлҠ” ms-tpm-20-ref C лқјмқҙлёҢлҹ¬лҰ¬ + OpenSSL н—ӨлҚ”м—җ
      # cgoлЎң linkн•©лӢҲлӢӨ. swtpm лҚ°лӘ¬мқҖ л¶Ҳн•„мҡ” (in-process simulator).
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Run TPM integration tests (simulator)
        # robotid quote_simulator_test.goлҠ” `rosshield_enterprise` л№Ңл“ң нғңк·ё
        # н•Ёк»ҳ н•„мҡ” вҖ” кІ°н•© tagлЎң н•ң лІҲм—җ мӢӨн–ү. keystore/tpmмқҖ enterprise tag
        # л¬ҙкҙҖ(нҢҢмқј build м Ҳмқҙ `linux && tpm_integration`л§Ң)мқҙлқј мҳҒн–Ҙ м—ҶмқҢ.
        env:
          CGO_ENABLED: '1'
        run: go test -tags="tpm_integration rosshield_enterprise" -count=1 -timeout=4m ./internal/platform/keystore/tpm/... ./internal/enterprise/robotid/...

  cosign-e2e:
    name: Cosign keyless e2e (sign + verify)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GitHub Actions OIDC tokenмқҙ н•„мҡ” вҖ” cosign keylessк°Җ token.actions.githubusercontent.com
    # issuerлЎң ambient identityлҘј fetchн•ҙ Fulcioм—җ лӢЁкё° мқёмҰқм„ң л°ңкёү мҡ”мІӯ.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: sigstore/cosign-installer@v3

      - name: Run cosign keyless e2e test
        # cosignмқҙ ACTIONS_ID_TOKEN_REQUEST_TOKEN/_URL envлҘј мһҗлҸҷ к°җм§Җн•ҳм—¬
        # OIDC token fetch вҶ’ Fulcio мқёмҰқм„ң л°ңкёү вҶ’ Rekor л“ұлЎқ.
        # identityлҠ” GITHUB_REPOSITORY_OWNER кё°л°ҳ regex.
        run: go test -tags=cosign_e2e -count=1 -timeout=8m ./internal/domain/audit/rotation/...

  e2e:
    name: Playwright E2E (smoke)
    needs: [go, web]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # embed.go _archives/*.tar.gzлҠ” .gitignore вҖ” go binary л№Ңл“ң м „ archive мӮ¬м „ л№Ңл“ң.
      - name: Build pack-tools (E12)
        run: go build -o bin/pack-tools ./cmd/pack-tools

      - name: Decode dev pack signer key (DEV_PACK_SIGNER_KEY_B64 вҶ’ raw 64B)
        env:
          DEV_PACK_SIGNER_KEY_B64: ${{ secrets.DEV_PACK_SIGNER_KEY_B64 }}
        run: |
          set -e
          if [ -z "$DEV_PACK_SIGNER_KEY_B64" ]; then
            echo "::warning::DEV_PACK_SIGNER_KEY_B64 secret not set вҖ” falling back to fresh keygen"
            ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
          else
            mkdir -p scripts
            echo "$DEV_PACK_SIGNER_KEY_B64" | base64 -d > scripts/dev-pack-signer.key
            chmod 600 scripts/dev-pack-signer.key
          fi

      - name: Build built-in pack archives
        run: make pack-archive

      - name: Install (web)
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web (produces internal/web/dist)
        working-directory: web
        run: pnpm build

      - name: Install Playwright browsers (chromium)
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: pnpm exec playwright test
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: web/playwright/test-results
          retention-days: 14
          if-no-files-found: ignore
