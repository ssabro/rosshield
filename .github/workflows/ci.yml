name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Tidy check
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum 2>/dev/null; then
            echo "::error::go.mod/go.sum drift — run 'go mod tidy'"
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=3m

  web:
    name: Web tsc, vitest, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (vite build + tsc -b --noEmit)
        run: pnpm build

      - name: Vitest
        run: pnpm exec vitest run

  go-enterprise:
    name: Go build·test (enterprise build tag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Vet (enterprise)
        run: go vet -tags rosshield_enterprise ./...

      - name: Build (enterprise)
        run: go build -tags rosshield_enterprise ./...

      - name: Test (enterprise)
        run: go test -tags rosshield_enterprise -race -count=1 ./...

  pg-integration:
    name: PG integration (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run PG integration tests
        run: go test -tags=integration -count=1 -timeout=8m ./internal/platform/storage/postgres/...

  e2e:
    name: Playwright E2E (smoke)
    needs: [go, web]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install (web)
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web (produces internal/web/dist)
        working-directory: web
        run: pnpm build

      - name: Install Playwright browsers (chromium)
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: pnpm exec playwright test
        env:
          CI: 'true'

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: web/playwright/test-results
          retention-days: 14
          if-no-files-found: ignore
