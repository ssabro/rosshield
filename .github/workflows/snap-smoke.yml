name: Snap Smoke Test

# rosshield snap install + healthz smoke test (E33.T2 Phase 5).
#
# Trigger:
#   - snap-build.yml 완료 후 자동 (workflow_run)
#   - workflow_dispatch (수동)
#
# 검증:
#   - snap install --dangerous (서명 없는 dev snap 허용)
#   - snap services rosshield (active)
#   - /healthz 200 OK 응답
#
# 한계:
#   - LXD 기반 snap install은 GitHub Actions ubuntu-22.04에서 nested virtualization 없이도 동작.
#   - Multipass 시도는 KVM 의존, GitHub Actions 무지원 — LXD로 단순화.
#   - 본 smoke는 single-instance + sqlite + HA 비활성 가정.

on:
  workflow_run:
    workflows: ['Snap Build']
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read

jobs:
  smoke:
    name: snap install + healthz smoke
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Download snap artifact (from snap-build run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: rosshield-snap-amd64
          path: ./snap-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download snap artifact (manual dispatch — latest snap-build run)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # workflow_dispatch 경로는 git checkout이 안 된 상태 — gh CLI가 base repo를
          # 인식 못 함. GH_REPO env로 명시 주입.
          GH_REPO: ${{ github.repository }}
        run: |
          # 가장 최근 성공한 Snap Build run에서 artifact 다운로드.
          mkdir -p ./snap-artifact
          RUN_ID=$(gh run list --workflow=snap-build.yml --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::error::no successful snap-build run found"
            exit 1
          fi
          gh run download "$RUN_ID" -n rosshield-snap-amd64 -D ./snap-artifact

      - name: List artifact
        run: ls -lh ./snap-artifact

      - name: snap install (dangerous, dev signature)
        run: |
          SNAP_FILE=$(ls ./snap-artifact/*.snap | head -n 1)
          if [ -z "$SNAP_FILE" ]; then
            echo "::error::no .snap file found in artifact"
            exit 1
          fi
          echo "Installing $SNAP_FILE"
          sudo snap install "$SNAP_FILE" --dangerous

      - name: snap services
        run: |
          sudo snap services rosshield
          sudo snap logs rosshield | tail -n 30

      - name: Wait for /healthz
        run: |
          # 60s timeout — sqlite migration + pack archive load + license check 등
          # 초기 startup 합산. 매 20s마다 snap log 출력으로 진행 상태 가시화.
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; then
              echo "✓ /healthz responded after ${i}s"
              exit 0
            fi
            if [ $((i % 20)) -eq 0 ]; then
              echo "--- snap logs (waiting ${i}s) ---"
              sudo snap logs rosshield | tail -n 20
            fi
            sleep 1
          done
          echo "::error::/healthz did not respond within 60s"
          sudo snap logs rosshield | tail -n 100
          exit 1

      - name: /healthz body
        run: |
          curl -fsS http://localhost:8080/healthz | tee healthz.json
          # 핵심 필드 존재 확인
          jq -e '.status' healthz.json
          jq -e '.components.storage' healthz.json
          jq -e '.components.signer' healthz.json

      # E35 redesign — check-health hook 검증 (services start 후 호출).
      # snap install 직후 check-health가 한 번 호출됨 — daemon이 active되면 status okay.
      - name: snap health — check-health hook status
        run: |
          # check-health hook은 install 직후 자동 호출되며, daemon이 active되기까지
          # transient waiting 가능. max 30s polling으로 okay 도달 확인.
          for i in $(seq 1 30); do
            STATUS=$(sudo snap health rosshield 2>&1 | awk '/^rosshield/{print $2}')
            if [ "$STATUS" = "okay" ] || [ -z "$STATUS" ]; then
              # 빈 status는 "no health concerns" 의미 (snap health는 unhealthy만 출력).
              echo "✓ snap health okay (i=$i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::snap health did not reach okay within 30s (last status: $STATUS)"
              sudo snap health rosshield
              exit 1
            fi
            sleep 1
          done

      # E35 + B7 — configure hook 검증 (Phase 5 Stage 2-C 후속).
      # snap set rosshield <key>=<value>로 옵션 설정. 잘못된 값은 hook이 거부.
      - name: configure hook — valid values pass
        run: |
          # E35 healthz 옵션
          sudo snap set rosshield healthz-timeout=30
          sudo snap set rosshield healthz-url=http://127.0.0.1:8080/healthz
          # B7 backup 옵션
          sudo snap set rosshield backup-schedule="@every 24h"
          sudo snap set rosshield backup-skip-evidence=false
          sudo snap set rosshield backup-dir=/var/snap/rosshield/common/backups

          # snap get으로 모두 정상 저장됐는지 확인
          sudo snap get rosshield healthz-timeout | grep -q '^30$'
          sudo snap get rosshield backup-schedule | grep -q '@every 24h'
          echo "✓ valid configure values accepted"

      - name: configure hook — invalid values rejected
        run: |
          # 음수·범위 외·잘못된 형식은 거부되어야 함 (exit != 0)
          if sudo snap set rosshield healthz-timeout=99999 2>/dev/null; then
            echo "::error::healthz-timeout=99999 should have been rejected"; exit 1
          fi
          if sudo snap set rosshield backup-schedule="not a cron" 2>/dev/null; then
            echo "::error::backup-schedule with bad cron should have been rejected"; exit 1
          fi
          if sudo snap set rosshield backup-skip-evidence=maybe 2>/dev/null; then
            echo "::error::backup-skip-evidence=maybe should have been rejected"; exit 1
          fi
          if sudo snap set rosshield backup-dir=relative/path 2>/dev/null; then
            echo "::error::backup-dir=relative/path should have been rejected"; exit 1
          fi
          echo "✓ invalid configure values rejected as expected"

      # E35 redesign — same-snap refresh OTA round-trip simulation.
      # 재설계 후: post-refresh hook은 파일 무결성 check만 수행하므로 daemon start 전에
      # 즉시 exit 0. 새 revision의 daemon이 active되면 snapd가 check-health hook 호출 →
      # healthz polling 통해 okay 상태 확정.
      #
      # 설계: docs/design/notes/e35-refresh-rollback-redesign.md.
      - name: snap refresh — same-snap re-install (round-trip)
        run: |
          SNAP_FILE=$(ls ./snap-artifact/*.snap | head -n 1)
          REVISION_BEFORE=$(snap list rosshield | awk 'NR==2 {print $3}')
          echo "rev before refresh: $REVISION_BEFORE"

          # snapd가 같은 파일을 또 install하면 refresh로 처리.
          sudo snap install "$SNAP_FILE" --dangerous

          REVISION_AFTER=$(snap list rosshield | awk 'NR==2 {print $3}')
          echo "rev after refresh:  $REVISION_AFTER"

          # snap services 여전히 active
          sudo snap services rosshield | grep -q "active"

          # /healthz 여전히 200 (새 revision daemon이 들고 있음)
          # daemon restart 후 listen 준비까지 grace polling.
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 http://localhost:8080/healthz 2>/dev/null | jq -e '.status' >/dev/null 2>&1; then
              echo "✓ /healthz responded after refresh (i=$i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::/healthz did not respond within 30s after refresh"
              sudo snap logs rosshield | tail -n 50
              exit 1
            fi
            sleep 1
          done

          echo "✓ snap refresh round-trip OK (revision $REVISION_BEFORE → $REVISION_AFTER)"

          # post-refresh hook이 실행됐는지 snap changes로 확인
          sudo snap changes rosshield | head -5

      # check-health hook이 새 revision에서도 okay 도달 확인.
      - name: snap health — check-health after refresh
        run: |
          for i in $(seq 1 30); do
            STATUS=$(sudo snap health rosshield 2>&1 | awk '/^rosshield/{print $2}')
            if [ "$STATUS" = "okay" ] || [ -z "$STATUS" ]; then
              echo "✓ snap health okay after refresh (i=$i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::snap health did not reach okay within 30s after refresh (last: $STATUS)"
              sudo snap health rosshield
              exit 1
            fi
            sleep 1
          done

      - name: snap remove (cleanup)
        if: always()
        run: sudo snap remove --purge rosshield || true
