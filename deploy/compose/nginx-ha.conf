# E25 Stage 4 — nginx LB 설정 (rosshield HA leader/follower 토폴로지).
# 핵심 메커니즘: follower의 503 NOT_LEADER 응답 → proxy_next_upstream으로 leader 자동 라우팅.
# Stage 3 RequireLeaderForWrites middleware가 응답하는 503 + Retry-After 헤더에 의존.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # 의도: 두 인스턴스 동등 가중치. max_fails/fail_timeout으로 일시적 장애 격리.
    # backup 지정하지 않음 — 둘 다 active이며 503 시 다음 upstream으로 회전.
    upstream rosshield_backend {
        server rosshield-a:8080 max_fails=2 fail_timeout=10s;
        server rosshield-b:8080 max_fails=2 fail_timeout=10s;
        keepalive 32;
    }

    # 의도: WebSocket upgrade 헤더 매핑. /api/v1/scans/{id}/progress용.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 의도: 액세스 로그 — failover 디버깅 시 upstream_addr · upstream_status 필수.
    log_format ha '$remote_addr - $request '
                  'upstream=$upstream_addr status=$status '
                  'upstream_status=$upstream_status time=$upstream_response_time';
    access_log /var/log/nginx/access.log ha;

    server {
        listen 8443;
        server_name _;

        # 의도: 공통 proxy 헤더. X-Forwarded-* 체인으로 백엔드가 원본 클라이언트 식별.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 의도: /healthz는 LB 자체 health check 용도. body의 role 필드는 LB가 보지 않고
        # status code(200/503)만으로 판단. follower도 200 응답하므로 LB 입장에서 둘 다 healthy.
        # role 기반 라우팅은 application 레벨(follower 503 NOT_LEADER)에서 처리.
        location = /healthz {
            proxy_pass http://rosshield_backend;
            proxy_http_version 1.1;
            access_log off;
        }

        # 의도: WebSocket 진행 스트림. HTTP/1.1 + Upgrade 필수.
        # follower는 WS 업그레이드 시 거부 → proxy_next_upstream으로 leader 재시도.
        location ~ ^/api/v1/scans/[^/]+/progress$ {
            proxy_pass http://rosshield_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        # 의도: 일반 API. follower의 write 요청 503 NOT_LEADER → leader로 자동 retry.
        # idempotent 보장을 위해 GET·HEAD·OPTIONS·POST·PUT·DELETE 모두 retry 허용
        # (write 멱등성은 application이 책임 — Stage 3 audit 게이트).
        location /api/v1/ {
            proxy_pass http://rosshield_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
        }

        # 의도: 정적 자산 + SPA. read-only이므로 양 인스턴스 모두 응답 가능.
        location / {
            proxy_pass http://rosshield_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
        }
    }
}
