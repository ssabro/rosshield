# E11 Compose — rosshield 온프렘 데모 환경.
# 단일 서비스 + 영속 named volume. SQLite 단일 노드 (Postgres는 Phase 3 SKU).

services:
  rosshield:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    image: rosshield/server:dev
    container_name: rosshield-server
    restart: unless-stopped
    ports:
      - "${ROSSHIELD_PUBLIC_PORT:-8080}:8080"
    volumes:
      - rosshield-data:/var/lib/rosshield
    environment:
      ROSSHIELD_ADMIN_EMAIL: "${ROSSHIELD_ADMIN_EMAIL:?ROSSHIELD_ADMIN_EMAIL must be set in .env}"
      ROSSHIELD_ADMIN_PASSWORD: "${ROSSHIELD_ADMIN_PASSWORD:?ROSSHIELD_ADMIN_PASSWORD must be set in .env}"
      ROSSHIELD_TENANT_NAME: "${ROSSHIELD_TENANT_NAME:-Default Tenant}"

volumes:
  rosshield-data:
    name: rosshield-data
