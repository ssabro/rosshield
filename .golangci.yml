version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - depguard

  # 도메인 경계 강제 (P5):
  # 각 도메인 패키지는 자기 자신 외 다른 도메인 패키지를 import할 수 없습니다.
  # 도메인 간 통신은 EventBus 또는 cmd/* bootstrap에서 결선된 Application Service 경유.
  # cmd/* (bootstrap)와 향후 internal/api/* (Gateway)는 모든 도메인을 결선할 수 있도록 예외.
  #
  # 새 도메인을 추가할 때마다 같은 패턴의 rule을 추가하세요.
  settings:
    depguard:
      rules:
        # 도메인 import 격리는 production 코드만 강제. 테스트는 결선 통합을 직접 검증해야 하므로 예외.
        audit-domain-isolation:
          list-mode: lax
          files:
            - "$all"
            - "!**/cmd/**"
            - "!**/internal/api/**"
            - "!**/internal/domain/audit/**"
            # rotationjob: application service composer (cmd-equivalent) — cmd/* bootstrap이
            # audit.Service + rotation.Rotator를 inject. cycle 회피를 위해 platform sub-package
            # 로 위치하지만 책임은 결선이므로 예외.
            - "!**/internal/platform/scheduler/rotationjob/**"
            # keyrotationjob: Phase 10.D — 동일 패턴 (KeyRotator scheduler adapter, cmd/* bootstrap이 결선).
            - "!**/internal/platform/scheduler/keyrotationjob/**"
            - "!**/*_test.go"
          deny:
            - pkg: github.com/ssabro/rosshield/internal/domain/audit
              desc: "다른 도메인·플랫폼은 audit 도메인을 직접 import 금지 (P5). EventBus 또는 cmd/* bootstrap에서 결선된 Service 경유."

formatters:
  enable:
    - gofmt
    - goimports
