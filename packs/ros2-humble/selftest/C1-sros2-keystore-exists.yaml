# selftest — ros2.C1.sros2_keystore_exists (Humble Hawksbill)
# evaluationRule: contains "** PASS **"
apiVersion: rosshield.io/v1
kind: SelfTest
metadata:
  checkId: ros2.C1.sros2_keystore_exists
spec:
  cases:
    - name: PASS — 키스토어 + enclave 2개
      input:
        stdout: '** PASS ** 키스토어 /home/ros/.ros/keystore, enclave 2 개'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: FAIL — 키스토어 디렉토리 부재
      input:
        stdout: '** FAIL ** 키스토어 디렉토리 부재: /home/ros/.ros/keystore'
        stderr: ''
        exitCode: 0
      expectedOutcome: FAIL
    - name: FAIL — enclave 0개
      input:
        stdout: '** FAIL ** enclave 0개 (/home/ros/.ros/keystore/enclaves)'
        stderr: ''
        exitCode: 0
      expectedOutcome: FAIL
