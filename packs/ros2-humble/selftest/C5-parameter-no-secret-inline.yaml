# selftest — ros2.C5.parameter_no_secret_inline (Humble Hawksbill)
# evaluationRule: contains "** PASS **"
apiVersion: rosshield.io/v1
kind: SelfTest
metadata:
  checkId: ros2.C5.parameter_no_secret_inline
spec:
  cases:
    - name: PASS — secret inline 0건 (env/vault 참조만)
      input:
        stdout: '** PASS ** secret inline 0건 (env/vault 참조만)'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: PASS — launch/param 디렉터리 부재 (검사 대상 0)
      input:
        stdout: '** PASS ** launch/param yaml 디렉터리 부재 (검사 대상 0)'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: FAIL — secret inline 3건 발견
      input:
        stdout: '** FAIL ** secret inline 발견 count=3 (env 또는 vault 참조 사용 권장)'
        stderr: ''
        exitCode: 0
      expectedOutcome: FAIL
