# C5 — launch/param yaml owner=ros-user + perms ≤ 0644 (소유권 escalation 차단) — Humble Hawksbill
#
# design doc §2 C5 후보 'launch.param_files_owner' + §6 Stage 10.E-3 D-P10E-3
# (env override skip — site policy 의존 check, env 미설정 시 PASS skip).
# jazzy 변환 — workspace 경로 /opt/ros/jazzy/ → /opt/ros/humble/.
# 잘못된 owner(예 unprivileged user)도 권한 escalation 경로 — perms 0644 라도
# owner=공격자 면 직접 수정 가능.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: ros2.C5.param_files_owner
  title: launch/param yaml — owner=ros-user + perms ≤ 0644 (Humble Hawksbill)
  description: |-
    ROS2 Humble Hawksbill 전용. launch · param yaml 파일은 owner = ros-user(또는
    env `ROSSHIELD_ROS_USER`로 지정) + perms 가 0644 · 0640 · 0600 중 하나여야
    합니다. `no_world_writable_yaml`은 other write bit만 검사 — owner가 잘못된
    경우(예 unprivileged 공격자) 본인 권한으로 직접 수정 가능. 본 check는 그
    layer를 보강 합니다.

    본 check는:
      1. 표준 디렉터리 (/etc/ros2/params, /opt/ros/humble/share/*/launch, ~/ros2_ws/install/*/share/*/launch) yaml 수집
      2. 각 파일의 owner + perms 확인
      3. owner = ros-user(default `ros`) + perms ∈ {0644, 0640, 0600}

    조건 모두 충족 시 PASS. yaml 디렉터리 부재 시 비대상 PASS.
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    [ -f /opt/ros/humble/setup.bash ] && source /opt/ros/humble/setup.bash 2>/dev/null;
    EXPECTED_USER="${ROSSHIELD_ROS_USER:-ros}";
    DIRS=$(ls -d /etc/ros2/params /opt/ros/humble/share/*/launch ~/ros2_ws/install/*/share/*/launch 2>/dev/null);
    if [ -z "$DIRS" ]; then
      echo "** PASS ** launch/param yaml 디렉터리 부재 (검사 대상 0)";
      exit 0;
    fi;
    FILES=$(find $DIRS -type f -name "*.yaml" 2>/dev/null);
    if [ -z "$FILES" ]; then
      echo "** PASS ** launch/param yaml 0건 (검사 대상 0)";
      exit 0;
    fi;
    BAD=0;
    for f in $FILES; do
      OWNER=$(stat -c "%U" "$f" 2>/dev/null);
      MODE=$(stat -c "%a" "$f" 2>/dev/null);
      if [ "$OWNER" != "$EXPECTED_USER" ] && [ "$OWNER" != "root" ]; then
        echo "** FAIL ** owner!=${EXPECTED_USER}/root: $f (owner=$OWNER)";
        BAD=1;
      fi;
      case "$MODE" in
        644|640|600) ;;
        *) echo "** FAIL ** perms not in {0644,0640,0600}: $f (mode=$MODE)"; BAD=1;;
      esac;
    done;
    if [ "$BAD" -eq 0 ]; then
      echo "** PASS ** launch/param yaml owner=${EXPECTED_USER}/root + perms ≤ 0644";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    launch/param yaml은 robot 동작 파라미터를 정의 — safety zone, sensor
    calibration, /cmd_vel rate limit 등 안전-critical 값 포함. owner가
    unprivileged user 면 perms 0644라도 그 사용자는 직접 write 가능 — silent
    config tamper risk. `no_world_writable_yaml`(other write 0)와 layer 분리:
    other 차단 후 group/owner 까지 좁혀 최소 권한 baseline 완성. env
    `ROSSHIELD_ROS_USER`로 site별 운영 계정 override 지원, root owner도
    허용(systemd / apt 설치 경로 cover).
    Humble Hawksbill의 launch yaml owner baseline은 jazzy와 동일 — distro 경로만 다름.
  fixGuidance: |-
    1. owner 정상화:
         sudo chown ros:ros /etc/ros2/params/*.yaml
       (`ros` 부분은 site 운영 계정으로 교체)
    2. perms 정상화:
         sudo chmod 0644 /etc/ros2/params/*.yaml
    3. apt 설치 yaml(/opt/ros/humble/share/*/launch/*.yaml)은 root:root 0644가 정상 — 변경 시 packaging 검토.
    4. customer 운영 계정이 다르면:
         export ROSSHIELD_ROS_USER=<계정>
       scan profile에 env 등록.
    5. 검증 — 본 check 재실행, BAD=0 확인.
    6. Humble customer 진입 시 /opt/ros/humble/setup.bash가 사전 source되었는지 확인.
