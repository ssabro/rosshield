# C1 — SROS2 키스토어 디렉토리 + 1+ enclave 존재 (Humble Hawksbill)
#
# design doc §2 C1 — sros2.policy_files_exist.
# enclave 0이면 SROS2 활성화되었어도 실제 인증 정책 없음 → 보안 의미 0.
# jazzy 변환 — workspace 경로 /opt/ros/jazzy/setup.bash → /opt/ros/humble/setup.bash.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: ros2.C1.sros2_keystore_exists
  title: SROS2 키스토어 + enclave 1개 이상 존재 (Humble Hawksbill)
  description: |-
    ROS2 Humble Hawksbill 전용. SROS2 키스토어(~/.ros/keystore/ 기본)는 각 노드의 인증서·
    권한 파일을 보관합니다. enclaves/ 하위에 노드별 디렉토리(예: /talker, /listener)가
    있어야 정책이 적용됩니다.

    본 check는:
      1. 키스토어 디렉토리 존재
      2. enclaves/ 하위에 최소 1개 enclave (디렉토리)

    조건이 모두 충족되면 PASS.
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    [ -f /opt/ros/humble/setup.bash ] && source /opt/ros/humble/setup.bash 2>/dev/null;
    KS="${ROS_SECURITY_KEYSTORE:-$HOME/.ros/keystore}";
    if [ ! -d "$KS" ]; then
      echo "** FAIL ** 키스토어 디렉토리 부재: $KS";
      exit 0;
    fi;
    if [ ! -d "$KS/enclaves" ]; then
      echo "** FAIL ** enclaves/ 디렉토리 부재: $KS/enclaves";
      exit 0;
    fi;
    COUNT=$(find "$KS/enclaves" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l);
    if [ "$COUNT" -ge 1 ]; then
      echo "** PASS ** 키스토어 $KS, enclave $COUNT 개";
    else
      echo "** FAIL ** enclave 0개 ($KS/enclaves)";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    SROS2 환경변수가 켜져 있어도 키스토어 또는 enclave가 없으면 실제 인증 정책이
    적용되지 않습니다. enclave 0이면 노드 시작 시 보안 plugin이 정책 미발견으로
    동작하지 않거나 노드가 시작 실패 — 어느 경우든 운영 baseline 위반.
    Humble Hawksbill의 SROS2 인터페이스는 jazzy와 동일(DDS Security Spec v1.1 기반).
  fixGuidance: |-
    1. ros2 security create_keystore ~/.ros/keystore
    2. 활성 노드별 enclave 생성:
         ros2 security create_enclave ~/.ros/keystore /talker
         ros2 security create_enclave ~/.ros/keystore /listener
    3. governance.xml + permissions.xml 작성 후 서명:
         ros2 security generate_policy ~/.ros/keystore policy.xml
    4. ROS_SECURITY_KEYSTORE 환경변수가 다른 위치를 가리키면 그 경로에서 동일 절차.
    5. Humble customer 진입 시 /opt/ros/humble/setup.bash가 사전 source되었는지 확인.
