# C5 — launch param yaml에 password/secret/token inline value 차단 — Humble Hawksbill
#
# design doc §2 C5 후보 'launch.parameter_no_secret_inline' 정확 일치.
# jazzy 변환 — workspace 경로 /opt/ros/jazzy/ → /opt/ros/humble/.
# inline plain text secret은 source repo + git history 영구 노출 risk.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: ros2.C5.parameter_no_secret_inline
  title: Launch parameter yaml에 secret/password inline value 없음 (Humble Hawksbill)
  description: |-
    ROS2 Humble Hawksbill 전용. launch 또는 param yaml에 password|secret|token|api_key
    같은 키가 inline plain text value로 포함되어 있으면 source repo + git history
    누출 risk. env var(`${ENV_VAR}`) 또는 vault 참조(`vault:secret/...`)만 사용해야
    합니다. 본 check는 표준 디렉터리의 yaml 안에서 secret 키 + plain inline value
    패턴을 grep으로 검출합니다 (env: 또는 vault: prefix는 화이트리스트).
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    DIRS=$(ls -d /etc/ros2/params /opt/ros/humble/share/*/launch ~/ros2_ws/install/*/share/*/launch 2>/dev/null);
    if [ -z "$DIRS" ]; then
      echo "** PASS ** launch/param yaml 디렉터리 부재 (검사 대상 0)";
      exit 0;
    fi;
    HITS=$(grep -rhE "(password|secret|token|api[_-]?key)[[:space:]]*:[[:space:]]*[^$<{[:space:]]" $DIRS --include="*.yaml" 2>/dev/null | grep -vE "(env:|secret_manager|vault:)" | wc -l);
    if [ "$HITS" = "0" ]; then
      echo "** PASS ** secret inline 0건 (env/vault 참조만)";
    else
      echo "** FAIL ** secret inline 발견 count=$HITS (env 또는 vault 참조 사용 권장)";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    Launch param yaml은 source repo에 commit되는 게 일반적입니다. password,
    secret, token, api_key 같은 키 + inline plain text value는 git history에
    영구 노출 + repo 권한 가진 모든 사용자에게 visible. env var 또는 secret
    manager(Vault, AWS Secrets Manager 등) 참조만 권장합니다. 본 check는
    `env:` / `vault:` / `secret_manager` prefix를 화이트리스트로 허용하고
    나머지 inline plain value만 위반으로 카운트합니다.
    Humble Hawksbill의 launch yaml baseline은 jazzy와 동일 — distro 경로만 다름.
  fixGuidance: |-
    1. grep -rE "(password|secret|token):" <launch-yaml-dir>로 위반 검출.
    2. 각 위반:
       - env var 참조: `password: "${ENV_DB_PASSWORD}"` 형식
       - vault 참조: `password: "vault:secret/db#password"` 형식
    3. git history에서 secret 제거 — `git filter-repo` 또는 `BFG Repo-Cleaner`.
    4. secret 자체 rotate (이미 git history 노출 시 필수).
    5. 검증 — 본 check 재실행, HITS=0 확인.
    6. Humble customer 진입 시 /opt/ros/humble/setup.bash가 사전 source되었는지 확인.
