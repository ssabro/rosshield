# ros2-humble — ROS2 Humble Hawksbill Baseline Security Pack v0.1.0
#
# design doc: docs/design/notes/ros2-humble-dds-sros2-design.md §6 Stage 10.E-2.
# D-P10E-1 옵션 C — humble pack 신규 + DDS/SROS2 깊이 jazzy + humble 양쪽 동기.
# D-P10E-2 v0.11.0 minor — 전체 Stage 마감 후 release.
#
# 본 pack은 ros2-jazzy(22 check)의 humble distro 변환 — apt source URL + workspace 경로 차이만 갱신.
# 본 round(Stage 10.E-2)는 C1·C2·C3 첫 진입(5 check). Stage 10.E-3~6에서 C4~C8 확장.
#
# Humble distro 차이(jazzy 대비):
#   - workspace 경로: /opt/ros/humble/setup.bash (jazzy → humble)
#   - apt source distro 디렉터리: packages.ros.org/ros2/ubuntu (공통) + distro = humble
#   - LTS expected ROS_DISTRO: "humble"
#   - SROS2/DDS Security Spec v1.1 인터페이스: jazzy와 동일(변경 없음)
apiVersion: rosshield.io/v1
kind: Pack
metadata:
  name: ros2-humble
  version: 0.1.0
  vendor: rosshield
  description: "ROS2 Humble Hawksbill Baseline Security Pack (Stage 10.E-2 — C1·C2·C3 첫 진입, 5 check)"
spec:
  schemaVersion: 1
