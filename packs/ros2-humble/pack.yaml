# ros2-humble — ROS2 Humble Hawksbill Baseline Security Pack v0.1.0
#
# design doc: docs/design/notes/ros2-humble-dds-sros2-design.md §6 Stage 10.E-2 / 10.E-3 / 10.E-4.
# D-P10E-1 옵션 C — humble pack 신규 + DDS/SROS2 깊이 jazzy + humble 양쪽 동기.
# D-P10E-2 v0.11.0 minor — 전체 Stage 마감 후 release.
# D-P10E-3 site policy 의존 check (colcon_install_hash · lifecycle_node_used · param_files_owner)
#   는 env 미설정 시 PASS skip (false positive 회피).
# D-P10E-4 SROS2 cert/apt key expiry threshold ≥ 90일.
#
# 본 pack은 ros2-jazzy(22 check)의 humble distro 변환 — distro 4 영역(workspace · apt source URL ·
# 패키지 prefix · EOL 날짜) 갱신. Stage 10.E-3+4 마감으로 C1~C8 8/8 카테고리 cover(22 check) 완성.
#
# Stage 진행:
#   - Stage 10.E-2: C1·C2·C3 5 check (sros2 keystore · cmd_vel ACL · domain id)
#   - Stage 10.E-3: C4 6 check (binary 무결성) + C5 6 check (launch 안전)
#   - Stage 10.E-4: C6 3 check (배포 메타) + C7 1 check (RMW) + C8 1 check (governance encrypt)
#
# Humble distro 차이(jazzy 대비):
#   - workspace 경로: /opt/ros/humble/setup.bash (jazzy → humble)
#   - apt source distro 디렉터리: packages.ros.org/ros2/ubuntu (공통) + distro = humble + Ubuntu jammy base
#   - apt 패키지 prefix: ros-humble-* (jazzy: ros-jazzy-*)
#   - LTS expected ROS_DISTRO: "humble"
#   - EOL 날짜: humble 2027-05 (jazzy 2029-05보다 빠름 — C6-distro-not-eol rationale 명시)
#   - SROS2/DDS Security Spec v1.1 인터페이스: jazzy와 동일(변경 없음)
apiVersion: rosshield.io/v1
kind: Pack
metadata:
  name: ros2-humble
  version: 0.1.0
  vendor: rosshield
  description: "ROS2 Humble Hawksbill Baseline Security Pack (C1·C2·C3·C4·C5·C6·C7·C8 8/8 cover, 22 check)"
spec:
  schemaVersion: 1
