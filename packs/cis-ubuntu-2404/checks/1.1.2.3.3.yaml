apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.1.2.3.3
    title: 1.1.2.3.3 Ensure nosuid option set on /home partition (Automated)
    description: The nosuid mount option specifies that the filesystem cannot contain setuid files.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: |-
        Since the /home filesystem is only intended for user file storage, set this option to
        ensure that users cannot create setuid files in /home.
    fixGuidance: |-
        - IF - a separate partition exists for /home.
        Edit the /etc/fstab file and add nosuid to the fourth field (mounting options) for the
        /home partition.
        Example:
        <device> /home <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0
        Run the following command to remount /home with the configured options:
        # mount -o remount /home
