apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.3.12
    title: 6.2.3.12 Ensure login and logout events are collected (Automated)
    description: |-
        Monitor login and logout events. The parameters below track changes to files
        associated with login/logout events.
        • /var/log/lastlog - maintain records of the last time a user successfully logged
        in.
        • /var/run/faillock - directory maintains records of login failures via the
        pam_faillock module.
    severity: low
spec:
    auditCommand: "bash -c '#!/usr/bin/env bash\nset -u\nUID_MIN=${UID_MIN:-1000}\n\nneed_disk=(\n  \"-w /var/log/lastlog -p wa -F key=logins\"\n  \"-w /var/run/faillock -p wa -F key=logins\"\n)\nneed_run=(\n  \"-w /var/log/lastlog -p wa -F key=logins\"\n  \"-w /var/run/faillock -p wa -F key=logins\"\n)\n\nnormalize_fn() {\n  while IFS= read -r line; do\n    case \"$line\" in\n      *'\\'' -S '\\''*) \n        sycs=$(printf '\\''%s'\\'' \"$line\" | sed -nE '\\''s/.* -S ([a-zA-Z_][a-zA-Z0-9_,]*).*/\\1/p'\\'' | tr '\\'','\\'' '\\''\\n'\\'' | sort -u | paste -sd '\\'','\\'')\n        line=$(printf '\\''%s'\\'' \"$line\" | sed -E \"s/ -S [a-zA-Z_][a-zA-Z0-9_,]*/ -S $sycs/\")\n        ;;\n    esac\n    line=$(printf '\\''%s'\\'' \"$line\" | sed -E '\\''s/ -k ([!-~]+)/ -F key=\\1/g; s/ -F auid!=-?[0-9]+/ -F auid!=unset/g'\\'')\n    printf '\\''%s\\n'\\'' \"$line\"\n  done\n}\n\ndisk_out=$(cat /etc/audit/rules.d/*.rules 2>/dev/null | normalize_fn)\nrun_out=$(auditctl -l 2>/dev/null | normalize_fn)\nmissing=0\nfor r in \"${need_disk[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$disk_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-disk: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nfor r in \"${need_run[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$run_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-run: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nif [ \"$missing\" -eq 0 ]; then printf '\\''** PASS **\\n'\\''; else printf '\\''** FAIL **\\n'\\''; fi\n'"
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Monitoring login/logout events could provide a system administrator with information
        associated with brute force attacks against user logins.
    fixGuidance: |-
        Edit or create a file in the /etc/audit/rules.d/ directory, ending in .rules extension,
        with the relevant rules to monitor login and logout events.
        Example:
        # printf "
        -w /var/log/lastlog -p wa -k logins
        -w /var/run/faillock -p wa -k logins
        " >> /etc/audit/rules.d/50-login.rules
        Merge and load the rules into active configuration:
        # augenrules --load
        Check if reboot is required.
        # if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then printf "Reboot
        required to load rules\n"; fi
