apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.1.3.5
    title: 6.1.3.5 Ensure rsyslog logging is configured (Manual)
    description: |-
        rsyslog 구성 파일은 어떤 클래스의 메시지를 어디로 logging할지 규칙을 정의한다.
        site 정책에 따라 필수 facility/priority 매칭 라인이 다르므로 자동 PASS/FAIL 부여가
        불가능하다.

        본 check는 customer-supplied env var ROSSHIELD_CIS_6_1_3_5_POLICY 가
        정의돼 있으면 audit cmd가 site 필수 라인 존재 여부를 확인하고, 미정의 시 SKIP
        marker를 emit한 뒤 운영자 정성 검토(INDETERMINATE)로 분류된다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: manual
        prompt: |-
            CIS 6.1.3.5 — rsyslog logging 규칙 검토.

            확인 절차:
              1. `cat /etc/rsyslog.conf /etc/rsyslog.d/*.conf` — 현재 로깅 규칙
              2. site logging policy(facility/priority별 destination)와 대조
              3. 예: `auth,authpriv.* /var/log/secure`, `*.crit /var/log/warn`,
                 `mail.err /var/log/mail.err` 등

            판정 기준:
              PASS  — site 필수 logging 규칙 모두 활성
              FAIL  — 필수 규칙 누락(특히 auth·crit) 또는 잘못된 destination
              REVIEW — site logging policy 미정의(default)

            자동화 옵션:
              env $ROSSHIELD_CIS_6_1_3_5_POLICY 에 쉼표 구분 필수 라인 정규식 패턴을
              정의하면 audit cmd가 grep으로 자동 검증한다.
        defaultVerdict: review
    rationale: |-
        rsyslog를 통해 중요한 보안 관련 정보(예: su 시도 성공·실패, login 실패, root login
        시도 등)가 기록된다. site 정책에 맞춘 logging 규칙은 사고 대응 1차 자료다.
    fixGuidance: |-
        1. site logging policy 정의 (facility/priority별 destination, archival 정책).
        2. env var ROSSHIELD_CIS_6_1_3_5_POLICY 에 쉼표 구분 필수 라인 정규식 패턴 정의.
        3. `/etc/rsyslog.conf` 또는 `/etc/rsyslog.d/*.conf` 편집 예시:
             *.emerg                                 :omusrmsg:*
             auth,authpriv.*                         /var/log/secure
             mail.*                                  -/var/log/mail
             mail.info                               -/var/log/mail.info
             mail.warning                            -/var/log/mail.warn
             mail.err                                /var/log/mail.err
             cron.*                                  /var/log/cron
             *.=warning;*.=err                       -/var/log/warn
             *.crit                                  /var/log/warn
             *.*;mail.none;news.none                 -/var/log/messages
             local0,local1.*                         -/var/log/localmessages
        4. `systemctl reload-or-restart rsyslog` 후 본 check 재실행.
