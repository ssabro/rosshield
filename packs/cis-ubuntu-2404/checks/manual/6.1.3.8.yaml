apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.1.3.8
    title: 6.1.3.8 Ensure logrotate is configured (Manual)
    description: |-
        시스템은 log 파일을 주기적으로 회전(rotation)해 디스크가 가득 차거나 log 파일이
        관리 불가능한 크기가 되지 않도록 한다. `/etc/logrotate.d/rsyslog`는 rsyslog가
        생성한 log를 rotation하는 설정 파일이다. 회전 주기·보존 기간은 site archival 정책에
        의존하므로 자동 PASS/FAIL 부여가 불가능하다.

        본 check는 customer-supplied env var ROSSHIELD_CIS_6_1_3_8_POLICY 가
        정의돼 있으면 audit cmd가 회전 주기·보존 개수를 검증하고, 미정의 시 SKIP marker를
        emit한 뒤 운영자 정성 검토(INDETERMINATE)로 분류된다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: manual
        prompt: |-
            CIS 6.1.3.8 — logrotate 회전 주기·보존 정책 검토.

            확인 절차:
              1. `cat /etc/logrotate.conf` — 전역 default 회전 정책
              2. `ls -la /etc/logrotate.d/` — 서비스별 override 파일
              3. site archival policy(주기, 보존 개수, compress 여부)와 대조
              4. `logrotate -d /etc/logrotate.conf` — dry-run으로 실제 회전 시뮬레이션

            판정 기준:
              PASS  — site 회전 주기 + 보존 개수 + compress 정책 모두 충족
              FAIL  — 주기 부재 또는 보존 개수가 site 최소치 미만
              REVIEW — site archival policy 미정의(default)

            자동화 옵션:
              env $ROSSHIELD_CIS_6_1_3_8_POLICY 에 "<frequency>:<rotate-count>"
              (예: "weekly:7") 형식으로 정의하면 audit cmd가 grep으로 자동 검증한다.
        defaultVerdict: review
    rationale: |-
        log 파일을 작고 관리 가능한 크기로 유지하면 시스템 관리자가 다른 시스템으로 archive
        하기 쉽고, 비대한 log 파일 검색에 시간을 덜 쓸 수 있다. 또한 long-term retention 정책
        준수에도 필요하다.
    fixGuidance: |-
        1. site archival policy 정의 (회전 주기 daily/weekly/monthly, 보존 개수,
           compress·delaycompress 여부).
        2. env var ROSSHIELD_CIS_6_1_3_8_POLICY 에 "<frequency>:<rotate-count>" 형식 정의.
        3. `/etc/logrotate.conf` 또는 audit이 반환한 설정 파일 편집 예시:
             weekly
             rotate 7
             compress
             delaycompress
             notifempty
             missingok
        4. `logrotate -f /etc/logrotate.conf` 한 번 실행해 즉시 적용 후 본 check 재실행.
