apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 4.4.3.3
    title: 4.4.3.3 Ensure ip6tables outbound and established connections are configured (Manual)
    description: |-
        IPv6 ip6tables의 새 outbound 및 established connection rule을 site policy에 맞춰 구성한다.
        IPv6 미사용 환경(sysctl로 disable)에서는 본 항목이 N/A로 간주될 수 있으나, IPv6가
        활성이라면 IPv4와 동일한 수준의 outbound·established rule이 site policy에 부합해야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: manual
        prompt: |-
            CIS 4.4.3.3 — ip6tables(IPv6) outbound·established rule 정책 검토.

            확인 절차:
              1. `sysctl net.ipv6.conf.all.disable_ipv6` — IPv6 활성 여부 (1이면 N/A 가능)
              2. `ip6tables -L -v -n` — 현재 IPv6 ruleset
              3. `ip6tables -L OUTPUT -v -n` + `ip6tables -L INPUT -v -n` — 방향별 rule 확인
              4. site IPv6 policy + 부팅 시 적용 설정과 대조

            판정 기준:
              PASS  — IPv6 비활성 + ruleset deny 또는 IPv6 활성 + 정책 부합 OUTPUT/INPUT rule
              FAIL  — IPv6 활성인데 outbound·established rule 누락 또는 정책 외 허용
              REVIEW — site IPv6 policy 미정의(default)
        defaultVerdict: review
    rationale: |-
        IPv6는 IPv4와 별도 stack이라 IPv4만 통제하면 outbound 우회 경로가 남는다. IPv6 활성
        호스트는 ip6tables도 IPv4와 동일한 site policy 수준으로 통제해야 한다.
    fixGuidance: |-
        site policy에 따라 ip6tables 설정:
            ip6tables -A OUTPUT -p tcp -m state --state NEW,ESTABLISHED -j ACCEPT
            ip6tables -A OUTPUT -p udp -m state --state NEW,ESTABLISHED -j ACCEPT
            ip6tables -A INPUT  -p tcp -m state --state ESTABLISHED -j ACCEPT
            ip6tables -A INPUT  -p udp -m state --state ESTABLISHED -j ACCEPT
        부팅 시 자동 적용: `apt install iptables-persistent` + `netfilter-persistent save`.
