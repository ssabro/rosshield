apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.1.1.3
    title: 6.1.1.3 Ensure journald log file rotation is configured (Manual)
    description: |-
        journald는 logfile rotation으로 디스크 포화 또는 거대 파일 생성을 방지한다.
        /etc/systemd/journald.conf의 SystemMaxUse, SystemKeepFree, RuntimeMaxUse,
        RuntimeKeepFree, MaxFileSec 파라미터가 site logging policy에 부합하는지 운영자
        검토가 필요하다. 적정값은 디스크 크기·로그 보관 의무 기간·중앙 로그서버 유무에 따라
        다르므로 자동 판정 불가.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: manual
        prompt: |-
            CIS 6.1.1.3 — journald rotation 정책 검토.

            확인 절차:
              1. `systemctl cat systemd-journald | grep -E '^(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)='`
              2. `cat /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | grep -E '^(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)='`
              3. site logging retention policy(예: 보관 90일, 디스크 점유율 ≤30%)와 대조

            판정 기준:
              PASS  — 5개 파라미터가 site retention/공간 정책에 부합
              FAIL  — 1+ 파라미터 누락 또는 정책 위반(예: SystemMaxUse 미지정으로 무제한)
              REVIEW — site logging retention policy 미정의(default)
        defaultVerdict: review
    rationale: |-
        rotation으로 logfile 크기를 관리해야 분석·아카이빙·전송이 용이하다. 미설정 시 디스크
        포화로 logging 자체가 중단되거나 forensic 분석 비용이 폭증한다.
    fixGuidance: |-
        /etc/systemd/journald.conf 또는 /etc/systemd/journald.conf.d/60-journald.conf 의 [Journal]
        섹션에 site policy 기준값 설정:
            [Journal]
            SystemMaxUse=1G
            SystemKeepFree=500M
            RuntimeMaxUse=200M
            RuntimeKeepFree=50M
            MaxFileSec=1month
        적용:
            systemctl reload-or-restart systemd-journald
        canonical 우선순위: 같은 키가 후순위 파일·라인에서 다시 정의되면 후자가 이긴다.
