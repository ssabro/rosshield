apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.1.2.1.2
    title: 1.1.2.1.2 Ensure nodev option set on /tmp partition (Automated)
    description: The nodev mount option specifies that the filesystem cannot contain special devices.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(findmnt -kn /tmp | grep -v nodev 2>/dev/null)"
        if [ -z "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Since the /tmp filesystem is not intended to support devices, set this option to ensure
        that users cannot create a block or character special devices in /tmp.
    fixGuidance: |-
        - IF - a separate partition exists for /tmp.
        Edit the /etc/fstab file and add nodev to the fourth field (mounting options) for the
        /tmp partition.
        Example:
        <device> /tmp <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0
        Run the following command to remount /tmp with the configured options:
        # mount -o remount /tmp
