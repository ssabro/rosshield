apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.1.2.6.3
    title: 1.1.2.6.3 Ensure nosuid option set on /var/log partition (Automated)
    description: The nosuid mount option specifies that the filesystem cannot contain setuid files.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: |-
        Since the /var/log filesystem is only intended for log files, set this option to ensure
        that users cannot create setuid files in /var/log.
    fixGuidance: |-
        - IF - a separate partition exists for /var/log.
        Edit the /etc/fstab file and add nosuid to the fourth field (mounting options) for the
        /var/log partition.
        Example:
        <device> /var/log <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0
        0
        Run the following command to remount /var/log with the configured options:
        # mount -o remount /var/log
