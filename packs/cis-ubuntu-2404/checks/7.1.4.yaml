apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 7.1.4
    title: 7.1.4 Ensure permissions on /etc/group- are configured (Automated)
    description: |-
        The /etc/group- file contains a backup list of all the valid groups defined in the
        system.
    severity: high
spec:
    auditCommand: |-
        bash -c 'out="$(stat -Lc '\''Access: (%#a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)'\'' /etc/group- Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/ root) 2>/dev/null)"
        mode="$(printf '\''%s\n'\'' "$out" | sed -n '\''s|.*Access: (\([0-7]\{3,4\}\)/.*|\1|p'\'' | head -1)"
        if [ -n "$mode" ] && [ "$((8#$mode))" -le "$((8#0644))" ] && printf '\''%s\n'\'' "$out" | grep -qE '\''Uid: \(\s*0/'\''; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        It is critical to ensure that the /etc/group- file is protected from unauthorized access.
        Although it is protected by default, the file permissions could be changed either
        inadvertently or through malicious actions.
    fixGuidance: |-
        Run the following commands to remove excess permissions, set owner, and set group
        on /etc/group-:
        # chmod u-x,go-wx /etc/group-
        # chown root:root /etc/group-
        Default Value:
        Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/ root)
