apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 2.2.6
    title: 2.2.6 Ensure ftp client is not installed (Automated)
    description: |-
        tnftp an enhanced FTP client, is the user interface to the Internet standard File
        Transfer Protocol. The program allows a user to transfer files to and from a remote
        network site.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(dpkg-query -l | grep -E '\''ftp|tnftp'\'' &>/dev/null && echo "ftp is installed" 2>/dev/null)"
        if [ -z "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Unless there is a need to run the system using Internet standard File Transfer Protocol
        (for example, to allow anonymous downloads), it is recommended that the package be
        removed to reduce the potential attack surface.
    fixGuidance: |-
        Run the following commands to uninstall tnftp & ftp:
        # apt purge ftp
        # apt purge tnftp
