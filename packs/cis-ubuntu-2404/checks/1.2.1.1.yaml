apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.2.1.1
    title: 1.2.1.1 Ensure GPG keys are configured (Manual)
    description: |-
        Most package managers implement GPG key signing to verify package integrity during
        installation.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: |-
        It is important to ensure that updates are obtained from a valid source to protect against
        spoofing that could lead to the inadvertent installation of malware on the system.
    fixGuidance: Update your package manager GPG keys in accordance with site policy.
