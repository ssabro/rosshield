apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.1.2.5.4
    title: 1.1.2.5.4 Ensure noexec option set on /var/tmp partition (Automated)
    description: |-
        The noexec mount option specifies that the filesystem cannot contain executable
        binaries.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(findmnt -kn /var/tmp | grep -v noexec 2>/dev/null)"
        if [ -z "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Since the /var/tmp filesystem is only intended for temporary file storage, set this option
        to ensure that users cannot run executable binaries from /var/tmp.
    fixGuidance: |-
        - IF - a separate partition exists for /var/tmp.
        Edit the /etc/fstab file and add noexec to the fourth field (mounting options) for the
        /var/tmp partition.
        Example:
        <device> /var/tmp <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0
        0
        Run the following command to remount /var/tmp with the configured options:
        # mount -o remount /var/tmp
