apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.3.8
    title: 6.2.3.8 Ensure events that modify user/group information are (Automated)
    description: |-
        Record events affecting the modification of user or group information, including that of
        passwords and old passwords if in use.
        • /etc/group - system groups
        • /etc/passwd - system users
        • /etc/gshadow - encrypted password for each group
        • /etc/shadow - system user passwords
        • /etc/security/opasswd - storage of old passwords if the relevant PAM module
        is in use
        • /etc/nsswitch.conf - file configures how the system uses various databases
        and name resolution mechanisms
        • /etc/pam.conf - file determines the authentication services to be used, and the
        order in which the services are used.
        • /etc/pam.d - directory contains the PAM configuration files for each PAM-aware
        application.
        The parameters in this section will watch the files to see if they have been opened for
        write or have had attribute changes (e.g. permissions) and tag them with the identifier
        "identity" in the audit log file.
    severity: low
spec:
    auditCommand: "bash -c '#!/usr/bin/env bash\nset -u\nUID_MIN=${UID_MIN:-1000}\n\nneed_disk=(\n  \"-w /etc/group -p wa -F key=identity\"\n  \"-w /etc/passwd -p wa -F key=identity\"\n  \"-w /etc/gshadow -p wa -F key=identity\"\n  \"-w /etc/shadow -p wa -F key=identity\"\n  \"-w /etc/security/opasswd -p wa -F key=identity\"\n  \"-w /etc/nsswitch.conf -p wa -F key=identity\"\n  \"-w /etc/pam.conf -p wa -F key=identity\"\n  \"-w /etc/pam.d -p wa -F key=identity\"\n)\nneed_run=(\n  \"-w /etc/group -p wa -F key=identity\"\n  \"-w /etc/passwd -p wa -F key=identity\"\n  \"-w /etc/gshadow -p wa -F key=identity\"\n  \"-w /etc/shadow -p wa -F key=identity\"\n  \"-w /etc/security/opasswd -p wa -F key=identity\"\n  \"-w /etc/nsswitch.conf -p wa -F key=identity\"\n  \"-w /etc/pam.conf -p wa -F key=identity\"\n  \"-w /etc/pam.d -p wa -F key=identity\"\n)\n\nnormalize_fn() {\n  while IFS= read -r line; do\n    case \"$line\" in\n      *'\\'' -S '\\''*) \n        sycs=$(printf '\\''%s'\\'' \"$line\" | sed -nE '\\''s/.* -S ([a-zA-Z_][a-zA-Z0-9_,]*).*/\\1/p'\\'' | tr '\\'','\\'' '\\''\\n'\\'' | sort -u | paste -sd '\\'','\\'')\n        line=$(printf '\\''%s'\\'' \"$line\" | sed -E \"s/ -S [a-zA-Z_][a-zA-Z0-9_,]*/ -S $sycs/\")\n        ;;\n    esac\n    line=$(printf '\\''%s'\\'' \"$line\" | sed -E '\\''s/ -k ([!-~]+)/ -F key=\\1/g; s/ -F auid!=-?[0-9]+/ -F auid!=unset/g'\\'')\n    printf '\\''%s\\n'\\'' \"$line\"\n  done\n}\n\ndisk_out=$(cat /etc/audit/rules.d/*.rules 2>/dev/null | normalize_fn)\nrun_out=$(auditctl -l 2>/dev/null | normalize_fn)\nmissing=0\nfor r in \"${need_disk[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$disk_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-disk: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nfor r in \"${need_run[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$run_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-run: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nif [ \"$missing\" -eq 0 ]; then printf '\\''** PASS **\\n'\\''; else printf '\\''** FAIL **\\n'\\''; fi\n'"
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Unexpected changes to these files could be an indication that the system has been
        compromised and that an unauthorized user is attempting to hide their activities or
        compromise additional accounts.
    fixGuidance: |-
        Edit or create a file in the /etc/audit/rules.d/ directory, ending in .rules extension,
        with the relevant rules to monitor events that modify user/group information.
        Example:
        # printf "
        -w /etc/group -p wa -k identity
        -w /etc/passwd -p wa -k identity
        -w /etc/gshadow -p wa -k identity
        -w /etc/shadow -p wa -k identity
        -w /etc/security/opasswd -p wa -k identity
        -w /etc/nsswitch.conf -p wa -k identity
        -w /etc/pam.conf -p wa -k identity
        -w /etc/pam.d -p wa -k identity
        " >> /etc/audit/rules.d/50-identity.rules
        Merge and load the rules into active configuration:
        # augenrules --load
        Check if reboot is required.
        # if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then printf "Reboot
        required to load rules\n"; fi
