apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 5.3.1.2
    title: 5.3.1.2 Ensure libpam-modules is installed (Automated)
    description: Pluggable Authentication Modules for PAM
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: |-
        To ensure the system has full functionality and access to the PAM options covered by
        this Benchmark
    fixGuidance: |-
        - IF - the version of libpam-modules on the system is less than version 1.5.3-5:
        Run the following command to update to the latest version of PAM:
        # apt upgrade libpam-modules
        5.3.1.3 Ensure libpam-pwquality is installed (Automated)
