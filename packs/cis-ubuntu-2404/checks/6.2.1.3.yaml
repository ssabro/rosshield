apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.1.3
    title: 6.2.1.3 Ensure auditing for processes that start prior to auditd is (Automated)
    description: |-
        Configure grub2 so that processes that are capable of being audited can be audited
        even if they start up prior to auditd startup.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(find /boot -type f -name '\''grub.cfg'\'' -exec grep -Ph -- '\''^\h*linux'\'' {} + | grep -v '\''audit=1'\'' 2>/dev/null)"
        if [ -z "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Audit events need to be captured on processes that start up prior to auditd , so that
        potential malicious activity cannot go undetected.
    fixGuidance: |-
        Edit /etc/default/grub and add audit=1 to GRUB_CMDLINE_LINUX:
        Example:
        GRUB_CMDLINE_LINUX="audit=1"
        Run the following command to update the grub2 configuration:
        # update-grub
