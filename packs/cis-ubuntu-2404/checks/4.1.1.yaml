apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 4.1.1
    title: 4.1.1 Ensure a single firewall configuration utility is in use (Automated)
    description: |-
        In Linux security, employing a single, effective firewall configuration utility ensures that
        only legitimate traffic gets processed, reducing the system’s exposure to potential
        threats. The choice between ufw, nftables, and iptables depends on organizational
        needs.
        Note: iptables is being phased out, and support for iptables will be reduced over
        time. It is recommended to transition towards either nftables or ufw as the default
        firewall management tool.
    severity: medium
spec:
    auditCommand: |-
        bash -c '#!/usr/bin/env bash
        {
        active_firewall=() firewalls=("ufw" "nftables" "iptables")
        # Determine which firewall is in use
        for firewall in "${firewalls[@]}"; do
        case $firewall in
        nftables)
        cmd="nft" ;;
        *)
        cmd=$firewall ;;
        esac
        if command -v $cmd &> /dev/null && systemctl is-enabled --quiet
        $firewall && systemctl is-active --quiet $firewall; then
        active_firewall+=("$firewall")
        fi
        done
        # Display audit results
        if [ ${#active_firewall[@]} -eq 1 ]; then
        printf '\''%s\n'\'' "" "Audit Results:" " ** PASS **" " - A single firewall
        is in use follow the recommendation in ${active_firewall[0]} subsection ONLY"
        elif [ ${#active_firewall[@]} -eq 0 ]; then
        printf '\''%s\n'\'' "" " Audit Results:" " ** FAIL **" "- No firewall in use
        or unable to determine firewall status"
        else
        printf '\''%s\n'\'' "" " Audit Results:" " ** FAIL **" " - Multiple firewalls
        are in use: ${active_firewall[*]}"
        fi
        }'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Proper configuration of a single firewall utility minimizes cyber threats and protects
        services and data, while avoiding vulnerabilities like open ports or exposed services.
        Standardizing on a single tool simplifies management, reduces errors, and fortifies
        security across Linux systems.
        Impact:
        The use of more than one firewall utility may produce unexpected results.
    fixGuidance: |-
        Remediating to a single firewall configuration is a complex process and involves several
        steps. The following provides the basic steps to follow for a single firewall configuration:
        1. Determine which firewall utility best fits organizational needs
        2. Follow the recommendations in the subsequent subsection for the single firewall
        to be used
        Note: Review the firewall subsection overview for the selected firewall to be
        used, it contains a script to
        simplify this process.
        3. Return to this recommendation to ensure a single firewall configuration utility is in
        use
