apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 2.3.3.2
    title: 2.3.3.2 Ensure chrony is running as user _chrony (Automated)
    description: |-
        The chrony package is installed with a dedicated user account _chrony. This account
        is granted the access required by the chronyd service
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: The chronyd service should run with only the required privlidges
    fixGuidance: |-
        Add or edit the user line to /etc/chrony/chrony.conf or a file ending in .conf in
        /etc/chrony/conf.d/:
        user _chrony
        - OR -
        If another time synchronization service is in use on the system, run the following
        command to remove chrony from the system:
        # apt purge chrony
        # apt autoremove chrony
        Default Value:
        user _chrony
