apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.1.1
    title: 6.2.1.1 Ensure auditd packages are installed (Automated)
    description: |-
        auditd is the userspace component to the Linux Auditing System. It's responsible for
        writing audit records to the disk
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(dpkg-query -s audispd-plugins &>/dev/null && echo audispd-plugins is 2>/dev/null)"
        if [ -n "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        The capturing of system events provides system administrators with information to allow
        them to determine if unauthorized access to their system is occurring.
    fixGuidance: |-
        Run the following command to Install auditd and audispd-plugins
        # apt install auditd audispd-plugins
