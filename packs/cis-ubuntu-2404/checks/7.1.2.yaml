apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 7.1.2
    title: 7.1.2 Ensure permissions on /etc/passwd- are configured (Automated)
    description: The /etc/passwd- file contains backup user account information.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: |-
        It is critical to ensure that the /etc/passwd- file is protected from unauthorized access.
        Although it is protected by default, the file permissions could be changed either
        inadvertently or through malicious actions.
    fixGuidance: |-
        Run the following commands to remove excess permissions, set owner, and set group
        on /etc/passwd-:
        # chmod u-x,go-wx /etc/passwd-
        # chown root:root /etc/passwd-
        Default Value:
        Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: { 0/ root)
