apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 4.3.5
    title: 4.3.5 Ensure nftables base chains exist (Automated)
    description: |-
        Chains are containers for rules. They exist in two kinds, base chains and regular chains.
        A base chain is an entry point for packets from the networking stack, a regular chain
        may be used as jump target and is used for better rule organization.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'missing=0
        out_0=$(nft list ruleset | grep '\''hook input'\'' 2>/dev/null)
        printf '\''%s'\'' "$out_0" | grep -qF -- "type filter hook input priority 0;" || { printf '\''miss-0: expected %s\n'\'' "type filter hook input priority 0;"; missing=$((missing+1)); }
        out_1=$(nft list ruleset | grep '\''hook forward'\'' 2>/dev/null)
        printf '\''%s'\'' "$out_1" | grep -qF -- "type filter hook forward priority 0;" || { printf '\''miss-1: expected %s\n'\'' "type filter hook forward priority 0;"; missing=$((missing+1)); }
        out_2=$(nft list ruleset | grep '\''hook output'\'' 2>/dev/null)
        printf '\''%s'\'' "$out_2" | grep -qF -- "type filter hook output priority 0;" || { printf '\''miss-2: expected %s\n'\'' "type filter hook output priority 0;"; missing=$((missing+1)); }
        if [ "$missing" -eq 0 ]; then printf '\''** PASS **\n'\''; else printf '\''** FAIL **\n'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        If a base chain doesn't exist with a hook for input, forward, and delete, packets that
        would flow through those chains will not be touched by nftables.
        Impact:
        If configuring nftables over ssh, creating a base chain with a policy of drop will
        cause loss of connectivity.
        Ensure that a rule allowing ssh has been added to the base chain prior to setting the
        base chain's policy to drop
    fixGuidance: |-
        Run the following command to create the base chains:
        # nft create chain inet <table name> <base chain name> { type filter hook
        <(input|forward|output)> priority 0 \; }
        Example:
        # nft create chain inet filter input { type filter hook input priority 0 \; }
        # nft create chain inet filter forward { type filter hook forward priority 0
        \; }
        # nft create chain inet filter output { type filter hook output priority 0 \;
        }
