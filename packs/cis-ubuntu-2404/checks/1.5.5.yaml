apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.5.5
    title: 1.5.5 Ensure Automatic Error Reporting is not enabled (Automated)
    description: |-
        The Apport Error Reporting Service automatically generates crash reports for
        debugging
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(systemctl is-active apport.service | grep '\''^active'\'' 2>/dev/null)"
        if [ -z "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Apport collects potentially sensitive data, such as core dumps, stack traces, and log
        files. They can contain passwords, credit card numbers, serial numbers, and other
        private material.
    fixGuidance: |-
        Edit /etc/default/apport and add or edit the enabled parameter to equal 0:
        enabled=0
        Run the following commands to stop and mask the apport service
        # systemctl stop apport.service
        # systemctl mask apport.service
        - OR -
        Run the following command to remove the apport package:
        # apt purge apport
        Default Value:
        enabled=1
