apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.2.1
    title: 6.2.2.1 Ensure audit log storage size is configured (Automated)
    description: |-
        Configure the maximum size of the audit log file. Once the log reaches the maximum
        size, it will be rotated and a new log file will be started.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(grep -Po -- '\''^\h*max_log_file\h*=\h*\d+\b'\'' /etc/audit/auditd.conf 2>/dev/null)"
        if [ -n "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        It is important that an appropriate size is determined for log files so that they do not
        impact the system and audit data is not lost.
    fixGuidance: |-
        Set the following parameter in /etc/audit/auditd.conf in accordance with site
        policy:
        max_log_file = <MB>
        Default Value:
        max_log_file = 8
