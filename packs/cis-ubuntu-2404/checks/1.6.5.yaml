apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.6.5
    title: 1.6.5 Ensure access to /etc/issue is configured (Automated)
    description: |-
        The contents of the /etc/issue file are displayed to users prior to login for local
        terminals.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(stat -Lc '\''Access: (%#a/%A) Uid: ( %u/ %U) Gid: { %g/ %G)'\'' /etc/issue 2>/dev/null)"
        mode="$(printf '\''%s\n'\'' "$out" | sed -n '\''s|.*Access: (\([0-7]\{3,4\}\)/.*|\1|p'\'' | head -1)"
        if [ -n "$mode" ] && [ "$((8#$mode))" -le "$((8#0644))" ] && printf '\''%s\n'\'' "$out" | grep -qE '\''Uid: \(\s*0/'\''; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        - IF - the /etc/issue file does not have the correct access configured, it could be
        modified by unauthorized users with incorrect or misleading information.
    fixGuidance: |-
        Run the following commands to set mode, owner, and group on /etc/issue:
        # chown root:root $(readlink -e /etc/issue)
        # chmod u-x,go-wx $(readlink -e /etc/issue)
        Default Value:
        Access: (0644/-rw-r--r--) Uid: ( 0/ root) Gid: ( 0/ root)
