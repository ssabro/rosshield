apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.3.18
    title: 6.2.3.18 Ensure successful and unsuccessful attempts to use the (Automated)
    description: |-
        The operating system must generate audit records for successful/unsuccessful uses of
        the usermod command.
    severity: low
spec:
    auditCommand: "bash -c '#!/usr/bin/env bash\nset -u\nUID_MIN=${UID_MIN:-1000}\n\nneed_disk=(\n  \"-a always,exit -F path=/usr/sbin/usermod -F perm=x -F auid>=__UID_MIN__ -F\"\n)\nneed_run=(\n  \"-a always,exit -S all -F path=/usr/sbin/usermod -F perm=x -F auid>=__UID_MIN__ -F\"\n)\n\nnormalize_fn() {\n  while IFS= read -r line; do\n    case \"$line\" in\n      *'\\'' -S '\\''*) \n        sycs=$(printf '\\''%s'\\'' \"$line\" | sed -nE '\\''s/.* -S ([a-zA-Z_][a-zA-Z0-9_,]*).*/\\1/p'\\'' | tr '\\'','\\'' '\\''\\n'\\'' | sort -u | paste -sd '\\'','\\'')\n        line=$(printf '\\''%s'\\'' \"$line\" | sed -E \"s/ -S [a-zA-Z_][a-zA-Z0-9_,]*/ -S $sycs/\")\n        ;;\n    esac\n    line=$(printf '\\''%s'\\'' \"$line\" | sed -E '\\''s/ -k ([!-~]+)/ -F key=\\1/g; s/ -F auid!=-?[0-9]+/ -F auid!=unset/g'\\'')\n    printf '\\''%s\\n'\\'' \"$line\"\n  done\n}\n\ndisk_out=$(cat /etc/audit/rules.d/*.rules 2>/dev/null | normalize_fn)\nrun_out=$(auditctl -l 2>/dev/null | normalize_fn)\nmissing=0\nfor r in \"${need_disk[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$disk_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-disk: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nfor r in \"${need_run[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$run_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-run: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nif [ \"$missing\" -eq 0 ]; then printf '\\''** PASS **\\n'\\''; else printf '\\''** FAIL **\\n'\\''; fi\n'"
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        The usermod command modifies the system account files to reflect the changes that are
        specified on the command line. Without generating audit records that are specific to the
        security and mission needs of the organization, it would be difficult to establish,
        correlate, and investigate the events relating to an incident or identify those responsible
        for one.
        Audit records can be generated from various components within the information system
        (e.g., module or policy filter).
    fixGuidance: |-
        Create audit rules
        Edit or create a file in the /etc/audit/rules.d/ directory, ending in .rules extension,
        with the relevant rules to monitor successful and unsuccessful attempts to use the
        usermod command.
        Example:
        # {
        UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
        [ -n "${UID_MIN}" ] && printf "
        -a always,exit -F path=/usr/sbin/usermod -F perm=x -F auid>=${UID_MIN} -F
        auid!=unset -k usermod
        " >> /etc/audit/rules.d/50-usermod.rules || printf "ERROR: Variable 'UID_MIN'
        is unset.\n"
        }
        Load audit rules
        Merge and load the rules into active configuration:
        # augenrules --load
        Check if reboot is required.
        # if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then printf "Reboot
        required to load rules\n"; fi
