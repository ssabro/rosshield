apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.3.14
    title: 6.2.3.14 Ensure events that modify the system's Mandatory (Automated)
    description: |-
        Monitor AppArmor, an implementation of mandatory access controls. The parameters
        below monitor any write access (potential additional, deletion or modification of files in
        the directory) or attribute changes to the /etc/apparmor/ and /etc/apparmor.d/
        directories.
        Note: If a different Mandatory Access Control method is used, changes to the
        corresponding directories should be audited.
    severity: low
spec:
    auditCommand: "bash -c '#!/usr/bin/env bash\nset -u\nUID_MIN=${UID_MIN:-1000}\n\nneed_disk=(\n  \"-w /etc/apparmor/ -p wa -F key=MAC-policy\"\n  \"-w /etc/apparmor.d/ -p wa -F key=MAC-policy\"\n)\nneed_run=(\n  \"-w /etc/apparmor/ -p wa -F key=MAC-policy\"\n  \"-w /etc/apparmor.d/ -p wa -F key=MAC-policy\"\n)\n\nnormalize_fn() {\n  while IFS= read -r line; do\n    case \"$line\" in\n      *'\\'' -S '\\''*) \n        sycs=$(printf '\\''%s'\\'' \"$line\" | sed -nE '\\''s/.* -S ([a-zA-Z_][a-zA-Z0-9_,]*).*/\\1/p'\\'' | tr '\\'','\\'' '\\''\\n'\\'' | sort -u | paste -sd '\\'','\\'')\n        line=$(printf '\\''%s'\\'' \"$line\" | sed -E \"s/ -S [a-zA-Z_][a-zA-Z0-9_,]*/ -S $sycs/\")\n        ;;\n    esac\n    line=$(printf '\\''%s'\\'' \"$line\" | sed -E '\\''s/ -k ([!-~]+)/ -F key=\\1/g; s/ -F auid!=-?[0-9]+/ -F auid!=unset/g'\\'')\n    printf '\\''%s\\n'\\'' \"$line\"\n  done\n}\n\ndisk_out=$(cat /etc/audit/rules.d/*.rules 2>/dev/null | normalize_fn)\nrun_out=$(auditctl -l 2>/dev/null | normalize_fn)\nmissing=0\nfor r in \"${need_disk[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$disk_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-disk: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nfor r in \"${need_run[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$run_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-run: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nif [ \"$missing\" -eq 0 ]; then printf '\\''** PASS **\\n'\\''; else printf '\\''** FAIL **\\n'\\''; fi\n'"
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Changes to files in the /etc/apparmor/ and /etc/apparmor.d/ directories could
        indicate that an unauthorized user is attempting to modify access controls and change
        security contexts, leading to a compromise of the system.
    fixGuidance: |-
        Edit or create a file in the /etc/audit/rules.d/ directory, ending in .rules extension,
        with the relevant rules to monitor events that modify the system's Mandatory Access
        Controls.
        Example:
        # printf "
        -w /etc/apparmor/ -p wa -k MAC-policy
        -w /etc/apparmor.d/ -p wa -k MAC-policy
        " >> /etc/audit/rules.d/50-MAC-policy.rules
        Merge and load the rules into active configuration:
        # augenrules --load
        Check if reboot is required.
        # if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then printf "Reboot
        required to load rules\n"; fi
