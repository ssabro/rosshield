apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.3.11
    title: 6.2.3.11 Ensure session initiation information is collected (Automated)
    description: |-
        Monitor session initiation events. The parameters in this section track changes to the
        files associated with session events.
        • /var/run/utmp - tracks all currently logged in users.
        • /var/log/wtmp - file tracks logins, logouts, shutdown, and reboot events.
        • /var/log/btmp - keeps track of failed login attempts and can be read by
        entering the command /usr/bin/last -f /var/log/btmp.
        All audit records will be tagged with the identifier "session."
    severity: low
spec:
    auditCommand: "bash -c '#!/usr/bin/env bash\nset -u\nUID_MIN=${UID_MIN:-1000}\n\nneed_disk=(\n  \"-w /var/run/utmp -p wa -F key=session\"\n  \"-w /var/log/wtmp -p wa -F key=session\"\n  \"-w /var/log/btmp -p wa -F key=session\"\n)\nneed_run=(\n  \"-w /var/run/utmp -p wa -F key=session\"\n  \"-w /var/log/wtmp -p wa -F key=session\"\n  \"-w /var/log/btmp -p wa -F key=session\"\n)\n\nnormalize_fn() {\n  while IFS= read -r line; do\n    case \"$line\" in\n      *'\\'' -S '\\''*) \n        sycs=$(printf '\\''%s'\\'' \"$line\" | sed -nE '\\''s/.* -S ([a-zA-Z_][a-zA-Z0-9_,]*).*/\\1/p'\\'' | tr '\\'','\\'' '\\''\\n'\\'' | sort -u | paste -sd '\\'','\\'')\n        line=$(printf '\\''%s'\\'' \"$line\" | sed -E \"s/ -S [a-zA-Z_][a-zA-Z0-9_,]*/ -S $sycs/\")\n        ;;\n    esac\n    line=$(printf '\\''%s'\\'' \"$line\" | sed -E '\\''s/ -k ([!-~]+)/ -F key=\\1/g; s/ -F auid!=-?[0-9]+/ -F auid!=unset/g'\\'')\n    printf '\\''%s\\n'\\'' \"$line\"\n  done\n}\n\ndisk_out=$(cat /etc/audit/rules.d/*.rules 2>/dev/null | normalize_fn)\nrun_out=$(auditctl -l 2>/dev/null | normalize_fn)\nmissing=0\nfor r in \"${need_disk[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$disk_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-disk: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nfor r in \"${need_run[@]}\"; do\n  r_subst=${r//__UID_MIN__/$UID_MIN}\n  printf '\\''%s\\n'\\'' \"$run_out\" | grep -qxF -- \"$r_subst\" || { printf '\\''miss-run: %s\\n'\\'' \"$r_subst\"; missing=$((missing+1)); }\ndone\nif [ \"$missing\" -eq 0 ]; then printf '\\''** PASS **\\n'\\''; else printf '\\''** FAIL **\\n'\\''; fi\n'"
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Monitoring these files for changes could alert a system administrator to logins occurring
        at unusual hours, which could indicate intruder activity (i.e. a user logging in at a time
        when they do not normally log in).
    fixGuidance: |-
        Edit or create a file in the /etc/audit/rules.d/ directory, ending in .rules extension,
        with the relevant rules to monitor session initiation information.
        Example:
        # printf "
        -w /var/run/utmp -p wa -k session
        -w /var/log/wtmp -p wa -k session
        -w /var/log/btmp -p wa -k session
        " >> /etc/audit/rules.d/50-session.rules
        Merge and load the rules into active configuration:
        # augenrules --load
        Check if reboot is required.
        # if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then printf "Reboot
        required to load rules\n"; fi
