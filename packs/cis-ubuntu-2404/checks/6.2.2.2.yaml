apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.2.2.2
    title: 6.2.2.2 Ensure audit logs are not automatically deleted (Automated)
    description: |-
        The max_log_file_action setting determines how to handle the audit log file reaching
        the max file size. A value of keep_logs will rotate the logs but never delete old logs.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(grep max_log_file_action /etc/audit/auditd.conf 2>/dev/null)"
        if [ -n "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        In high security contexts, the benefits of maintaining a long audit history exceed the cost
        of storing the audit history.
    fixGuidance: |-
        Set the following parameter in /etc/audit/auditd.conf:
        max_log_file_action = keep_logs
