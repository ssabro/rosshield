apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.7.1
    title: 1.7.1 Ensure GDM is removed (Automated)
    description: |-
        The GNOME Display Manager (GDM) is a program that manages graphical display
        servers and handles graphical user logins.
    severity: low
spec:
    auditCommand: |-
        bash -c 'out=$(dpkg-query -W -f='\''${binary:Package}\t${Status}\t${db:Status-Status}\n'\'' gdm3 2>/dev/null)
        missing=0
        printf '\''%s'\'' "$out" | grep -qF -- "gdm3 unknown ok not-installed not-installed" || { printf '\''miss-0: %s\n'\'' "gdm3 unknown ok not-installed not-installed"; missing=$((missing+1)); }
        if [ "$missing" -eq 0 ]; then printf '\''** PASS **\n'\''; else printf '\''** FAIL **\n'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        If a Graphical User Interface (GUI) is not required, it should be removed to reduce the
        attack surface of the system.
        Impact:
        Removing the GNOME Display manager will remove the Graphical User Interface (GUI)
        from the system.
    fixGuidance: |-
        Run the following commands to uninstall gdm3 and remove unused dependencies:
        # apt purge gdm3
        # apt autoremove gdm3
