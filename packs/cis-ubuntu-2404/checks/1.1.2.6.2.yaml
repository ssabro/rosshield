apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.1.2.6.2
    title: 1.1.2.6.2 Ensure nodev option set on /var/log partition (Automated)
    description: The nodev mount option specifies that the filesystem cannot contain special devices.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(findmnt -kn /var/log | grep -v nodev 2>/dev/null)"
        if [ -z "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Since the /var/log filesystem is not intended to support devices, set this option to
        ensure that users cannot create a block or character special devices in /var/log.
    fixGuidance: |-
        - IF - a separate partition exists for /var/log.
        Edit the /etc/fstab file and add nodev to the fourth field (mounting options) for the
        /var/log partition.
        Example:
        <device> /var/log <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0
        0
        Run the following command to remount /var/log with the configured options:
        # mount -o remount /var/log
