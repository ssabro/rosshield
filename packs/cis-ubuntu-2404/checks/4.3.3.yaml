apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 4.3.3
    title: 4.3.3 Ensure iptables are flushed with nftables (Manual)
    description: nftables is a replacement for iptables, ip6tables, ebtables and arptables
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(ip6tables -L 2>/dev/null)"
        if [ -z "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        It is possible to mix iptables and nftables. However, this increases complexity and also
        the chance to introduce errors. For simplicity flush out all iptables rules, and ensure it is
        not loaded
    fixGuidance: |-
        Run the following commands to flush iptables:
        For iptables:
        # iptables -F
        For ip6tables:
        # ip6tables -F
