apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 6.1.3.2
    title: 6.1.3.2 Ensure rsyslog service is enabled and active (Automated)
    description: Once the rsyslog package is installed, ensure that the service is enabled.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(systemctl is-active rsyslog.service 2>/dev/null)"
        if [ -n "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        If the rsyslog service is not enabled to start on boot, the system will not capture
        logging events.
    fixGuidance: |-
        - IF - rsyslog is being used for logging on the system:
        Run the following commands to unmask, enable, and start rsyslog.service:
        # systemctl unmask rsyslog.service
        # systemctl enable rsyslog.service
        # systemctl start rsyslog.service
