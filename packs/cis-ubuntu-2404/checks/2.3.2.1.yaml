apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 2.3.2.1
    title: 2.3.2.1 Ensure systemd-timesyncd configured with authorized (Automated)
    description: |-
        NTP=
        • A space-separated list of NTP server host names or IP addresses. During
        runtime this list is combined with any per-interface NTP servers acquired from
        systemd-networkd.service(8). systemd-timesyncd will contact all configured
        system or per-interface servers in turn, until one responds. When the empty
        string is assigned, the list of NTP servers is reset, and all prior assignments will
        have no effect. This setting defaults to an empty list.
        FallbackNTP=
        • A space-separated list of NTP server host names or IP addresses to be used as
        the fallback NTP servers. Any per-interface NTP servers obtained from systemd-
        networkd.service(8) take precedence over this setting, as do any servers set via
        NTP= above. This setting is hence only relevant if no other NTP server
        information is known. When the empty string is assigned, the list of NTP servers
        is reset, and all prior assignments will have no effect. If this option is not given, a
        compiled-in list of NTP servers is used.
    severity: medium
spec:
    auditCommand: |-
        bash -c '#!/usr/bin/env bash
        {
        a_output=(); a_output2=(); a_parlist=("NTP=[^#\n\r]+" "FallbackNTP=[^#\n\r]+")
        l_systemd_config_file="/etc/systemd/timesyncd.conf" # Main systemd configuration file
        f_config_file_parameter_chk()
        {
        unset A_out; declare -A A_out # Check config file(s) setting
        while read -r l_out; do
        if [ -n "$l_out" ]; then
        if [[ $l_out =~ ^\s*# ]]; then
        l_file="${l_out//# /}"
        else
        l_systemd_parameter="$(awk -F= '\''{print $1}'\'' <<< "$l_out" | xargs)"
        grep -Piq -- "^\h*$l_systemd_parameter_name\b" <<< "$l_systemd_parameter" &&
        A_out+=(["$l_systemd_parameter"]="$l_file")
        fi
        fi
        done < <("$l_systemdanalyze" cat-config "$l_systemd_config_file" | grep -Pio
        '\''^\h*([^#\n\r]+|#\h*\/[^#\n\r\h]+\.conf\b)'\'')
        if (( ${#A_out[@]} > 0 )); then # Assess output from files and generate output
        while IFS="=" read -r l_systemd_file_parameter_name l_systemd_file_parameter_value; do
        l_systemd_file_parameter_name="${l_systemd_file_parameter_name// /}"
        l_systemd_file_parameter_value="${l_systemd_file_parameter_value// /}"
        if grep -Piq "\b$l_systemd_parameter_value\b" <<< "$l_systemd_file_parameter_value";
        then
        a_output+=(" - \"$l_systemd_parameter_name\" is correctly set to
        \"$l_systemd_file_parameter_value\"" \
        " in \"$(printf '\''%s'\'' "${A_out[@]}")\"")
        else
        a_output2+=(" - \"$l_systemd_parameter_name\" is incorrectly set to
        \"$l_systemd_file_parameter_value\"" \
        " in \"$(printf '\''%s'\'' "${A_out[@]}")\" and should have a value matching:
        \"$l_value_out\"")
        fi
        done < <(grep -Pio -- "^\h*$l_systemd_parameter_name\h*=\h*\H+" "${A_out[@]}")
        else
        a_output2+=(" - \"$l_systemd_parameter_name\" is not set in an included file" \
        " *** Note: \"$l_systemd_parameter_name\" May be set in a file that'\''s ignored by load
        procedure ***")
        fi
        }
        l_systemdanalyze="$(readlink -f /bin/systemd-analyze)"
        while IFS="=" read -r l_systemd_parameter_name l_systemd_parameter_value; do # Assess and
        check parameters
        l_systemd_parameter_name="${l_systemd_parameter_name// /}";
        l_systemd_parameter_value="${l_systemd_parameter_value// /}"
        l_value_out="${l_systemd_parameter_value//-/ through }"; l_value_out="${l_value_out//|/ or
        }"
        l_value_out="$(tr -d '\''(){}'\'' <<< "$l_value_out")"
        f_config_file_parameter_chk
        done < <(printf '\''%s\n'\'' "${a_parlist[@]}")
        if [ "${#a_output2[@]}" -le 0 ]; then
        printf '\''%s\n'\'' "" "- Audit Result:" " ** PASS **" "${a_output[@]}" ""
        else
        printf '\''%s\n'\'' "" "- Audit Result:" " ** FAIL **" " - Reason(s) for audit failure:"
        "${a_output2[@]}"
        [ "${#a_output[@]}" -gt 0 ] && printf '\''%s\n'\'' "" "- Correctly set:" "${a_output[@]}" ""
        fi
        }
        Example output:
        - Audit Result:
        ** PASS **
        - "NTP" is correctly set to "time.nist.gov"
        in "/etc/systemd/timesyncd.conf.d/60-timesyncd.conf"
        - "FallbackNTP" is correctly set to "time-a-g.nist.gov"
        in "/etc/systemd/timesyncd.conf.d/60-timesyncd.conf"
        Note: Please ensure the output for NTP and/or FallbackNTP is in accordance with local
        site policy. The timeservers in the example output are provided as an example of
        possible timeservers and they may not follow local site policy.'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Time synchronization is important to support time sensitive security mechanisms and to
        ensure log files have consistent time records across the enterprise to aid in forensic
        investigations
    fixGuidance: |-
        Set NTP and/or FallbackNPT parameters to local site approved authoritative time
        server(s) in /etc/systemd/timesyncd.conf or a file in
        /etc/systemd/timesyncd.conf.d/ ending in .conf in the [Time] section:
        Example file:
        [Time]
        NTP=time.nist.gov # Uses the generic name for NIST's time servers
        FallbackNTP=time-a-g.nist.gov time-b-g.nist.gov time-c-g.nist.gov # Space
        separated list of NIST time servers
        Example script to create systemd drop-in configuration file:
        #!/usr/bin/env bash
        {
        a_settings=("NTP=time.nist.gov" "FallbackNTP=time-a-g.nist.gov time-b-
        g.nist.gov time-c-g.nist.gov")
        [ ! -d /etc/systemd/timesyncd.conf.d/ ] && mkdir
        /etc/systemd/timesyncd.conf.d/
        if grep -Psq -- '^\h*\[Time\]' /etc/systemd/timesyncd.conf.d/60-
        timesyncd.conf; then
        printf '%s\n' "" "${a_settings[@]}" >>
        /etc/systemd/timesyncd.conf.d/60-timesyncd.conf
        else
        printf '%s\n' "" "[Time]" "${a_settings[@]}" >>
        /etc/systemd/timesyncd.conf.d/60-timesyncd.conf
        fi
        }
        Note: If this setting appears in a canonically later file, or later in the same file, the
        setting will be overwritten
        Run to following command to update the parameters in the service:
        # systemctl reload-or-restart systemd-journald
        Default Value:
        #NTP=
        #FallbackNTP=
