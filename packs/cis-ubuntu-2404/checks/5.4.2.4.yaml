apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 5.4.2.4
    title: 5.4.2.4 Ensure root account access is controlled (Automated)
    description: |-
        There are a number of methods to access the root account directly. Without a password
        set any user would be able to gain access and thus control over the entire system.
    severity: high
spec:
    auditCommand: |-
        bash -c 'out=$(passwd -S root | awk '\''$2 ~ /^(P|L)/ {print "User: \"" $1 "\" Password is status: " $2}'\'' 2>/dev/null)
        found=0
        for token in "User: \"root\" Password is status: P" "User: \"root\" Password is status: L"; do
          printf '\''%s'\'' "$out" | grep -qF -- "$token" && { found=1; break; }
        done
        if [ "$found" -eq 1 ]; then printf '\''** PASS **\n'\''; else printf '\''fail: %s\n'\'' "$out"; printf '\''** FAIL **\n'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Access to root should be secured at all times.
        Impact:
        If there are any automated processes that relies on access to the root account without
        authentication, they will fail after remediation.
    fixGuidance: |-
        Run the following command to set a password for the root user:
        # passwd root
        - OR -
        Run the following command to lock the root user account:
        # usermod -L root
