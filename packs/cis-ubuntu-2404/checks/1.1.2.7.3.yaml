apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: 1.1.2.7.3
    title: 1.1.2.7.3 Ensure nosuid option set on /var/log/audit partition (Automated)
    description: The nosuid mount option specifies that the filesystem cannot contain setuid files.
    severity: medium
spec:
    auditCommand: |-
        bash -c 'out="$(findmnt -kn /var/log/audit | grep -v nosuid 2>/dev/null)"
        if [ -z "$out" ]; then
          printf '\''%s\n'\'' "** PASS **"
        else
          printf '\''%s\n'\'' "** FAIL **"
        fi
        '
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: |-
        Since the /var/log/audit filesystem is only intended for variable files such as logs,
        set this option to ensure that users cannot create setuid files in /var/log/audit.
    fixGuidance: |-
        - IF - a separate partition exists for /var/log/audit.
        Edit the /etc/fstab file and add nosuid to the fourth field (mounting options) for the
        /var/log/audit partition.
        Example:
        <device> /var/log/audit <fstype>
        defaults,rw,nosuid,nodev,noexec,relatime 0 0
        Run the following command to remount /var/log/audit with the configured options:
        # mount -o remount /var/log/audit
