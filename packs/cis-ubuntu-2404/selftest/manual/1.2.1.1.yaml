              stdout: "/etc/apt/trusted.gpg.d/ubuntu-keyring-2018-archive.gpg\npub   rsa4096 2018-09-17 [SC]"
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
