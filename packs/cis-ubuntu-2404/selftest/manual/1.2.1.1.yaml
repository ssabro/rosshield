apiVersion: rosshield.io/v1
kind: SelfTest
metadata:
    checkId: 1.2.1.1
spec:
    cases:
        - name: "default review verdict (no audit cmd execution)"
          input:
              stdout: ""
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
