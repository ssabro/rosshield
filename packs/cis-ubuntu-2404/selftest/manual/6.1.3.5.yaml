apiVersion: rosshield.io/v1
kind: SelfTest
metadata:
    checkId: 6.1.3.5
spec:
    cases:
        - name: "SKIP — env var 미정의 (default verdict = review)"
          input:
              stdout: "** INDETERMINATE ** customer policy 미정의 (env ROSSHIELD_CIS_6_1_3_5_POLICY 필요)"
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
        - name: "PASS marker — 필수 logging 라인 모두 매칭 (audit input ignored — verdict still review)"
          input:
              stdout: "** PASS ** rsyslog 필수 라인 모두 매칭 (auth.*,*.crit)"
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
        - name: "FAIL marker — 필수 라인 누락 (audit input ignored — verdict still review)"
          input:
              stdout: "** FAIL ** rsyslog 누락 라인: auth.* *.crit"
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
