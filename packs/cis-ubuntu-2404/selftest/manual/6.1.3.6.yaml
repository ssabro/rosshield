apiVersion: rosshield.io/v1
kind: SelfTest
metadata:
    checkId: 6.1.3.6
spec:
    cases:
        - name: "SKIP — env var 미정의 (default verdict = review)"
          input:
              stdout: "** INDETERMINATE ** customer policy 미정의 (env ROSSHIELD_CIS_6_1_3_6_POLICY 필요)"
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
        - name: "PASS marker — forward 규칙 활성 (audit input ignored — verdict still review)"
          input:
              stdout: "** PASS ** rsyslog forward to loghost.example.com:514 활성"
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
        - name: "FAIL marker — forward 규칙 부재 (audit input ignored — verdict still review)"
          input:
              stdout: "** FAIL ** rsyslog forward 규칙 부재 또는 host=loghost.example.com 불일치"
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
