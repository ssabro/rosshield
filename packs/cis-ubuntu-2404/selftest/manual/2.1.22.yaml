apiVersion: rosshield.io/v1
kind: SelfTest
metadata:
    checkId: 2.1.22
spec:
    cases:
        - name: "default review verdict (no audit cmd execution)"
          input:
              stdout: ""
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
        - name: "audit input ignored — verdict still review"
          input:
              stdout: "tcp   LISTEN 0  128  0.0.0.0:22   0.0.0.0:*  users:((\"sshd\",pid=1234,fd=3))"
              stderr: ""
              exitCode: 0
          expectedOutcome: INDETERMINATE
