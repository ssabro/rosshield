apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_007
    title: SSH 유휴 타임아웃 간격 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, ClientAliveInterval 및 ClientAliveCountMax 설정을 통해 유휴 SSH 세션이 자동으로 종료되도록 구성되어야 한다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 유휴 상태의 SSH 세션은 세션 하이재킹 등의 공격에 악용될 수 있다. CIS 벤치마크에서는 일정 시간 동안 응답이 없는 세션을 종료하여 원격 접근 위험을 줄일 것을 권고한다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일을 편집하여 ClientAliveInterval 및 ClientAliveCountMax 값을 설정한다.

        ClientAliveInterval <n>
        ClientAliveCountMax <n>

        - ClientAliveInterval: 서버가 클라이언트에게 보내는 keepalive 메시지 간격(초). 사이트 정책에 맞게 0보다 큰 값 설정
        - ClientAliveCountMax: 응답 없이 허용되는 최대 keepalive 메시지 수. 사이트 정책에 맞게 0보다 큰 값 설정

        예: ClientAliveInterval 15, ClientAliveCountMax 3 → 45초(15*3) 후 비활성 세션 종료
