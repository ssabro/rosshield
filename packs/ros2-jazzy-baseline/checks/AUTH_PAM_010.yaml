apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_010
    title: root 계정 인증 실패 잠금 적용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 root 계정에도 인증 실패 잠금 정책이 적용되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Pi '\''^\s*(even_deny_root|root_unlock_time\s*=\s*\d+)\b'\'' /etc/security/faillock.conf 2>/dev/null 2>&1)"; C2_OUT="$(grep -Pi '\''^\s*root_unlock_time\s*=\s*([1-9]|[1-5][0-9])\b'\'' /etc/security/faillock.conf 2>/dev/null || echo '\''PASS'\'' 2>&1)"; C3_OUT="$(grep -Pi '\''^\s*auth\s+([^#]*\s+)pam_faillock\.so\s+([^#]*\s+)?root_unlock_time\s*=\s*([1-9]|[1-5][0-9])\b'\'' /etc/pam.d/common-auth 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; } && { [ "$C3_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: root 계정은 공격자의 주요 목표이므로 동일한 잠금 정책을 적용하여 무차별 대입 공격을 방지해야 한다.
    fixGuidance: |-
        /etc/security/faillock.conf 파일에 even_deny_root를 추가한다.

        even_deny_root

        또는 root 계정에 별도 잠금 해제 시간을 설정하려면:
        root_unlock_time = 60

        pam-auth-update 프로필에서 even_deny_root, root_unlock_time 인자가 있다면 제거한다.
