apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_ACCT_002
    title: 비밀번호 최소 사용 기간 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호 최소 사용 기간(PASS_MIN_DAYS)이 1일 이상으로 설정되어야 한다.
    severity: medium
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(grep -Pi ''\''''^\s*PASS_MIN_DAYS\s+[1-9][0-9]*\s*$''\'''' /etc/login.defs 2>/dev/null 2>&1)"; C2_OUT="$(awk -F: ''\''''($2~/^\$.+\$/) {if($4 < 1)print $1}''\'''' /etc/shadow 2>/dev/null || echo ''\''''PASS''\'''' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = ''\''''''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 비밀번호 최소 사용 기간을 설정하면 사용자가 비밀번호를 여러 번 빠르게 변경하여 이전 비밀번호로 되돌리는 것을 방지할 수 있다.
    fixGuidance: |-
        /etc/login.defs에서 PASS_MIN_DAYS를 1 이상으로 설정한다.

        sed -i 's/^PASS_MIN_DAYS.*/PASS_MIN_DAYS 1/' /etc/login.defs

        기존 사용자의 설정을 변경한다:
        chage --mindays 1 <사용자>

        또는 모든 사용자 일괄 변경:
        awk -F: '($2~/^\$.+\$/) {if($4 < 1)system("chage --mindays 1 " $1)}' /etc/shadow
