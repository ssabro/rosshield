apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_005
    title: systemd-journal-remote 패키지 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 journald를 로깅에 사용하는 경우, systemd-journal-remote 패키지가 설치되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s systemd-journal-remote &>/dev/null && echo '\''INSTALLED'\'' || echo '\''NOT_INSTALLED'\'' 2>&1)"; if { [ "$C1_OUT" = '\''INSTALLED'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: systemd-journal-remote는 journald 로그를 원격 서버로 전송하거나 원격 서버에서 로그를 수신하는 데 필요한 패키지이다. 중앙 로그 관리를 위해 필요하다.
    fixGuidance: |-
        systemd-journal-remote 패키지를 설치한다:
        apt install systemd-journal-remote
