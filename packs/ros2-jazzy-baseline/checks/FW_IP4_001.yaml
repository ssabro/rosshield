apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_IP4_001
    title: iptables 기본 차단 정책 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 iptables를 방화벽 관리 도구로 사용하는 경우, 입력(INPUT), 출력(OUTPUT), 전달(FORWARD) 체인의 기본 정책은 차단(deny)으로 설정되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(fail=0; iptables -L INPUT 2>/dev/null | grep -q '\''policy DROP\|policy REJECT'\'' || fail=1; iptables -L OUTPUT 2>/dev/null | grep -q '\''policy DROP\|policy REJECT'\'' || fail=1; iptables -L FORWARD 2>/dev/null | grep -q '\''policy DROP\|policy REJECT'\'' || fail=1; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 기본 허용 정책은 방화벽 규칙에 정의되지 않은 포트나 서비스가 외부에 노출될 수 있는 위험을 증가시킨다. CIS 벤치마크에서는 네트워크 접근 통제를 강화하기 위해 기본 차단 정책을 적용하고, 필요한 트래픽만 예외적으로 허용할 것을 권고하고 있다.
    fixGuidance: |-
        iptables 기본 정책을 DROP으로 설정한다.

        iptables -P INPUT DROP
        iptables -P OUTPUT DROP
        iptables -P FORWARD DROP
