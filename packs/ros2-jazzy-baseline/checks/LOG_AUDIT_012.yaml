apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_012
    title: 시스템 날짜·시간 변경 이벤트 감사 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 시스템 날짜 및 시간 변경을 감사하는 규칙이 설정되어야 한다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 시간 변경은 로그 타임스탬프를 조작하여 보안 이벤트 추적을 방해할 수 있다. adjtimex, settimeofday, clock_settime 시스템 호출과 /etc/localtime 변경을 감사해야 한다.
    fixGuidance: |-
        /etc/audit/rules.d/ 디렉토리에 규칙 파일을 생성한다:

        printf "
        -a always,exit -F arch=b64 -S adjtimex,settimeofday -k time-change
        -a always,exit -F arch=b32 -S adjtimex,settimeofday -k time-change
        -a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -k time-change
        -a always,exit -F arch=b32 -S clock_settime -F a0=0x0 -k time-change
        -w /etc/localtime -p wa -k time-change
        " >> /etc/audit/rules.d/50-time-change.rules

        규칙을 로드한다:
        augenrules --load
