apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_MAC_004
    title: 모든 AppArmor 프로파일이 enforcing 모드인지 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 가능한 경우 AppArmor 프로파일을 강제(enforce) 모드로 적용해야 한다. enforce 모드는 정책 위반 동작을 실제로 차단한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: complain 모드는 정책 위반을 로그로만 기록하고 차단하지 않으므로 보안 효과가 제한적이다. 피지컬 AI 로봇 환경에서는 취약점 악용 시 즉각적인 차단이 중요하므로 안정성이 검증된 프로파일에 대해서는 enforce 모드 적용이 바람직하다.
    fixGuidance: 모든 AppArmor 프로파일을 enforce 모드로 설정한다.
