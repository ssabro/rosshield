apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_037
    title: 감사 도구 권한(mode) 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 감사 도구(auditctl, aureport, ausearch, autrace, auditd, augenrules)의 권한이 0755 이하로 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(FAIL=0; for t in /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules; do [ -f "$t" ] && MODE=$(stat -Lc '\''%a'\'' "$t") && [ $(( 0$MODE & 0022 )) -gt 0 ] && FAIL=$((FAIL+1)); done; [ $FAIL -eq 0 ] && echo '\''PASS'\'' || echo '\''FAIL'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 감사 도구에 부적절한 권한이 설정되면 무단 사용자가 도구를 수정하여 감사 기능을 무력화할 수 있다.
    fixGuidance: |-
        다음 명령어를 실행하여 감사 도구의 group/other write 권한을 제거한다:

        chmod go-w /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules
