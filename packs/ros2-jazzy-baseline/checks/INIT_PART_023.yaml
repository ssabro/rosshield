apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_023
    title: /var/log/audit를 별도 파티션으로 구성
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /var/log/audit 디렉터리가 별도의 파티션으로 구성되어야 한다. /var/log/audit는 감사 데몬(auditd)이 보안 이벤트 및 시스템 활동 로그를 저장하는 영역으로, 다른 로그 및 시스템 파일과 분리되어 관리되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /var/log/audit 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: auditd는 시스템 접근, 권한 변경, 보안 관련 이벤트를 기록하는 핵심 보안 구성요소이며, 해당 로그는 침해 사고 분석 및 사후 추적을 위해 매우 중요하다. /var/log/audit 영역이 루트 파일시스템 또는 /var/log 전체와 분리되지 않은 경우, 로그 폭증 또는 악의적인 자원 고갈로 인해 감사 로그 기록이 중단될 수 있다.
    fixGuidance: 신규 설치 시 설치 과정에서 /var/log/audit를 별도 파티션으로 구성한다. 기존 시스템의 경우 새 파티션을 생성하고 /etc/fstab에 /var/log/audit 마운트 항목을 추가한다.
