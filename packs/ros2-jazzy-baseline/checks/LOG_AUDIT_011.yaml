apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_011
    title: sudo 로그 파일 변경 이벤트 감사 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 sudo 로그 파일의 변경을 감사하는 규칙이 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(SUDO_LOG_FILE=$(grep -r logfile /etc/sudoers* 2>/dev/null | sed -e '\''s/.*logfile=//;s/,? .*//'\'' -e '\''s/"//g'\'' | head -1); [ -n "${SUDO_LOG_FILE}" ] && grep -r "${SUDO_LOG_FILE}" /etc/audit/rules.d/*.rules 2>/dev/null | grep -q '\''sudo_log_file'\'' && echo '\''PASS'\'' || echo '\''FAIL'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: sudo 로그 파일의 변경을 감사하면 sudo 사용 기록의 위변조를 탐지할 수 있다. 이 규칙이 설정되려면 sudo logfile이 먼저 구성되어야 한다.
    fixGuidance: |-
        sudo logfile이 구성되어 있는지 확인한 후 규칙을 생성한다:

        SUDO_LOG_FILE=$(grep -r logfile /etc/sudoers* | sed -e 's/.*logfile=//;s/,? .*//' -e 's/"//g')
        [ -n "${SUDO_LOG_FILE}" ] && printf "
        -w ${SUDO_LOG_FILE} -p wa -k sudo_log_file
        " >> /etc/audit/rules.d/50-sudo.rules

        규칙을 로드한다:
        augenrules --load
