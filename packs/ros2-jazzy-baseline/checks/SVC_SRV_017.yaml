apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_017
    title: squid 서비스 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 웹 프록시 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 HTTP/HTTPS 트래픽 중계 서버 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s squid &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled squid.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active squid.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 웹 프록시 서버 서비스는 클라이언트와 외부 네트워크 간의 통신을 중계하며, 캐싱 및 접근 제어 기능을 제공할 수 있다. 그러나 해당 서비스가 활성화될 경우 불필요한 네트워크 포트 노출, 트래픽 오남용, 중계 서버로의 악용 가능성이 존재한다.
    fixGuidance: squid 패키지를 제거한다. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.
