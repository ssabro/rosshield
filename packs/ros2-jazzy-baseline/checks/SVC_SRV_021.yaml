apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_021
    title: 메일 전송 에이전트 로컬 전용 모드 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 메일 전송 에이전트(MTA)가 로컬 전용 모드로 구성되어 있어야 한다. 시스템 내부 알림 전달 목적 외의 외부 메일 수신 또는 중계 기능은 비활성화되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(ss -plntu | grep -P '\'':(25|465|587)\b'\'' | grep -Pv '\''\h+(127\.0\.0\.1|\[?::1\]?):(25|465|587)\b'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 메일 전송 에이전트는 시스템 이벤트, 오류 알림 등을 메일로 전달하는 데 사용될 수 있으나, 외부 네트워크와의 메일 송수신 기능이 활성화될 경우 불필요한 네트워크 포트 노출, 스팸 릴레이 악용, 서비스 거부 공격 등의 보안 위협이 발생할 수 있다. CIS 벤치마크에서는 이러한 위험을 줄이기 위해 MTA를 로컬 전용 모드로 제한할 것을 권고하고 있다.
    fixGuidance: /etc/postfix/main.cf 파일에서 inet_interfaces = loopback-only로 설정한 후 systemctl restart postfix 명령으로 재시작한다. exim4 등 다른 MTA를 사용하는 경우 해당 MTA 문서를 참조한다.
