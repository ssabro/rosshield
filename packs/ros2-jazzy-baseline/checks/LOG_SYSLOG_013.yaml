apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_013
    title: rsyslog 서비스 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 rsyslog를 로깅에 사용하는 경우, rsyslog 서비스가 활성화되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(systemctl is-enabled rsyslog 2>/dev/null 2>&1)"; C2_OUT="$(systemctl is-active rsyslog.service 2>/dev/null 2>&1)"; if { [ "$C1_OUT" = '\''enabled'\'' ]; } && { [ "$C2_OUT" = '\''active'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: rsyslog 서비스가 비활성화되면 시스템 로그가 수집되지 않아 보안 이벤트 추적이 불가능해진다.
    fixGuidance: |-
        rsyslog 서비스를 unmask하고 활성화한다:

        systemctl unmask rsyslog.service
        systemctl enable rsyslog.service
        systemctl start rsyslog.service
