apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: ROS_DATA_004
    title: Launch 파일 보안
    description: ROS2 Launch 파일의 파일 권한이 적절히 설정되고, 비인가 수정이 방지되는지 확인
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(find /opt/ros /home/*/ros2_ws -name '\''*.launch.py'\'' -o -name '\''*.launch.xml'\'' 2>/dev/null | xargs stat -c '\''%a %n'\'' 2>/dev/null | awk '\''$1 > 755 {print}'\'' | head -5 2>&1)"; C2_OUT="$(find /opt/ros /home/*/ros2_ws -type f \( -name '\''*.launch.py'\'' -o -name '\''*.launch.xml'\'' \) -perm /002 2>/dev/null | head -5 2>&1)"; if { [ -z "$C1_OUT" ]; } && { [ -z "$C2_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: Launch 파일 변조 시 악성 노드 실행, 환경변수 변경, 보안 설정 우회 등이 가능
    fixGuidance: Launch 파일의 소유자를 root 또는 ros_user로 설정하고, 권한을 644로 변경한다. world-writable 권한을 제거한다.
