apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_004
    title: pam_unix 모듈 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 pam_unix 모듈이 PAM 설정에서 활성화되어 있어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -P '\''\bpam_unix\.so\b'\'' /etc/pam.d/common-auth 2>/dev/null 2>&1)"; C2_OUT="$(grep -P '\''\bpam_unix\.so\b'\'' /etc/pam.d/common-password 2>/dev/null 2>&1)"; C3_OUT="$(grep -P '\''\bpam_unix\.so\b'\'' /etc/pam.d/common-account 2>/dev/null 2>&1)"; C4_OUT="$(grep -P '\''\bpam_unix\.so\b'\'' /etc/pam.d/common-session 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; } && { [ -n "$C3_OUT" ]; } && { [ -n "$C4_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: pam_unix는 표준 UNIX 인증을 제공하는 핵심 PAM 모듈이다. /etc/passwd, /etc/shadow를 사용한 기본 인증 및 세션 관리를 담당한다.
    fixGuidance: |-
        pam_unix 모듈을 활성화한다.

        pam-auth-update --enable unix
