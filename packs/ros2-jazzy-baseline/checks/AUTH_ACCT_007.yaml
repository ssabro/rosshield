apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_ACCT_007
    title: root 계정이 유일한 UID 0 계정인지 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 UID 0을 가진 계정은 root만 존재해야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(awk -F: ''\''''($3 == 0) { print $1 }''\'''' /etc/passwd 2>&1)"; if { [ "$C1_OUT" = ''\''''root''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: UID 0은 시스템의 최고 관리자 권한을 가지므로, 오직 root 계정만 UID 0을 가져야 한다. 다른 계정이 UID 0을 가지면 권한 추적이 어려워지고 보안 위험이 증가한다.
    fixGuidance: |-
        UID 0을 가진 root가 아닌 다른 계정이 있으면 해당 계정의 UID를 변경한다:
        usermod -u <새UID> <사용자명>

        또는 root 계정의 UID가 0이 아니면:
        usermod -u 0 root
