apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_019
    title: /var/log를 별도 파티션으로 구성
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /var/log 디렉터리가 별도의 파티션으로 구성되어야 한다. /var/log는 시스템 서비스 및 데몬이 로그 데이터를 지속적으로 기록하는 영역으로, 다른 중요 파일시스템과 분리되어 관리되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /var/log 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /var/log 디렉터리는 시스템 상태, 보안 이벤트, 서비스 동작 이력 등을 기록하는 핵심 영역으로, 로그 파일의 크기 증가가 지속적으로 발생한다. 해당 영역이 루트 파일시스템 또는 다른 중요 영역과 분리되지 않은 경우, 로그 폭증 또는 악의적인 로그 생성으로 인해 시스템 자원이 고갈되어 서비스 중단이 발생할 수 있다.
    fixGuidance: 신규 설치 시 설치 과정에서 /var/log를 별도 파티션으로 구성한다. 기존 시스템의 경우 새 파티션을 생성하고 /etc/fstab에 /var/log 마운트 항목을 추가한다.
