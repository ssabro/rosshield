apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_016
    title: /var/tmp 파티션에 nodev 옵션 설정
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /var/tmp 디렉터리에 nodev 마운트 옵션이 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /var/tmp | grep nodev 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /var/tmp는 world-writable 영역으로, 디바이스 파일 생성이 허용될 경우 공격자가 이를 악용하여 시스템 자원에 비인가 접근을 시도할 수 있다. nodev 옵션을 적용함으로써 이러한 위험을 사전에 차단할 수 있다.
    fixGuidance: '/var/tmp 파티션이 별도로 존재하는 경우, /etc/fstab 파일의 /var/tmp 마운트 항목에 nodev 옵션을 추가한다. 예: <device> /var/tmp <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0. 설정 후 mount -o remount /var/tmp 명령으로 변경사항을 즉시 적용한다.'
