apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_UFW_002
    title: iptables-persistent 미설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 UFW를 방화벽 관리 도구로 사용하는 경우, iptables-persistent 패키지는 설치되어 있지 않아야 한다. 시스템에서는 하나의 방화벽 규칙 관리 방식만 사용되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s iptables-persistent &>/dev/null && echo "installed" || echo "not installed" 2>&1)"; if { [ "$C1_OUT" = '\''not installed'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: iptables-persistent는 부팅 시 iptables 규칙을 자동으로 복원하는 기능을 제공한다. UFW 또한 내부적으로 iptables를 사용하여 규칙을 관리하므로, 두 도구를 동시에 사용할 경우 규칙 충돌, 중복 적용, 의도하지 않은 트래픽 허용 또는 차단이 발생할 수 있다.
    fixGuidance: |-
        iptables-persistent 패키지를 제거한다.

        apt purge iptables-persistent
