apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_018
    title: /var/tmp 파티션에 noexec 옵션 설정
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /var/tmp 디렉터리에 noexec 마운트 옵션이 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /var/tmp | grep noexec 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /var/tmp는 재부팅 이후에도 유지되는 임시 파일이 저장되는 영역으로, 공격자가 악성 실행 파일을 장기간 은닉·실행할 수 있는 위치가 될 수 있다. noexec 옵션을 적용함으로써 실행 경로를 차단하여 보안 위협을 줄일 수 있다.
    fixGuidance: '/var/tmp 파티션이 별도로 존재하는 경우, /etc/fstab 파일의 /var/tmp 마운트 항목에 noexec 옵션을 추가한다. 예: <device> /var/tmp <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0. 설정 후 mount -o remount /var/tmp 명령으로 변경사항을 즉시 적용한다.'
