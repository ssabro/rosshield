apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: ROS_SAF_005
    title: 센서 데이터 무결성
    description: 핵심 센서 토픽(LiDAR, IMU, Camera 등)에 DDS 암호화 및 접근제어가 적용되어 데이터 위변조가 방지되는지 확인
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(echo "$ROS_SECURITY_ENABLE:$ROS_SECURITY_STRATEGY" 2>&1)"; C2_OUT="$(ros2 topic list 2>/dev/null | grep -iE '\''scan|imu|camera|image|pointcloud|lidar'\'' | head -3 2>&1)"; if { [ "$C1_OUT" = '\''true:Enforce'\'' ]; } && { [ -n "$C2_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 센서 데이터 위변조는 자율주행/장애물 회피 등 안전 기능에 직접적 영향을 미침
    fixGuidance: SROS2를 Enforce 모드로 활성화하고, 센서 노드에 대한 인증서를 생성한다. Governance XML에서 센서 토픽의 data_protection_kind를 ENCRYPT로 설정한다.
