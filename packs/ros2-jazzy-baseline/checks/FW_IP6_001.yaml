apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_IP6_001
    title: ip6tables 기본 차단 정책 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 IPv6가 활성화되어 있고 ip6tables를 사용하는 경우, 입력(INPUT), 출력(OUTPUT), 전달(FORWARD) 체인의 기본 정책은 차단(deny)으로 설정되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(ipv6_disabled="no"; grep -Pqs -- '\''^\h*0\b'\'' /sys/module/ipv6/parameters/disable || ipv6_disabled="yes"; if [ "$ipv6_disabled" = "no" ]; then sysctl net.ipv6.conf.all.disable_ipv6 2>/dev/null | grep -q '\''= 1'\'' && sysctl net.ipv6.conf.default.disable_ipv6 2>/dev/null | grep -q '\''= 1'\'' && ipv6_disabled="yes"; fi; echo $ipv6_disabled | grep -q yes && echo "PASS" || { fail=0; ip6tables -L INPUT 2>/dev/null | grep -q '\''policy DROP\|policy REJECT'\'' || fail=1; ip6tables -L OUTPUT 2>/dev/null | grep -q '\''policy DROP\|policy REJECT'\'' || fail=1; ip6tables -L FORWARD 2>/dev/null | grep -q '\''policy DROP\|policy REJECT'\'' || fail=1; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL"; } 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 기본 허용 정책은 방화벽 규칙에 정의되지 않은 IPv6 서비스나 포트가 외부에 노출될 수 있는 위험을 증가시킨다. CIS 벤치마크에서는 IPv6 환경에서도 기본 차단 정책을 적용하여 네트워크 접근 통제를 강화할 것을 권고하고 있다.
    fixGuidance: |-
        IPv6가 활성화된 경우, ip6tables 기본 정책을 DROP으로 설정한다.

        ip6tables -P INPUT DROP
        ip6tables -P OUTPUT DROP
        ip6tables -P FORWARD DROP
