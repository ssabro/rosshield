apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_011
    title: cups 서비스 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 SNMP 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 네트워크 관리 및 모니터링 서버 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s cups &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled cups.socket cups.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active cups.socket cups.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: SNMP 서비스는 시스템 및 네트워크 상태 정보를 원격에서 조회·관리할 수 있도록 제공한다. 그러나 인증 설정이 미흡하거나 구버전(SNMPv1/v2c)을 사용할 경우, 시스템 정보 노출, 무단 접근, 서비스 악용 등의 보안 위협이 발생할 수 있다.
    fixGuidance: cups 패키지를 제거한다. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.
