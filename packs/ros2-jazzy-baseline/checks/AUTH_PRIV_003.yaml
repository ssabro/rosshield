apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PRIV_003
    title: sudo 로그 파일 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 sudo는 별도의 로그 파일에 기록하도록 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -rPsi '\''^\s*Defaults\s+([^#]+,\s*)?logfile\s*='\'' /etc/sudoers /etc/sudoers.d/ 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: sudo 전용 로그 파일을 사용하면 권한 상승 활동을 모니터링하고 감사하기 쉬워진다.
    fixGuidance: |-
        /etc/sudoers 파일에 logfile 설정을 추가한다.

        visudo로 편집하여 다음 라인 추가:
        Defaults logfile="/var/log/sudo.log"
