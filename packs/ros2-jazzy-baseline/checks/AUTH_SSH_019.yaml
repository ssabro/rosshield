apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_019
    title: SSH PermitEmptyPasswords 비활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 빈 비밀번호 허용(PermitEmptyPasswords)이 비활성화되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep permitemptypasswords 2>&1)"; if { [ "$C1_OUT" = '\''permitemptypasswords no'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 빈 비밀번호를 허용하면 비밀번호가 설정되지 않은 계정으로 인증 없이 접속할 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 PermitEmptyPasswords를 no로 설정한다.

        PermitEmptyPasswords no
