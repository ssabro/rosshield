apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_009
    title: nfs 서버 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 네트워크 파일 시스템(NFS) 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 원격 파일 공유 서버 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s nfs-kernel-server &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled nfs-server.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active nfs-server.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 네트워크 파일 시스템(NFS) 서버 서비스는 네트워크를 통해 파일시스템을 공유하는 기능을 제공하며, 접근 제어 설정이 미흡할 경우 비인가 파일 접근, 데이터 변조, 정보 유출 등의 보안 위협이 발생할 수 있다. 피지컬 AI 로봇 환경에서는 로봇 제어 소프트웨어, 설정 파일, 로그 데이터의 무결성과 기밀성이 중요하므로, 불필요한 NFS 서버 기능은 공격 표면을 줄이기 위해 비활성화하는 것이 바람직하다.
    fixGuidance: nfs-kernel-server 패키지를 제거한다. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.
