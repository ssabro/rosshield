apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_UFW_007
    title: ufw 기본 거부 정책 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 UFW를 방화벽 관리 도구로 사용하는 경우, 방화벽의 기본 정책은 차단(deny)으로 설정되어 있어야 한다. 네트워크 트래픽은 명시적으로 허용된 규칙에 의해서만 통과되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(ufw status verbose 2>/dev/null | grep -q '\''Default:.*deny.*incoming'\'' && ufw status verbose 2>/dev/null | grep -q '\''Default:.*deny.*outgoing'\'' && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 기본 정책을 허용으로 설정할 경우, 방화벽 규칙이 정의되지 않은 서비스나 포트가 외부에 노출될 수 있다. CIS 벤치마크에서는 네트워크 접근 통제를 강화하기 위해 기본 차단 정책을 적용하고, 필요한 트래픽만 허용하는 방식을 권고하고 있다.
    fixGuidance: |-
        ufw 기본 거부 정책을 설정한다.

        ufw default deny incoming
        ufw default deny outgoing
        ufw default deny routed
