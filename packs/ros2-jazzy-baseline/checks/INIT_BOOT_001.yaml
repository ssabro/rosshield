apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_BOOT_001
    title: 부트로더 비밀번호 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 부트로더에 대한 접근을 보호하기 위해 부트로더 비밀번호가 설정되어 있어야 한다. 이를 통해 부팅 과정에서 부트 매개변수 수정이나 비정상적인 부팅 옵션 선택이 제한되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Pz '\''^\s*set\s+superusers="[^"]+"'\'' /boot/grub/grub.cfg 2>/dev/null 2>&1)"; C2_OUT="$(grep -P '\''^\s*password_pbkdf2\s+'\'' /boot/grub/grub.cfg 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 부트로더 비밀번호가 설정되지 않은 경우, 공격자는 물리적 또는 콘솔 접근을 통해 부트로더 메뉴에 진입하여 커널 파라미터를 수정하거나 단일 사용자 모드로 부팅함으로써 인증 절차를 우회할 수 있다. 피지컬 AI 로봇 환경에서는 이러한 침해가 Host 운영체제에 대한 완전한 통제권 탈취로 이어질 수 있으므로, 부트로더 단계에서의 접근 통제가 필수적이다.
    fixGuidance: 1) grub-mkpasswd-pbkdf2 명령으로 비밀번호 해시를 생성한다. 2) /etc/grub.d/ 디렉터리에 설정 파일을 생성하여 set superusers 및 password_pbkdf2 항목을 추가한다. 3) update-grub 명령으로 GRUB 설정을 업데이트한다.
