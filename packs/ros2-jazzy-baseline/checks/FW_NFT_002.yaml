apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_NFT_002
    title: nftables 사용 시 UFW 제거 또는 비활성화 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 nftables를 방화벽 관리 도구로 사용하는 경우, Uncomplicated Firewall(UFW)는 설치되어 있지 않거나 비활성화되어 있어야 한다. 시스템에서는 하나의 방화벽 관리 도구만 사용되어야 한다.
    severity: medium
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(if ! dpkg-query -s ufw &>/dev/null; then echo "PASS"; elif ufw status 2>/dev/null | grep -q ''\''''Status: inactive''\'''' && systemctl is-enabled ufw.service 2>/dev/null | grep -q ''\''''masked''\''''; then echo "PASS"; else echo "FAIL"; fi 2>&1)"; if { [ "$C1_OUT" = ''\''''PASS''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: UFW는 내부적으로 iptables를 사용하여 방화벽 규칙을 관리하며, nftables와 동시에 사용될 경우 방화벽 규칙이 중복되거나 충돌할 수 있다. 이러한 구성은 실제 적용되는 네트워크 접근 정책을 예측하기 어렵게 만들고, 보안 설정 오류 또는 통신 장애를 유발할 수 있다.
    fixGuidance: |-
        UFW를 제거하거나 비활성화한다.

        옵션 1 (제거):
        apt purge ufw

        옵션 2 (비활성화):
        ufw disable
        systemctl stop ufw.service
        systemctl mask ufw.service
