apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_CLI_006
    title: ftp 클라이언트 패키지 제거 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 FTP 클라이언트가 설치되어 있지 않아야 한다. 로봇 운용에 필요하지 않은 평문 기반 파일 전송 클라이언트는 시스템에서 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -l 2>/dev/null | grep -E '\''\b(ftp|tnftp)\b'\'' && echo '\''installed'\'' || echo '\''not_installed'\'' 2>&1)"; if { printf '\''%s'\'' "$C1_OUT" | grep -qF '\''not_installed'\''; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: FTP 클라이언트는 파일 전송 시 사용자 인증 정보와 데이터 내용을 암호화하지 않고 전송한다. 이로 인해 네트워크 도청, 인증 정보 탈취, 전송 데이터 변조 등의 보안 위협이 발생할 수 있다.
    fixGuidance: |-
        다음 명령어를 실행하여 tnftp 및 ftp를 제거한다:

        apt purge ftp
        apt purge tnftp
