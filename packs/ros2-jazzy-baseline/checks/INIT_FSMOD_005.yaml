apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_FSMOD_005
    title: jffs2 커널 모듈 비활성화
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 jffs2 파일시스템의 마운트가 비활성화되어야 한다. 로봇 운용 및 유지보수에 필요하지 않은 파일시스템은 시스템에서 사용되지 않도록 구성되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(lsmod | grep jffs2 2>&1)"; C2_OUT="$(modprobe --showconfig | grep -P '\''\binstall\h+jffs2\h+((/usr)?/bin/(true|false))\b'\'' 2>&1)"; C3_OUT="$(modprobe --showconfig | grep -P '\''\bblacklist\h+jffs2\b'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; } && { [ -n "$C3_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: jffs2 파일시스템은 주로 플래시 메모리를 사용하는 임베디드 환경을 위해 설계되었으며, 일반적인 Ubuntu 24.04 LTS 기반 ROS 2 Jazzy 로봇 Host 운영체제에서는 사용될 필요가 없다. 사용되지 않는 파일시스템이 활성화되어 있을 경우, 해당 파일시스템 구현의 취약점이 공격자에게 악용되어 커널 수준의 침해로 이어질 수 있다.
    fixGuidance: jffs2 커널 모듈이 시스템에 존재하는 경우, /etc/modprobe.d/ 디렉터리에 install jffs2 /bin/false 및 blacklist jffs2 설정 파일을 생성하고, 현재 로드된 모듈을 언로드한다. 모듈이 시스템에 존재하지 않거나 커널에 미리 컴파일된 경우 조치 불필요.
