apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_033
    title: 감사 로그 디렉터리 권한(mode) 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 감사 로그 디렉토리의 권한이 0750 이하로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$([ -f /etc/audit/auditd.conf ] && DIR=$(dirname "$(awk -F= '\''/^\s*log_file\s*/{print $2}'\'' /etc/audit/auditd.conf | xargs)") && MODE=$(stat -Lc '\''%a'\'' "$DIR") && [ $(( 0$MODE & 0027 )) -eq 0 ] && echo '\''PASS'\'' || echo '\''FAIL'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 감사 로그 디렉토리의 권한이 부적절하면 권한 없는 사용자가 디렉토리 내용을 열람하거나 수정할 수 있다.
    fixGuidance: |+
        다음 명령어를 실행하여 감사 로그 디렉토리의 권한을 수정한다:

        chmod g-w,o-rwx "$(dirname "$(awk -F= '/^\s*log_file\s*/{print $2}' /etc/audit/auditd.conf | xargs)")"

