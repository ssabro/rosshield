apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_CRON_001
    title: cron 데몬 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 chrony를 시간 동기화 서비스로 사용하는 경우, chrony는 조직 또는 시스템 운영 정책에 따라 승인된 시간 서버와만 동기화되도록 구성되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(systemctl list-unit-files | awk '\''$1~/^crond?\.service/{print $2}'\'' 2>&1)"; C2_OUT="$(systemctl list-units | awk '\''$1~/^crond?\.service/{print $3}'\'' 2>&1)"; if { [ "$C1_OUT" = '\''enabled'\'' ]; } && { [ "$C2_OUT" = '\''active'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: chrony는 Network Time Protocol(NTP)을 구현한 데몬으로, 외부 시간 서버로부터 시각 정보를 수신하여 시스템 시간을 동기화한다. 승인되지 않은 시간 서버를 사용할 경우, 시간 위·변조(Time Spoofing), 로그 타임스탬프 왜곡, 인증 오류, 보안 이벤트 분석 실패 등의 문제가 발생할 수 있다.
    fixGuidance: |-
        cron 서비스를 unmask하고 활성화한다.

        systemctl unmask cron.service
        systemctl --now enable cron.service
