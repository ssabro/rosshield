apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_011
    title: 비밀번호 변경 시 최소 변경 문자 수 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호 변경 시 이전 비밀번호와 최소 2자 이상 다르게 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*difok\s*=\s*([2-9]|[1-9][0-9]+)\b'\'' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null 2>&1)"; C2_OUT="$(grep -Psi '\''^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so\s+([^#]*\s+)?difok\s*=\s*[0-1]\b'\'' /etc/pam.d/common-password 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 비밀번호 변경 시 이전과 유사한 비밀번호 사용을 방지하여 보안을 강화한다.
    fixGuidance: |-
        /etc/security/pwquality.conf.d/ 디렉토리에 설정 파일을 생성한다.

        mkdir -p /etc/security/pwquality.conf.d
        echo "difok = 2" > /etc/security/pwquality.conf.d/50-pwdifok.conf

        기존 pwquality.conf의 difok 설정은 주석 처리한다.
