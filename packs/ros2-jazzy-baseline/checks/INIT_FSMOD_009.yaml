apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_FSMOD_009
    title: usb-storage 커널 모듈 비활성화
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 USB 저장장치(usb-storage) 커널 모듈의 사용이 제한되어야 한다. 로봇 운용 및 유지보수에 필요하지 않은 외부 저장매체 접근 기능은 시스템에서 사용되지 않도록 구성되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(lsmod | grep usb-storage 2>&1)"; C2_OUT="$(modprobe --showconfig | grep -P '\''\binstall\h+usb_storage\h+((/usr)?/bin/(true|false))\b'\'' 2>&1)"; C3_OUT="$(modprobe --showconfig | grep -P '\''\bblacklist\h+usb_storage\b'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; } && { [ -n "$C3_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: usb-storage 커널 모듈은 USB 인터페이스를 통해 외부 저장장치를 연결할 수 있도록 하는 기능을 제공한다. 그러나 피지컬 AI 로봇 환경에서는 외부 저장매체를 통한 악성코드 유입, 비인가 데이터 반출, 시스템 설정 변조 등의 보안 위협이 발생할 수 있다.
    fixGuidance: usb-storage 커널 모듈이 시스템에 존재하는 경우, /etc/modprobe.d/ 디렉터리에 install usb_storage /bin/false 및 blacklist usb_storage 설정 파일을 생성하고, 현재 로드된 모듈을 언로드한다. 필요시 usbguard를 설치하여 USB 장치 접근을 세밀하게 제어할 수 있다. 모듈이 시스템에 존재하지 않거나 커널에 미리 컴파일된 경우 조치 불필요.
