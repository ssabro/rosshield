apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_NFT_005
    title: nftables 기본 체인 존재 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 nftables를 방화벽 관리 도구로 사용하는 경우, 입력(input), 출력(output), 전달(forward) 트래픽을 처리하기 위한 nftables 기본 체인이 구성되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(fail=0; nft list ruleset 2>/dev/null | grep -q '\''hook input'\'' || fail=1; nft list ruleset 2>/dev/null | grep -q '\''hook forward'\'' || fail=1; nft list ruleset 2>/dev/null | grep -q '\''hook output'\'' || fail=1; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: nftables에서 기본 체인은 네트워크 패킷이 실제로 처리되는 지점으로, 방화벽 규칙이 적용되는 핵심 구성 요소이다. 테이블만 존재하고 기본 체인이 정의되어 있지 않을 경우, 네트워크 트래픽에 대한 필터링이 수행되지 않아 방화벽 기능이 사실상 비활성화된 상태가 된다.
    fixGuidance: |-
        nftables 기본 체인을 생성한다.

        nft create chain inet filter input { type filter hook input priority 0 \; }
        nft create chain inet filter forward { type filter hook forward priority 0 \; }
        nft create chain inet filter output { type filter hook output priority 0 \; }
