apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_006
    title: ftp 서버 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 FTP 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 파일 전송 서버 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s vsftpd &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled vsftpd.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active vsftpd.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: FTP 서버 서비스는 사용자 인증 정보 및 전송 데이터가 평문으로 노출될 가능성이 높아, 네트워크 도청 및 자격 증명 탈취 공격에 취약하다. 로봇 Host에서 FTP 서버가 활성화될 경우, 공격자가 이를 악용하여 시스템 파일 접근, 데이터 유출 또는 로봇 제어 환경 침해를 시도할 수 있다.
    fixGuidance: 'vsftpd 패키지를 제거한다: apt purge -y vsftpd. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.'
