apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_BOOT_002
    title: 부트로더 구성 파일 접근 권한 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 부트로더 설정 파일에 대한 접근 권한이 적절히 제한되어 있어야 한다. 부트로더 설정 파일은 관리자 권한을 가진 사용자만 수정할 수 있도록 구성되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(stat -Lc '\''%a %u %g'\'' /boot/grub/grub.cfg 2>/dev/null 2>&1)"; if { [ "$C1_OUT" = '\''600 0 0'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 부트로더 설정 파일에 대한 접근 통제가 미흡할 경우, 일반 사용자 또는 악성 프로세스가 설정 파일을 변경하여 부팅 과정에 악영향을 미칠 수 있다. 이는 커널 옵션 변조, 보안 기능 비활성화 등으로 이어질 수 있으며, 피지컬 AI 로봇 환경에서는 로봇 제어 기능의 무결성과 안전성을 심각하게 위협할 수 있다.
    fixGuidance: chown root:root /boot/grub/grub.cfg && chmod og-rwx /boot/grub/grub.cfg 명령으로 GRUB 설정 파일의 소유자와 권한을 설정한다.
