apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_007
    title: 디스크 오류 및 공간 부족 시 감사 동작 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 auditd의 disk_full_action과 disk_error_action이 적절하게 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Pi -- '\''^\s*disk_full_action\s*=\s*(halt|single)\b'\'' /etc/audit/auditd.conf 2>&1)"; C2_OUT="$(grep -Pi -- '\''^\s*disk_error_action\s*=\s*(syslog|single|halt)\b'\'' /etc/audit/auditd.conf 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 디스크가 가득 차거나 디스크 오류가 발생했을 때 적절한 조치가 설정되지 않으면 감사 이벤트가 유실되어 보안 사고를 추적할 수 없게 된다.
    fixGuidance: |-
        사이트 보안 정책에 따라 /etc/audit/auditd.conf에 다음 파라미터를 설정한다:

        disk_full_action = <halt|single>
        disk_error_action = <syslog|single|halt>

        예시:
        disk_full_action = halt
        disk_error_action = halt
