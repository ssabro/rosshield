apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PKG_003
    title: 업데이트 및 패치 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 운영체제, ROS 2 관련 패키지, 시스템 라이브러리 및 추가 보안 소프트웨어에 대한 업데이트와 패치가 적시에 설치되어 있어야 한다. 조직은 최신 보안 패치와 필요한 보안 소프트웨어가 설치·유지되고 있는지를 주기적으로 확인해야 한다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 업데이트 및 보안 패치가 적용되지 않은 소프트웨어는 이미 알려진 취약점에 노출되어 공격자에게 악용될 가능성이 높다. 또한 방화벽, 감사(audit), 침입 탐지 등 추가 보안 소프트웨어가 설치·유지되지 않을 경우, 보안 사고 탐지 및 대응 능력이 저하될 수 있다.
    fixGuidance: |-
        다음 명령어를 실행하여 사이트 정책에 따라 모든 패키지를 업데이트한다:

        apt update
        apt upgrade

        또는:

        apt dist-upgrade

        운영 환경에서는 업데이트 적용 전 호환성을 검토해야 한다.
