apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_010
    title: journald 로그 압축 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 journald가 기본 로깅 시스템인 경우, Compress가 yes로 설정되어 있어야 한다.
    severity: low
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Phs '\''^\s*Compress\s*=\s*yes'\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C2_OUT="$(grep -Phs '\''^\s*Compress\s*='\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; } || { [ -z "$C2_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 로그 압축을 활성화하면 디스크 공간을 절약하고 더 오랜 기간의 로그를 저장할 수 있다.
    fixGuidance: |-
        /etc/systemd/journald.conf.d/ 디렉토리에 .conf 파일을 생성하여 설정한다:

        mkdir -p /etc/systemd/journald.conf.d/
        cat << 'EOF' >> /etc/systemd/journald.conf.d/60-journald.conf
        [Journal]
        Compress=yes
        EOF

        systemctl reload-or-restart systemd-journald
