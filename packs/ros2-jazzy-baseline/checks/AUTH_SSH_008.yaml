apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_008
    title: SSH 포워딩 비활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, SSH 포트 포워딩 및 터널링 기능은 비활성화되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep -i disableforwarding 2>&1)"; if { [ "$C1_OUT" = '\''disableforwarding yes'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: SSH 포워딩은 내부 네트워크로의 우회 통신 경로를 제공할 수 있으며, 보안 정책을 우회하는 수단으로 악용될 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 DisableForwarding을 yes로 설정한다.

        DisableForwarding yes
