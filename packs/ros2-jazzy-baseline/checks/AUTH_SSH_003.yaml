apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_003
    title: SSH 공개 호스트 키 파일 권한 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, SSH 공개 호스트 키 파일은 root 소유이고, 0644 이하의 권한으로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(fail=0; for f in /etc/ssh/ssh_host_*_key.pub; do [ -f "$f" ] || continue; mode=$(stat -c '\''%a'\'' "$f"); owner=$(stat -c '\''%U'\'' "$f"); group=$(stat -c '\''%G'\'' "$f"); [ "$mode" -gt 644 ] && fail=1; [ "$owner" != "root" ] && fail=1; [ "$group" != "root" ] && fail=1; done; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: SSH 공개 호스트 키 파일이 비인가 사용자에 의해 수정되면, 중간자 공격(MITM)에 취약해질 수 있다.
    fixGuidance: |-
        SSH 공개 호스트 키 파일의 권한과 소유자를 설정한다.

        chmod 0644 /etc/ssh/ssh_host_*_key.pub
        chown root:root /etc/ssh/ssh_host_*_key.pub
