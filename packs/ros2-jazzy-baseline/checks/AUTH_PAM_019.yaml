apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_019
    title: 비밀번호 이력 저장 개수 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 pam_pwhistory 모듈의 remember 값이 24 이상으로 설정되어 이전 비밀번호 재사용이 방지되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*password\s+[^#]*\s+pam_pwhistory\.so\s+([^#]*\s+)?remember=(2[4-9]|[3-9][0-9]|[1-9][0-9]{2,})\b'\'' /etc/pam.d/common-password 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 비밀번호 이력을 저장하여 이전에 사용한 비밀번호의 재사용을 방지하면 비밀번호 순환 공격을 막을 수 있다.
    fixGuidance: |-
        pam-auth-update 프로필에서 pam_pwhistory.so 라인에 remember=24를 추가한다.

        1. 프로필 파일 찾기:
        awk '/Password-Type:/{ f = 1;next } /-Type:/{ f = 0 } f {if (/pam_pwhistory\.so/) print FILENAME}' /usr/share/pam-configs/*

        2. 반환된 파일을 편집하여 pam_pwhistory.so 라인에 remember=24 추가:
        requisite pam_pwhistory.so remember=24 enforce_for_root try_first_pass use_authtok

        3. 적용:
        pam-auth-update --enable pwhistory
