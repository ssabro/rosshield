apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_002
    title: SSH 개인 호스트 키 파일 권한 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, SSH 개인 호스트 키 파일은 root 소유이고, root 그룹 소유 시 0600 이하 또는 ssh_keys 그룹 소유 시 0640 이하의 권한으로 설정되어야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(fail=0; ssh_grp=$(awk -F: ''\''''($1 ~ /^(ssh_keys|_?ssh)$/) {print $1; exit}''\'''' /etc/group); for f in /etc/ssh/ssh_host_*_key; do [ -f "$f" ] || continue; mode=$(stat -c ''\''''%a''\'''' "$f"); owner=$(stat -c ''\''''%U''\'''' "$f"); group=$(stat -c ''\''''%G''\'''' "$f"); [ "$owner" != "root" ] && fail=1; if [ -n "$ssh_grp" ] && [ "$group" = "$ssh_grp" ]; then [ "$mode" -gt 640 ] && fail=1; elif [ "$group" = "root" ]; then [ "$mode" -gt 600 ] && fail=1; else fail=1; fi; done; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = ''\''''PASS''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: SSH 개인 호스트 키 파일이 비인가 사용자에게 노출되면, 중간자 공격(MITM) 등으로 SSH 통신의 기밀성과 무결성이 침해될 수 있다.
    fixGuidance: |-
        SSH 개인 호스트 키 파일의 권한과 소유자를 설정한다.

        root 그룹 소유 시:
        chmod 0600 /etc/ssh/ssh_host_*_key
        chown root:root /etc/ssh/ssh_host_*_key

        ssh_keys 그룹 사용 시:
        chmod 0640 /etc/ssh/ssh_host_*_key
        chown root:ssh_keys /etc/ssh/ssh_host_*_key
