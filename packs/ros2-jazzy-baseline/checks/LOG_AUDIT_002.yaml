apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_002
    title: auditd 서비스 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 auditd 서비스가 활성화되어 있어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(systemctl is-enabled auditd 2>/dev/null 2>&1)"; C2_OUT="$(systemctl is-active auditd 2>/dev/null 2>&1)"; if { [ "$C1_OUT" = '\''enabled'\'' ]; } && { [ "$C2_OUT" = '\''active'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: auditd 서비스가 활성화되지 않으면 시스템 감사 이벤트가 기록되지 않아 보안 사고 추적이 불가능해진다.
    fixGuidance: |-
        다음 명령어를 실행하여 auditd를 unmask, 활성화, 시작한다:

        systemctl unmask auditd
        systemctl enable auditd
        systemctl start auditd
