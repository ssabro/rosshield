apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_005
    title: 감사 로그 파일 최대 크기 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 auditd의 max_log_file 파라미터가 사이트 정책에 따라 적절하게 설정되어야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 감사 로그 파일의 최대 크기를 적절히 설정하지 않으면 디스크 공간이 소진되거나, 로그가 너무 자주 회전되어 감사 기록이 유실될 수 있다.
    fixGuidance: |-
        사이트 정책에 따라 /etc/audit/auditd.conf에 다음 파라미터를 설정한다:

        max_log_file = <MB>

        예시:
        max_log_file = 8
