apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_025
    title: pam_unix use_authtok 인자 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 pam_unix 모듈의 password 스택에 use_authtok이 설정되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -PH '\''^\s*password\s+([^#]*\s+)?pam_unix\.so\s+([^#]*\s+)?use_authtok\b'\'' /etc/pam.d/common-password 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 'use_authtok을 설정하면 PAM 스택의 이전 모듈(예: pam_pwquality)에서 입력받은 비밀번호를 사용하여 일관된 비밀번호 처리가 가능하다.'
    fixGuidance: |-
        pam-auth-update 프로필에서 pam_unix.so 라인에 use_authtok을 추가한다.

        1. pam_unix.so가 있는 프로필 찾기:
        awk '/Password-Type:/{ f = 1;next } /-Type:/{ f = 0 } f {if (/pam_unix\.so/) print FILENAME}' /usr/share/pam-configs/*

        2. 반환된 파일의 Password: 섹션에서 pam_unix.so 라인에 use_authtok 추가:
        [success=end default=ignore] pam_unix.so obscure use_authtok try_first_pass yescrypt

        참고: Password-Initial: 섹션에는 use_authtok을 추가하지 않는다.

        3. 적용:
        pam-auth-update --enable unix
