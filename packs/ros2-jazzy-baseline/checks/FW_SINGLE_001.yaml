apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_SINGLE_001
    title: 단일 방화벽 구성 유틸리티 사용 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 하나의 방화벽 구성 유틸리티만 사용되어야 한다. 시스템에서는 선택된 방화벽 관리 도구만 활성화되어 있어야 하며, 다른 방화벽 유틸리티는 비활성화되거나 사용되지 않아야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 여러 방화벽 관리 도구를 동시에 사용할 경우, 각 도구가 생성하는 규칙 간 충돌이나 예기치 않은 규칙 덮어쓰기가 발생할 수 있다. 이는 실제 적용되는 방화벽 정책을 파악하기 어렵게 만들고, 보안 설정 오류나 통신 장애를 유발할 수 있다.
    fixGuidance: |-
        단일 방화벽 유틸리티를 선택하여 사용한다.

        1. 조직 요구사항에 맞는 방화벽 유틸리티 결정 (ufw, nftables, iptables 중 하나)
        2. 선택한 방화벽의 하위 항목 권고사항을 따름
        3. 다른 방화벽 유틸리티는 비활성화 또는 제거
