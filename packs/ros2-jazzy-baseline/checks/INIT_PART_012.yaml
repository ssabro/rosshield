apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_012
    title: /var를 별도 파티션으로 구성
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /var 디렉터리가 별도의 파티션으로 구성되어야 한다. /var 영역은 시스템 서비스 및 데몬이 동적으로 생성·변경하는 데이터를 저장하는 공간으로, 다른 중요 파일시스템과 분리되어 관리되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /var 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /var 디렉터리는 로그 파일, 캐시, 스풀 데이터 등 시스템 및 서비스 운영 중 지속적으로 증가하는 데이터를 포함한다. 일부 하위 디렉터리는 world-writable 속성을 가질 수 있으며, 해당 영역이 루트 파일시스템과 분리되지 않은 경우 로그 폭증 또는 악의적인 자원 고갈 공격으로 인해 시스템 장애가 발생할 수 있다.
    fixGuidance: 신규 설치 시 설치 과정에서 /var를 별도 파티션으로 구성한다. 기존 시스템의 경우 새 파티션을 생성하고 /etc/fstab에 /var 마운트 항목을 추가한다.
