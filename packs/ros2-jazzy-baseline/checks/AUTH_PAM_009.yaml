apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_009
    title: 계정 잠금 해제 시간 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 계정 잠금 해제 시간이 0(영구) 또는 900초(15분) 이상으로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Pi '\''^\s*unlock_time\s*=\s*(0|9[0-9][0-9]|[1-9][0-9]{3,})\b'\'' /etc/security/faillock.conf 2>/dev/null 2>&1)"; C2_OUT="$(grep -Pi '\''^\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so\s+([^#]*\s+)?unlock_time\s*=\s*([1-9]|[1-9][0-9]|[1-8][0-9][0-9])\b'\'' /etc/pam.d/common-auth 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 잠금 해제 시간이 너무 짧으면 공격자가 잠시 기다린 후 다시 공격을 시도할 수 있다.
    fixGuidance: |-
        /etc/security/faillock.conf 파일에서 unlock_time을 900 이상으로 설정한다.

        unlock_time = 900

        pam-auth-update 프로필에서 unlock_time 인자가 있다면 제거한다:
        grep -Pl '\bpam_faillock\.so.*unlock_time\b' /usr/share/pam-configs/*

        참고: faillock --user <사용자> --reset 명령으로 잠긴 계정을 수동 해제할 수 있다.
