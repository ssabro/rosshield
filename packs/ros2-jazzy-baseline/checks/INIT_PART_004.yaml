apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_004
    title: /tmp 파티션에 noexec 옵션 설정
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /tmp 디렉터리에 noexec 마운트 옵션이 설정되어야 한다. /tmp 영역에 저장된 실행 파일이 직접 실행되지 않도록 구성되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /tmp | grep noexec 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /tmp 디렉터리는 다양한 프로세스와 애플리케이션이 임시 파일을 생성·저장하는 공용 영역으로, 공격자가 악성 실행 파일을 업로드하거나 생성하기 쉬운 위치이다. 해당 영역에서 실행 권한이 허용될 경우, 악성 코드 실행을 통한 시스템 침해로 이어질 수 있다.
    fixGuidance: '/tmp 파티션이 별도로 존재하는 경우, /etc/fstab 파일의 /tmp 마운트 항목에 noexec 옵션을 추가한다. 예: <device> /tmp <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0. 설정 후 mount -o remount /tmp 명령으로 변경사항을 즉시 적용한다.'
