apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_BANNER_004
    title: /etc/motd 파일 접근 권한 적절한 구성 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 로그인 이후 표시되는 메시지를 제어하는 /etc/motd 파일에 대한 접근 권한이 적절히 제한되어 있어야 한다. 해당 파일은 관리자 권한을 가진 사용자만 수정할 수 있도록 구성되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(stat -Lc '\''%a %u %g'\'' /etc/motd 2>/dev/null 2>&1)"; if { [ "$C1_OUT" = '\''644 0 0'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /etc/motd 파일은 로그인 이후 사용자에게 전달되는 메시지를 정의하며, 보안 경고 및 법적 고지를 전달하는 용도로 활용될 수 있다. 해당 파일에 대한 접근 통제가 미흡할 경우, 비인가 사용자가 메시지를 변조하거나 운영체제 및 시스템 정보를 삽입하여 공격자에게 유용한 정보를 제공할 수 있다.
    fixGuidance: /etc/motd 파일의 소유자를 root:root로, 권한을 644로 설정한다.
