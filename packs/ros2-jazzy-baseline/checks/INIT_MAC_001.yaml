apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_MAC_001
    title: AppArmor 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 AppArmor가 설치되어 있어야 한다. AppArmor는 강제적 접근 제어(MAC)를 제공하여 프로세스의 자원 접근 범위를 제한하는 핵심 보안 구성요소이다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s apparmor &>/dev/null && echo '\''installed'\'' || echo '\''not_installed'\'' 2>&1)"; C2_OUT="$(dpkg-query -s apparmor-utils &>/dev/null && echo '\''installed'\'' || echo '\''not_installed'\'' 2>&1)"; if { [ "$C1_OUT" = '\''installed'\'' ]; } && { [ "$C2_OUT" = '\''installed'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: AppArmor가 설치되지 않은 경우 시스템은 기본적인 임의적 접근 제어(DAC)에만 의존하게 되며, 애플리케이션 또는 데몬의 취약점이 시스템 전반으로 확산될 가능성이 높아진다. 피지컬 AI 로봇 환경에서는 이러한 침해가 ROS 2 노드 실행 환경 및 로봇 제어 기능에 직접적인 영향을 미칠 수 있으므로 AppArmor 설치는 필수적이다.
    fixGuidance: |-
        다음 명령어를 실행하여 AppArmor를 설치한다:

        apt install apparmor apparmor-utils
