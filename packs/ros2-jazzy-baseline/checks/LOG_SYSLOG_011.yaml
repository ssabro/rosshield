apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_011
    title: journald 로그 영구 저장 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 journald가 기본 로깅 시스템인 경우, Storage가 persistent로 설정되어 있어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Phs '\''^\s*Storage\s*=\s*persistent'\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: Storage=persistent로 설정하면 로그가 /var/log/journal에 영구적으로 저장된다. 이렇게 하면 재부팅 후에도 로그가 유지되어 보안 분석 및 문제 해결에 활용할 수 있다.
    fixGuidance: |-
        /etc/systemd/journald.conf.d/ 디렉토리에 .conf 파일을 생성하여 설정한다:

        mkdir -p /etc/systemd/journald.conf.d/
        cat << 'EOF' >> /etc/systemd/journald.conf.d/60-journald.conf
        [Journal]
        Storage=persistent
        EOF

        systemctl reload-or-restart systemd-journald
