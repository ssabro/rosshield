apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_006
    title: SSH 취약 암호화 알고리즘 비활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 취약한 암호화 알고리즘(3des-cbc, aes*-cbc 등)이 비활성화되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep -Pi "^ciphers.*(3des-cbc|blowfish-cbc|cast128-cbc|aes(128|192|256)-cbc|arcfour(128|256)?|rijndael-cbc@lysator\.liu\.se)" || echo "PASS" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 취약한 암호화 알고리즘은 암호문 해독 공격에 노출될 수 있다. CBC 모드 암호화는 패딩 오라클 공격 등에 취약하다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 취약 암호화 알고리즘을 제외하도록 설정한다.

        Ciphers -3des-cbc,aes128-cbc,aes192-cbc,aes256-cbc

        참고: CVE-2023-48795가 패치된 경우 chacha20-poly1305@openssh.com은 제외 목록에서 제거할 수 있다.
