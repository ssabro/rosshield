apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_001
    title: sshd_config 파일 권한 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, /etc/ssh/sshd_config 및 /etc/ssh/sshd_config.d/*.conf 파일들은 root 사용자만 읽고 쓸 수 있도록 적절한 권한(0600 이하)과 소유자(root:root)로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(fail=0; for f in /etc/ssh/sshd_config $(find /etc/ssh/sshd_config.d -type f -name '\''*.conf'\'' 2>/dev/null); do [ -f "$f" ] || continue; mode=$(stat -c '\''%a'\'' "$f"); owner=$(stat -c '\''%U'\'' "$f"); group=$(stat -c '\''%G'\'' "$f"); [ "$mode" -gt 600 ] && fail=1; [ "$owner" != "root" ] && fail=1; [ "$group" != "root" ] && fail=1; done; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: sshd_config 파일은 SSH 서버의 인증 방식, 접근 제한 등 핵심 보안 설정을 포함한다. 해당 파일이 비인가 사용자에 의해 읽히거나 수정될 경우, 원격 접근 보안이 우회될 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 및 /etc/ssh/sshd_config.d/*.conf 파일의 권한과 소유자를 설정한다.

        chmod u-x,og-rwx /etc/ssh/sshd_config
        chown root:root /etc/ssh/sshd_config

        find /etc/ssh/sshd_config.d -type f -name '*.conf' -exec chmod u-x,og-rwx {} \;
        find /etc/ssh/sshd_config.d -type f -name '*.conf' -exec chown root:root {} \;

        Include 문에 다른 위치가 지정된 경우 해당 경로의 파일도 동일하게 설정한다.
