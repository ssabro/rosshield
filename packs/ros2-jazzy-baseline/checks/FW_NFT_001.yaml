apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_NFT_001
    title: nftables 설치 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 nftables를 방화벽 관리 도구로 사용하는 경우, nftables 패키지는 시스템에 설치되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s nftables &>/dev/null && echo "installed" || echo "not installed" 2>&1)"; if { [ "$C1_OUT" = '\''installed'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: nftables는 Linux 커널의 netfilter 서브시스템을 기반으로 동작하는 방화벽 관리 도구로, 네트워크 패킷 필터링과 분류를 수행한다. nftables가 설치되어 있지 않을 경우 방화벽 규칙을 정의하거나 적용할 수 없으며, 이는 네트워크 접근 통제 부재로 이어질 수 있다.
    fixGuidance: |-
        nftables를 설치한다.

        apt install nftables
