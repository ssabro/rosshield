apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_022
    title: SSH UsePAM 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, PAM(Pluggable Authentication Modules) 사용이 활성화되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep usepam 2>&1)"; if { [ "$C1_OUT" = '\''usepam yes'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: PAM을 사용하면 계정 잠금, 비밀번호 정책 등 중앙화된 인증 및 계정 관리 정책을 적용할 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 UsePAM을 yes로 설정한다.

        UsePAM yes
