apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_BANNER_002
    title: /etc/issue 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 로컬 콘솔 로그인을 위한 경고 배너가 적절히 구성되어 있어야 한다. 로컬 로그인 이전에 표시되는 경고 배너는 시스템 소유권, 접근 통제, 모니터링 여부에 대한 고지를 포함해야 하며, 운영체제 버전이나 상세 시스템 정보는 노출되지 않도록 구성되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Pi '\''(\\v|\\r|\\m|\\s|ubuntu)'\'' /etc/issue 2>/dev/null 2>&1)"; if { [ -z "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 로컬 로그인 경고 배너는 비인가 사용자의 접근을 억제하고, 시스템 사용에 대한 법적 고지를 제공하는 역할을 한다. 또한 배너에 운영체제 버전, 커널 정보, 시스템 구성 정보 등이 포함될 경우 공격자가 특정 취약점을 식별하는 데 악용될 수 있다.
    fixGuidance: /etc/issue 파일을 편집하여 OS 이름, 버전, 아키텍처 등 민감한 정보를 포함하는 행을 제거한다. 사이트 정책에 따라 적절한 경고 배너를 구성한다.
