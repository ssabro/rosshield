apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_012
    title: rsyslog 패키지 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 rsyslog를 로깅에 사용하는 경우, rsyslog 패키지가 설치되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s rsyslog &>/dev/null && echo '\''INSTALLED'\'' || echo '\''NOT_INSTALLED'\'' 2>&1)"; if { [ "$C1_OUT" = '\''INSTALLED'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: rsyslog는 시스템 로그를 수집하고 저장하는 서비스이다. journald 대신 rsyslog를 사용하는 환경에서는 이 패키지가 필수적이다.
    fixGuidance: |-
        rsyslog 패키지를 설치한다:
        apt install rsyslog
