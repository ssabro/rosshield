apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_016
    title: 사전 기반 비밀번호 검사 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 사전 기반 비밀번호 검사(dictcheck)가 비활성화되어 있지 않아야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*dictcheck\s*=\s*0\b'\'' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null || echo '\''PASS'\'' 2>&1)"; C2_OUT="$(grep -Psi '\''^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so\s+([^#]*\s+)?dictcheck\s*=\s*0\b'\'' /etc/pam.d/common-password 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 사전 단어를 비밀번호로 사용하면 사전 공격에 취약하다.
    fixGuidance: |-
        dictcheck = 0 설정이 있다면 주석 처리하거나 제거한다.

        sed -ri 's/^\s*dictcheck\s*=\s*0/# &/' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null
