apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_018
    title: SSH MaxStartups 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 동시 미인증 연결 제한(MaxStartups)이 10:30:60 이하로 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | awk '\''$1 ~ /maxstartups/{split($2, a, ":");if(a[1] <= 10 && a[2] <= 30 && a[3] <= 60) print "PASS"; else print "FAIL"}'\'' | head -1 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 미인증 연결 수를 제한하면 서비스 거부 공격을 완화할 수 있다. 10:30:60은 10개까지 허용, 이후 30% 확률로 거부, 60개에서 모두 거부를 의미한다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 MaxStartups를 10:30:60 이하로 설정한다.

        MaxStartups 10:30:60
