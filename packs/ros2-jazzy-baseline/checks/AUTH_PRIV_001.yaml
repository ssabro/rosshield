apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PRIV_001
    title: sudo 패키지 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 권한 상승을 위해 sudo 또는 sudo-ldap 패키지가 설치되어 있어야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(dpkg-query -s sudo 2>/dev/null | grep -q ''\''''Status: install ok installed''\'''' && echo ''\''''PASS''\'''' || { dpkg-query -s sudo-ldap 2>/dev/null | grep -q ''\''''Status: install ok installed''\'''' && echo ''\''''PASS''\'''' || echo ''\''''FAIL''\''''; } 2>&1)"; if { [ "$C1_OUT" = ''\''''PASS''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: sudo는 일반 사용자가 필요 시 관리자 권한으로 명령을 실행할 수 있게 해주며, 감사 로그를 남긴다.
    fixGuidance: |-
        sudo 패키지를 설치한다.

        apt install sudo

        LDAP 환경에서는:
        apt install sudo-ldap
