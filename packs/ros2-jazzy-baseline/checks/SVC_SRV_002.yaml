apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_002
    title: avahi-daemon 서비스 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 avahi-daemon 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 자동 서비스 탐색 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s avahi-daemon &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled avahi-daemon.socket avahi-daemon.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active avahi-daemon.socket avahi-daemon.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: avahi-daemon은 mDNS 및 DNS-SD를 통해 시스템 이름, 서비스 정보 등을 로컬 네트워크에 자동으로 브로드캐스트한다. 이러한 동작은 공격자에게 네트워크 상의 시스템 존재 여부와 서비스 정보를 노출시킬 수 있다.
    fixGuidance: 'avahi-daemon 패키지를 제거한다: apt purge -y avahi-daemon. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다: systemctl stop avahi-daemon.socket avahi-daemon.service && systemctl mask avahi-daemon.socket avahi-daemon.service.'
