apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_034
    title: 감사 구성 파일 권한(mode) 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 /etc/audit/ 디렉토리의 감사 구성 파일(*.conf, *.rules)의 권한이 0640 이하로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(find /etc/audit/ -type f \( -name '\''*.conf'\'' -o -name '\''*.rules'\'' \) -perm /0137 2>/dev/null | head -1 | grep -q . && echo '\''FAIL'\'' || echo '\''PASS'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 감사 구성 파일의 권한이 부적절하면 무단 사용자가 감사 설정을 읽거나 수정하여 보안 감사를 무력화할 수 있다.
    fixGuidance: |-
        다음 명령어를 실행하여 감사 구성 파일의 권한을 수정한다:

        find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) -exec chmod u-x,g-wx,o-rwx {} +
