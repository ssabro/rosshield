apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_021
    title: SSH PermitUserEnvironment 비활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 사용자 환경 변수 설정(PermitUserEnvironment)이 비활성화되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep permituserenvironment 2>&1)"; if { [ "$C1_OUT" = '\''permituserenvironment no'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 사용자가 환경 변수를 설정할 수 있으면 LD_PRELOAD 등을 통해 보안 제어를 우회할 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 PermitUserEnvironment를 no로 설정한다.

        PermitUserEnvironment no
