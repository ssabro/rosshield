apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: ROS_SVC_001
    title: systemd 서비스로 ROS2 노드 실행
    description: ROS2 노드가 systemd 서비스로 관리되는지 확인
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(systemctl list-units --type=service --state=running 2>/dev/null | grep -iE '\''ros|robot'\'' | head -3 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 자동 시작 및 복구 보장
    fixGuidance: /etc/systemd/system/ros2-robot.service 파일을 생성하고 User=ros_user, Restart=always를 설정한다. systemctl daemon-reload && systemctl enable ros2-robot.service를 실행한다.
