apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_014
    title: samba 서비스 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 rpcbind 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 RPC 포트 매핑 서비스는 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s samba &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled smbd.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active smbd.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: rpcbind 서비스는 RPC 기반 서비스가 사용할 포트를 동적으로 매핑하는 기능을 제공하며, NFS, NIS 등의 서비스와 함께 동작한다. 해당 서비스가 활성화될 경우, RPC 기반 서비스가 존재하지 않더라도 포트 스캔 및 서비스 탐색 공격의 대상이 될 수 있다.
    fixGuidance: samba 패키지를 제거한다. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.
