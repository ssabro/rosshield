apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_011
    title: SSH IgnoreRhosts 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, .rhosts 및 .shosts 파일을 무시하도록 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep ignorerhosts 2>&1)"; if { [ "$C1_OUT" = '\''ignorerhosts yes'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: .rhosts 파일은 rsh 시대의 유산으로, 비밀번호 없이 원격 접속을 허용할 수 있어 보안에 취약하다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 IgnoreRhosts를 yes로 설정한다.

        IgnoreRhosts yes
