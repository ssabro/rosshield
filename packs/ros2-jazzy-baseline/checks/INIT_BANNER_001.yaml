apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_BANNER_001
    title: /etc/motd 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 메시지 오브 더 데이(Message of the Day, MOTD)가 적절히 구성되어 있어야 한다. 로그인 이후 사용자에게 표시되는 MOTD에는 보안 경고 문구가 포함되어야 하며, 운영체제 버전이나 시스템 구성과 같은 상세 정보는 노출되지 않도록 해야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Pi '\''(\\v|\\r|\\m|\\s|ubuntu)'\'' /etc/motd 2>/dev/null 2>&1)"; if { [ -z "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: MOTD는 로그인 후 사용자에게 전달되는 메시지로, 시스템 사용에 대한 경고 및 법적 고지를 전달하는 수단으로 활용될 수 있다. 반대로 MOTD에 운영체제 버전, 커널 정보, 시스템 역할 등의 상세 정보가 포함될 경우 공격자가 특정 취약점을 식별하는 데 악용될 수 있다.
    fixGuidance: /etc/motd 파일을 편집하여 OS 이름, 버전, 아키텍처 등 민감한 정보를 포함하는 행을 제거한다. 사이트 정책에 따라 적절한 경고 배너를 구성한다.
