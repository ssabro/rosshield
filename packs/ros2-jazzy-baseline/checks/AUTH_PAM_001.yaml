apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_001
    title: libpam-runtime 최신 버전 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 libpam-runtime 패키지가 최신 보안 패치가 적용된 버전으로 설치되어 있어야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(dpkg-query -s libpam-runtime 2>/dev/null | grep -q ''\''''Status: install ok installed''\'''' && echo ''\''''PASS''\'''' || echo ''\''''FAIL''\'''' 2>&1)"; C2_OUT="$(dpkg --compare-versions "$(dpkg-query -W -f=''\''''${Version}''\'''' libpam-runtime 2>/dev/null)" ge ''\''''1.5.3-5''\'''' && echo ''\''''PASS''\'''' || echo ''\''''FAIL''\'''' 2>&1)"; if { [ "$C1_OUT" = ''\''''PASS''\'''' ]; } && { [ "$C2_OUT" = ''\''''PASS''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: PAM(Pluggable Authentication Modules)은 시스템 인증의 핵심 구성 요소이다. 오래된 버전에는 보안 취약점이 존재할 수 있으므로 최신 버전을 유지해야 한다.
    fixGuidance: |-
        libpam-runtime 패키지를 최신 버전으로 업그레이드한다.

        apt update && apt upgrade libpam-runtime
