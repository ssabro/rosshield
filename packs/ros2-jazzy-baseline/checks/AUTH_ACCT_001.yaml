apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_ACCT_001
    title: 비밀번호 최대 사용 기간 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호 최대 사용 기간(PASS_MAX_DAYS)이 365일 이하로 설정되어야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(grep -Pi ''\''''^\s*PASS_MAX_DAYS\s+([1-9]|[1-9][0-9]|[1-2][0-9][0-9]|3[0-5][0-9]|36[0-5])\s*$''\'''' /etc/login.defs 2>/dev/null 2>&1)"; C2_OUT="$(awk -F: ''\''''($2~/^\$.+\$/) {if($5 > 365 || $5 < 1)print $1}''\'''' /etc/shadow 2>/dev/null || echo ''\''''PASS''\'''' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = ''\''''''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 비밀번호를 주기적으로 변경하면 탈취된 비밀번호가 장기간 악용되는 것을 방지할 수 있다.
    fixGuidance: |-
        /etc/login.defs에서 PASS_MAX_DAYS를 365 이하로 설정한다.

        sed -i 's/^PASS_MAX_DAYS.*/PASS_MAX_DAYS 365/' /etc/login.defs

        기존 사용자의 설정을 변경한다:
        chage --maxdays 365 <사용자>

        또는 모든 사용자 일괄 변경:
        awk -F: '($2~/^\$.+\$/) {if($5 > 365 || $5 < 1)system("chage --maxdays 365 " $1)}' /etc/shadow
