apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PKG_002
    title: 패키지 관리자 저장소 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 패키지 관리자가 사용하는 소프트웨어 저장소가 적절히 구성되어 있어야 한다. 운영체제 및 ROS 2 관련 패키지는 신뢰할 수 있는 공식 저장소 또는 조직에서 승인한 저장소를 통해서만 설치·업데이트되도록 구성되어야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 패키지 저장소는 운영체제 및 주요 소프트웨어 구성요소의 공급 경로에 해당한다. 저장소 구성이 부적절하거나 출처가 불분명한 저장소가 사용될 경우, 악성 코드가 포함된 패키지가 설치되거나 취약한 패키지가 유입될 수 있다.
    fixGuidance: |-
        사이트 정책에 따라 패키지 관리자 저장소를 구성한다.

        공식 Ubuntu 저장소와 ROS 2 저장소가 올바르게 설정되어 있는지 확인한다.
