apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_018
    title: 웹 서버 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 웹 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 HTTP/HTTPS 기반 웹 서버 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s apache2 &>/dev/null && echo '\''installed'\''; dpkg-query -s nginx &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled apache2.socket apache2.service nginx.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active apache2.socket apache2.service nginx.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 웹 서버 서비스는 네트워크를 통해 웹 콘텐츠 및 API를 제공하며, 활성화될 경우 외부로 서비스 포트를 노출하게 된다. 이러한 서비스는 취약한 설정이나 패치 미흡 시 원격 코드 실행, 정보 노출, 서비스 거부 공격의 대상이 될 수 있다.
    fixGuidance: apache2 및 nginx 패키지를 제거한다. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.
