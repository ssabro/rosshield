apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_ACCT_011
    title: root PATH 환경변수 보안 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 root의 PATH 환경변수에 보안에 취약한 경로가 포함되지 않아야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sudo -Hiu root env | grep '\''^PATH'\'' | grep -q '\''::'\'' && echo '\''FAIL'\'' || echo '\''PASS'\'' 2>&1)"; C2_OUT="$(sudo -Hiu root env | grep '\''^PATH'\'' | grep -Pq '\'':\s*$'\'' && echo '\''FAIL'\'' || echo '\''PASS'\'' 2>&1)"; C3_OUT="$(sudo -Hiu root env | grep '\''^PATH'\'' | grep -Pq '\''(\s+|:)\.(:| |$)'\'' && echo '\''FAIL'\'' || echo '\''PASS'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; } && { [ "$C3_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: root의 PATH에 빈 디렉토리(::), 후행 콜론(:), 현재 디렉토리(.), root가 아닌 소유자의 디렉토리, 755보다 느슨한 권한의 디렉토리가 있으면 악의적인 명령어가 실행될 수 있다.
    fixGuidance: |-
        root의 PATH에서 다음 항목을 제거하거나 수정한다:
        • 빈 디렉토리 (::)
        • 후행 콜론 (:)
        • 현재 디렉토리 (.)
        • root가 아닌 소유자의 디렉토리
        • 755보다 느슨한 권한의 디렉토리

        /root/.bashrc, /root/.bash_profile 등의 파일을 편집하여 PATH를 수정한다.
