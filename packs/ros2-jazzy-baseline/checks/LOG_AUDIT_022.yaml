apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_022
    title: MAC(AppArmor 등) 설정 변경 이벤트 감사 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 AppArmor 설정 변경을 감사하는 규칙이 설정되어야 한다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: MAC(Mandatory Access Control) 정책의 변경을 감사하면 보안 정책을 무단으로 수정하려는 시도를 탐지할 수 있다.
    fixGuidance: |-
        /etc/audit/rules.d/ 디렉토리에 규칙 파일을 생성한다:

        printf "
        -w /etc/apparmor/ -p wa -k MAC-policy
        -w /etc/apparmor.d/ -p wa -k MAC-policy
        " >> /etc/audit/rules.d/50-MAC-policy.rules

        규칙을 로드한다:
        augenrules --load
