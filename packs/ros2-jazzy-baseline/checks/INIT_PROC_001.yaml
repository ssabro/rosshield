apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PROC_001
    title: randomize_va_space (ASLR) 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 주소 공간 배치 난수화(Address Space Layout Randomization, ASLR)가 활성화되어 있어야 한다. ASLR은 프로세스의 메모리 주소 배치를 무작위화하여 공격자가 메모리 위치를 예측하기 어렵게 만든다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: ASLR은 버퍼 오버플로우, 코드 재사용 공격(Return-Oriented Programming) 등 메모리 기반 공격의 성공 가능성을 낮추는 핵심 보안 기법이다. 피지컬 AI 로봇 환경에서는 이러한 공격이 ROS 2 노드 또는 시스템 데몬을 통해 확산될 경우 로봇 제어 기능에 직접적인 영향을 미칠 수 있으므로, ASLR 활성화가 필수적이다.
    fixGuidance: sysctl -w kernel.randomize_va_space=2 명령으로 현재 커널 파라미터를 설정하고, /etc/sysctl.conf 또는 /etc/sysctl.d/ 파일에 kernel.randomize_va_space = 2를 추가하여 영구 설정한다.
