apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_019
    title: logrotate 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 logrotate가 사이트 정책에 따라 구성되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$([ -f /etc/logrotate.conf ] && echo '\''EXISTS'\'' || echo '\''NOT_EXISTS'\'' 2>&1)"; if { [ "$C1_OUT" = '\''EXISTS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: logrotate가 올바르게 구성되지 않으면 로그 파일이 디스크 공간을 모두 소비하거나, 너무 빨리 삭제되어 보안 분석에 필요한 로그가 손실될 수 있다.
    fixGuidance: |-
        /etc/logrotate.conf 또는 해당 설정 파일을 편집하여 사이트 정책에 맞게 로그 회전을 구성한다.

        예시 구성 (/etc/logrotate.conf):
        # 주간 회전
        weekly
        # 4개 백업 유지
        rotate 4
        # 회전 후 새 로그 파일 생성
        create
        # 날짜 확장자 사용
        dateext
        # 압축 활성화
        compress
