apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_IP4_003
    title: iptables 아웃바운드 및 기존 연결 처리 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 iptables를 방화벽 관리 도구로 사용하는 경우, 아웃바운드 트래픽과 기존에 수립된(established/related) 네트워크 연결에 대한 처리 규칙이 명확히 정의되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(fail=0; iptables -L OUTPUT -v -n 2>/dev/null | grep -qE '\''ACCEPT.*(NEW|ESTABLISHED)'\'' || fail=1; iptables -L INPUT -v -n 2>/dev/null | grep -qE '\''ACCEPT.*ESTABLISHED'\'' || fail=1; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 기존 연결을 허용하지 않을 경우 정상적인 네트워크 세션이 중단되어 서비스 장애가 발생할 수 있다. 또한 아웃바운드 트래픽을 무제한 허용할 경우 악성 코드의 외부 통신이나 정보 유출 경로가 될 수 있다.
    fixGuidance: |-
        iptables 연결 상태 규칙을 추가한다.

        iptables -A OUTPUT -p tcp -m state --state NEW,ESTABLISHED -j ACCEPT
        iptables -A OUTPUT -p udp -m state --state NEW,ESTABLISHED -j ACCEPT
        iptables -A INPUT -p tcp -m state --state ESTABLISHED -j ACCEPT
        iptables -A INPUT -p udp -m state --state ESTABLISHED -j ACCEPT
