apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_005
    title: SSH 로그인 경고 배너 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 로그인 전 경고 배너가 표시되도록 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep -Pi '\''^banner\s+/\S+'\'' 2>&1)"; C2_OUT="$(BANNER=$(sshd -T 2>/dev/null | awk '\''/^banner /{print $2}'\''); [ -z "$BANNER" ] || [ "$BANNER" = '\''none'\'' ] && echo '\''PASS'\'' || { [ -f "$BANNER" ] && grep -qPi '\''\\[vrms]'\'' "$BANNER" && echo '\''FAIL'\'' || echo '\''PASS'\''; } 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 경고 배너는 비인가 사용자에게 법적 고지를 제공하고, 시스템 접근에 대한 책임을 명확히 한다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 Banner 설정을 추가한다.

        Banner /etc/issue.net

        배너 파일 내용 예시:
        echo "Authorized users only. All activity may be monitored and reported." > /etc/issue.net

        참고: 배너 파일에 시스템 정보(\v, \r, \m, \s)를 포함하지 않는다.
