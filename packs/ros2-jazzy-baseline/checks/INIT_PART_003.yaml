apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_003
    title: /tmp 파티션에 nosuid 옵션 설정
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /tmp 디렉터리에 nosuid 마운트 옵션이 설정되어야 한다. /tmp 영역에서 setuid 및 setgid 비트가 적용된 파일이 실행되지 않도록 구성되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /tmp | grep nosuid 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /tmp 디렉터리는 다수의 프로세스와 사용자가 임시 파일을 생성·사용하는 공용 영역으로, 접근 권한이 비교적 넓게 허용된다. 해당 영역에서 setuid 또는 setgid 비트가 적용된 파일이 실행될 경우, 공격자가 이를 악용하여 권한 상승을 시도할 수 있다.
    fixGuidance: '/tmp 파티션이 별도로 존재하는 경우, /etc/fstab 파일의 /tmp 마운트 항목에 nosuid 옵션을 추가한다. 예: <device> /tmp <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0. 설정 후 mount -o remount /tmp 명령으로 변경사항을 즉시 적용한다.'
