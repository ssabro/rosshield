apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_013
    title: rsync 서비스 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 프린트 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 인쇄 서비스 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s rsync &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled rsync.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active rsync.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 프린트 서버 서비스(CUPS)는 로컬 또는 네트워크를 통해 인쇄 작업을 처리하는 기능을 제공하며, 웹 기반 관리 인터페이스 및 네트워크 포트를 포함할 수 있다. 해당 서비스가 활성화될 경우 불필요한 서비스 노출, 접근 통제 미흡, 취약점 악용 등의 보안 위협이 발생할 수 있다.
    fixGuidance: rsync 패키지를 제거한다. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.
