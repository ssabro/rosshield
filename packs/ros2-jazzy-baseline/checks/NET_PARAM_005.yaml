apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: NET_PARAM_005
    title: ICMP 리다이렉트 거부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 IPv4 및 IPv6 환경에서 ICMP 리다이렉트 메시지를 수신하지 않도록 구성되어야 한다. 시스템은 외부로부터 전달되는 네트워크 경로 변경 지시를 수용하지 않아야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: ICMP 리다이렉트 메시지는 네트워크 경로 변경을 안내하기 위해 사용되지만, 공격자가 이를 위조하여 트래픽을 비인가 경로로 우회시키거나 중간자 공격을 수행하는 데 악용할 수 있다. CIS 벤치마크에서는 이러한 위험을 방지하기 위해 라우터 역할을 수행하지 않는 시스템에서 ICMP 리다이렉트 수신을 비활성화할 것을 권고하고 있다.
    fixGuidance: |-
        ICMP 리다이렉트 수신을 비활성화한다.

        # IPv4
        printf '%s\n' "net.ipv4.conf.all.accept_redirects = 0" "net.ipv4.conf.default.accept_redirects = 0" >> /etc/sysctl.d/60-netipv4_sysctl.conf
        sysctl -w net.ipv4.conf.all.accept_redirects=0
        sysctl -w net.ipv4.conf.default.accept_redirects=0
        sysctl -w net.ipv4.route.flush=1

        # IPv6 (활성화된 경우)
        printf '%s\n' "net.ipv6.conf.all.accept_redirects = 0" "net.ipv6.conf.default.accept_redirects = 0" >> /etc/sysctl.d/60-netipv6_sysctl.conf
        sysctl -w net.ipv6.conf.all.accept_redirects=0
        sysctl -w net.ipv6.conf.default.accept_redirects=0
        sysctl -w net.ipv6.route.flush=1
