apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_FIM_001
    title: AIDE 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 AIDE(Advanced Intrusion Detection Environment) 및 aide-common 패키지가 설치되어 있어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s aide &>/dev/null && echo '\''installed'\'' || echo '\''not_installed'\'' 2>&1)"; C2_OUT="$(dpkg-query -s aide-common &>/dev/null && echo '\''installed'\'' || echo '\''not_installed'\'' 2>&1)"; if { [ "$C1_OUT" = '\''installed'\'' ]; } && { [ "$C2_OUT" = '\''installed'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: AIDE는 파일 시스템의 무결성을 검사하는 도구이다. 파일의 변경, 추가, 삭제를 탐지하여 시스템 침입이나 무단 변경을 감지할 수 있다.
    fixGuidance: |-
        다음 명령어를 실행하여 AIDE를 설치한다:

        apt install aide aide-common

        환경에 맞게 AIDE를 구성한 후 초기화한다:
        aideinit
        mv /var/lib/aide/aide.db.new /var/lib/aide/aide.db
