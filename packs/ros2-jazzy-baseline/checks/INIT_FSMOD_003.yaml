apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_FSMOD_003
    title: hfs 커널 모듈 비활성화
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 hfs 파일시스템의 마운트가 비활성화되어야 한다. 로봇 운용 및 유지보수에 필요하지 않은 파일시스템은 시스템에서 사용되지 않도록 구성되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(lsmod | grep hfs 2>&1)"; C2_OUT="$(modprobe --showconfig | grep -P '\''\binstall\h+hfs\h+((/usr)?/bin/(true|false))\b'\'' 2>&1)"; C3_OUT="$(modprobe --showconfig | grep -P '\''\bblacklist\h+hfs\b'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; } && { [ -n "$C3_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: hfs 파일시스템은 Apple 운영체제와의 호환성을 위해 제공되는 파일시스템으로, 일반적인 Ubuntu 24.04 LTS 기반 ROS 2 Jazzy 로봇 Host 환경에서는 사용될 필요가 없다. 사용되지 않는 파일시스템이 활성화되어 있을 경우, 해당 파일시스템 구현의 취약점이 공격 경로로 악용될 수 있다.
    fixGuidance: hfs 커널 모듈이 시스템에 존재하는 경우, /etc/modprobe.d/ 디렉터리에 install hfs /bin/false 및 blacklist hfs 설정 파일을 생성하고, 현재 로드된 모듈을 언로드한다. 모듈이 시스템에 존재하지 않거나 커널에 미리 컴파일된 경우 조치 불필요.
