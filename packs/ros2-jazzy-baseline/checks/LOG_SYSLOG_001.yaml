apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_001
    title: systemd-journald 서비스 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 systemd-journald 서비스가 활성화되어 있어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(systemctl is-enabled systemd-journald.service 2>/dev/null 2>&1)"; C2_OUT="$(systemctl is-active systemd-journald.service 2>/dev/null 2>&1)"; if { printf '\''%s'\'' "$C1_OUT" | grep -qE '\''^(static|enabled)$'\''; } && { [ "$C2_OUT" = '\''active'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: systemd-journald는 시스템 로그를 수집하고 저장하는 핵심 서비스이다. 이 서비스가 비활성화되면 보안 이벤트 추적이 불가능해진다.
    fixGuidance: |-
        systemd-journald 서비스를 unmask하고 시작한다:

        systemctl unmask systemd-journald.service
        systemctl start systemd-journald.service
