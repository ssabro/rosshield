apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: ROS_SAF_002
    title: Watchdog 노드 구성
    description: 핵심 ROS2 노드의 생존 상태를 감시하는 Watchdog 노드 또는 메커니즘이 구성되었는지 확인
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(ros2 node list 2>/dev/null | grep -iE '\''watchdog|monitor|health_check|lifecycle_manager'\'' | head -1 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 핵심 노드의 비정상 종료 시 감지하지 못하면 로봇이 제어 불능 상태로 방치될 수 있음
    fixGuidance: software_watchdog 패키지를 설치하거나 Lifecycle 노드 기반의 감시 노드를 구성한다. 핵심 노드 장애 시 비상정지를 트리거하도록 설정한다.
