apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_026
    title: /var/log/audit 디렉터리에 noexec 옵션 설정
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /var/log/audit 디렉터리에 noexec 마운트 옵션이 설정되어야 한다. 감사 로그가 저장되는 영역에서 실행 파일이 직접 실행되지 않도록 구성되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /var/log/audit | grep noexec 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /var/log/audit 디렉터리는 auditd 데몬이 보안 이벤트 및 시스템 활동 로그를 저장하는 위치로, 보안 감사 및 침해 사고 분석의 핵심 증적이 된다. 해당 영역에서 실행 권한이 허용될 경우, 공격자가 악성 실행 파일을 은닉하거나 실행하여 감사 로그의 무결성을 훼손할 가능성이 있다.
    fixGuidance: '/var/log/audit 파티션이 별도로 존재하는 경우, /etc/fstab 파일의 /var/log/audit 마운트 항목에 noexec 옵션을 추가한다. 예: <device> /var/log/audit <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0. 설정 후 mount -o remount /var/log/audit 명령으로 변경사항을 즉시 적용한다.'
