apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_016
    title: SSH MaxAuthTries 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 최대 인증 시도 횟수(MaxAuthTries)가 4회 이하로 설정되어야 한다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 인증 시도 횟수를 제한하면 무차별 대입 공격의 효과를 줄일 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 MaxAuthTries를 4 이하로 설정한다.

        MaxAuthTries 4
