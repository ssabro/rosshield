apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_012
    title: 비밀번호 최소 길이 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호 최소 길이가 14자 이상으로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*minlen\s*=\s*(1[4-9]|[2-9][0-9]|[1-9][0-9]{2,})\b'\'' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null 2>&1)"; C2_OUT="$(grep -Psi '\''^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so\s+([^#]*\s+)?minlen\s*=\s*([0-9]|1[0-3])\b'\'' /etc/pam.d/common-password 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 긴 비밀번호는 무차별 대입 공격에 대한 저항성이 높다.
    fixGuidance: |-
        /etc/security/pwquality.conf.d/ 디렉토리에 설정 파일을 생성한다.

        mkdir -p /etc/security/pwquality.conf.d
        echo "minlen = 14" > /etc/security/pwquality.conf.d/50-pwlength.conf
