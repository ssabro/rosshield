apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_IP6_003
    title: ip6tables 아웃바운드 및 기존 연결 처리 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 IPv6가 활성화되어 있고 ip6tables를 사용하는 경우, 아웃바운드 IPv6 트래픽과 기존에 수립된(established/related) 연결에 대한 처리 규칙이 명확히 정의되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(ipv6_disabled="no"; grep -Pqs -- '\''^\h*0\b'\'' /sys/module/ipv6/parameters/disable || ipv6_disabled="yes"; if [ "$ipv6_disabled" = "no" ]; then sysctl net.ipv6.conf.all.disable_ipv6 2>/dev/null | grep -q '\''= 1'\'' && sysctl net.ipv6.conf.default.disable_ipv6 2>/dev/null | grep -q '\''= 1'\'' && ipv6_disabled="yes"; fi; echo $ipv6_disabled | grep -q yes && echo "PASS" || { fail=0; ip6tables -L OUTPUT -v -n 2>/dev/null | grep -qE '\''ACCEPT.*(NEW|ESTABLISHED)'\'' || fail=1; ip6tables -L INPUT -v -n 2>/dev/null | grep -qE '\''ACCEPT.*ESTABLISHED'\'' || fail=1; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL"; } 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 기존 연결을 허용하지 않을 경우 정상적인 IPv6 네트워크 세션이 중단되어 서비스 장애가 발생할 수 있다. 또한 아웃바운드 트래픽을 무제한 허용할 경우 IPv6 기반 외부 통신을 통한 정보 유출이나 악성 행위가 발생할 수 있다.
    fixGuidance: |-
        IPv6가 활성화된 경우, ip6tables 연결 상태 규칙을 추가한다.

        ip6tables -A OUTPUT -p tcp -m state --state NEW,ESTABLISHED -j ACCEPT
        ip6tables -A OUTPUT -p udp -m state --state NEW,ESTABLISHED -j ACCEPT
        ip6tables -A INPUT -p tcp -m state --state ESTABLISHED -j ACCEPT
        ip6tables -A INPUT -p udp -m state --state ESTABLISHED -j ACCEPT
