apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_007
    title: systemd-journal-upload 서비스 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 systemd-journal-upload 서비스가 활성화되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(systemctl is-enabled systemd-journal-upload.service 2>/dev/null 2>&1)"; C2_OUT="$(systemctl is-active systemd-journal-upload.service 2>/dev/null 2>&1)"; if { [ "$C1_OUT" = '\''enabled'\'' ]; } && { [ "$C2_OUT" = '\''active'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: systemd-journal-upload 서비스를 활성화하면 로컬 journald 로그가 원격 로그 서버로 자동 전송된다.
    fixGuidance: |-
        systemd-journal-upload 서비스를 unmask하고 활성화한다:

        systemctl unmask systemd-journal-upload.service
        systemctl --now enable systemd-journal-upload.service
