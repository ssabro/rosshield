apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_014
    title: 동일 문자 연속 사용 제한 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호에 동일 문자를 연속으로 3회 이하만 사용할 수 있도록 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*maxrepeat\s*=\s*[1-3]\b'\'' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null 2>&1)"; C2_OUT="$(grep -Psi '\''^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so\s+([^#]*\s+)?maxrepeat\s*=\s*(0|[4-9]|[1-9][0-9]+)\b'\'' /etc/pam.d/common-password 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: '동일 문자 반복(예: aaa)을 제한하면 비밀번호 강도가 높아진다.'
    fixGuidance: |-
        /etc/security/pwquality.conf.d/ 디렉토리에 설정 파일을 생성한다.

        mkdir -p /etc/security/pwquality.conf.d
        echo "maxrepeat = 3" > /etc/security/pwquality.conf.d/50-pwrepeat.conf
