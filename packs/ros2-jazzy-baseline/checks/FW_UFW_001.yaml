apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_UFW_001
    title: ufw 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 Uncomplicated Firewall(UFW)를 방화벽 관리 도구로 사용하는 경우, UFW 패키지는 시스템에 설치되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s ufw 2>/dev/null | grep -q '\''^Status:.*install ok installed'\'' && echo '\''installed'\'' || echo '\''not_installed'\'' 2>&1)"; if { [ "$C1_OUT" = '\''installed'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: UFW는 iptables 기반의 호스트 방화벽을 간단하게 구성·관리할 수 있도록 제공되는 도구로, 방화벽 정책을 일관되게 적용하는 데 사용된다. UFW가 설치되어 있지 않을 경우, 방화벽 규칙을 적용하거나 관리할 수 없으며, 이는 네트워크 접근 통제 부재로 이어질 수 있다.
    fixGuidance: |-
        UFW를 설치한다.

        apt install ufw
