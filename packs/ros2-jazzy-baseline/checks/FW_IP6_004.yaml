apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_IP6_004
    title: 개방된 모든 IPv6 포트에 대한 ip6tables 규칙 존재 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 IPv6가 활성화되어 있고 ip6tables를 사용하는 경우, 시스템에서 개방된 모든 IPv6 네트워크 포트는 ip6tables 방화벽 규칙에 의해 명시적으로 허용 또는 차단되어 있어야 한다.
    severity: medium
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(ipv6_disabled="no"; grep -Pqs -- ''\''''^\h*0\b''\'''' /sys/module/ipv6/parameters/disable || ipv6_disabled="yes"; if [ "$ipv6_disabled" = "no" ]; then sysctl net.ipv6.conf.all.disable_ipv6 2>/dev/null | grep -q ''\''''= 1''\'''' && sysctl net.ipv6.conf.default.disable_ipv6 2>/dev/null | grep -q ''\''''= 1''\'''' && ipv6_disabled="yes"; fi; echo $ipv6_disabled | grep -q yes && echo "PASS" || { open_ports=$(ss -6tuln | awk ''\''''($5!~/::1:/ && $5!~/%lo:/) {split($5, a, "]:"); if(a[2]!="") print a[2]; else {split($5,b,":"); print b[length(b)]}}''\'''' | sort -u); ipt_rules=$(ip6tables -L INPUT -n 2>/dev/null | grep -oE ''\''''dpt:[0-9]+''\'''' | cut -d: -f2 | sort -u); missing=""; for p in $open_ports; do echo "$ipt_rules" | grep -q "^$p$" || missing="$missing $p"; done; [ -z "$missing" ] && echo "PASS" || echo "FAIL:$missing"; } 2>&1)"; if { [ "$C1_OUT" = ''\''''PASS''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 개방된 IPv6 포트가 방화벽 규칙에 의해 관리되지 않을 경우, 불필요한 서비스 노출이나 IPv6 기반 공격 표면 확대가 발생할 수 있다. CIS 벤치마크에서는 IPv6 환경에서도 네트워크 접근 통제의 완전성을 확보하기 위해 모든 개방 포트에 대해 방화벽 규칙이 존재할 것을 권고하고 있다.
    fixGuidance: |-
        IPv6가 활성화된 경우, 열린 포트에 대해 ip6tables 규칙을 추가한다.

        ip6tables -A INPUT -p <protocol> --dport <port> -m state --state NEW -j ACCEPT
