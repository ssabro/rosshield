apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PROC_005
    title: 자동 오류 보고 기능 비활성화 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 자동 오류 보고 기능이 비활성화되어 있어야 한다. 자동 오류 보고는 시스템 오류 정보를 외부로 전송할 수 있다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s apport &>/dev/null && systemctl is-enabled apport.service 2>/dev/null || echo '\''not_installed'\'' 2>&1)"; if { printf '\''%s'\'' "$C1_OUT" | grep -qE '\''^(not_installed|masked)$'\''; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 자동 오류 보고 기능은 충돌 정보 및 메모리 상태 등 민감한 시스템 정보를 포함할 수 있으며, 외부 전송 시 정보 유출 위험이 존재한다. 피지컬 AI 로봇 환경에서는 이러한 정보 유출이 보안 공격의 단서로 악용될 수 있다.
    fixGuidance: 'apport 패키지를 제거하거나 서비스를 마스크한다. 제거: apt purge apport, 마스크: systemctl mask apport.service'
