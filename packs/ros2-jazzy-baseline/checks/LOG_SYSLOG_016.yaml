apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_016
    title: rsyslog 로그 수집 정책 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 rsyslog를 사용하는 경우, 사이트 정책에 따라 적절한 로그 수집 정책이 설정되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Phs '\''^[^#\s].*\/var\/log\/'\'' /etc/rsyslog.conf /etc/rsyslog.d/*.conf 2>/dev/null | head -1 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 적절한 로그 수집 정책이 설정되지 않으면 중요한 보안 이벤트가 기록되지 않거나, 로그가 제대로 분류되지 않을 수 있다.
    fixGuidance: |-
        사이트 정책에 따라 /etc/rsyslog.conf 또는 /etc/rsyslog.d/ 디렉토리의 설정 파일을 편집한다.

        예시 구성:
        auth,authpriv.*                 /var/log/secure
        mail.*                          -/var/log/mail
        cron.*                          /var/log/cron
        *.=warning;*.=err               -/var/log/warn
        *.crit                          /var/log/warn
        *.*;mail.none;news.none         -/var/log/messages

        서비스 재시작:
        systemctl reload-or-restart rsyslog
