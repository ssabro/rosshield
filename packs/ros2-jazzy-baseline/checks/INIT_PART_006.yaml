apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_006
    title: /dev/shm 파티션에 nodev 옵션 설정
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /dev/shm 디렉터리에 nodev 마운트 옵션이 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /dev/shm | grep nodev 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /dev/shm은 world-writable 영역으로, 디바이스 파일 생성이 허용될 경우 공격자가 이를 악용하여 시스템 자원에 비인가 접근을 시도할 수 있다. nodev 옵션을 적용함으로써 이러한 위험을 사전에 차단할 수 있다.
    fixGuidance: '/dev/shm 파티션의 /etc/fstab 마운트 항목에 nodev 옵션을 추가한다. 예: tmpfs /dev/shm tmpfs defaults,rw,nosuid,nodev,noexec,relatime 0 0. 설정 후 mount -o remount /dev/shm 명령으로 변경사항을 즉시 적용한다.'
