apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_UFW_006
    title: ufw 방화벽 규칙 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 UFW를 방화벽 관리 도구로 사용하는 경우, 시스템에서 열려 있는 모든 네트워크 포트는 UFW 방화벽 규칙에 의해 명시적으로 관리되어야 한다. 각 포트는 허용 또는 차단 정책이 명확히 정의되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(open_ports=$(ss -tuln | awk '\''($5!~/%lo:/ && $5!~/127.0.0.1:/ && $5!~/\[?::1\]?:/) {split($5, a, ":"); print a[2]}'\'' | sort -u); ufw_ports=$(ufw status verbose 2>/dev/null | grep -Po '\''^\h*\d+\b'\'' | sort -u); missing=""; for p in $open_ports; do echo "$ufw_ports" | grep -q "^$p$" || missing="$missing $p"; done; [ -z "$missing" ] && echo "PASS" || echo "FAIL:$missing" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 시스템에서 열려 있는 포트가 방화벽 규칙에 의해 명확히 통제되지 않을 경우, 불필요한 서비스 노출이나 공격자가 접근 가능한 공격 표면이 증가할 수 있다. CIS 벤치마크에서는 네트워크 접근 통제의 완전성을 확보하기 위해, 열려 있는 모든 포트에 대해 방화벽 규칙이 존재할 것을 권고하고 있다.
    fixGuidance: |-
        열린 포트에 대해 방화벽 규칙을 추가한다.

        예시:
        ufw allow in <port>/<tcp|udp>
        ufw deny in <port>/<tcp|udp>

        특정 네트워크에서만 허용:
        ufw allow from 192.168.1.0/24 to any proto tcp port 443
