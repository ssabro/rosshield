apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_006
    title: systemd-journal-upload 인증 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 systemd-journal-upload 인증이 올바르게 구성되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Phs '\''^\s*URL\s*='\'' /etc/systemd/journal-upload.conf /etc/systemd/journal-upload.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C2_OUT="$(grep -Phs '\''^\s*ServerKeyFile\s*='\'' /etc/systemd/journal-upload.conf /etc/systemd/journal-upload.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C3_OUT="$(grep -Phs '\''^\s*ServerCertificateFile\s*='\'' /etc/systemd/journal-upload.conf /etc/systemd/journal-upload.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C4_OUT="$(grep -Phs '\''^\s*TrustedCertificateFile\s*='\'' /etc/systemd/journal-upload.conf /etc/systemd/journal-upload.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; } && { [ -n "$C3_OUT" ]; } && { [ -n "$C4_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 원격 로그 서버로 로그를 전송할 때 인증을 사용하면 로그 데이터의 기밀성과 무결성을 보장할 수 있다.
    fixGuidance: |-
        /etc/systemd/journal-upload.conf 또는 /etc/systemd/journal-upload.conf.d/ 디렉토리에 .conf 파일을 생성하여 설정한다.

        예시 구성:
        [Upload]
        URL=192.168.50.42
        ServerKeyFile=/etc/ssl/private/journal-upload.pem
        ServerCertificateFile=/etc/ssl/certs/journal-upload.pem
        TrustedCertificateFile=/etc/ssl/ca/trusted.pem

        설정 후 서비스 재시작:
        systemctl reload-or-restart systemd-journal-upload
