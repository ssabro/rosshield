apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_017
    title: SSH MaxSessions 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 연결당 최대 세션 수(MaxSessions)가 10 이하로 설정되어야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 세션 수를 제한하면 단일 연결에서의 리소스 남용을 방지할 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 MaxSessions를 10 이하로 설정한다.

        MaxSessions 10
