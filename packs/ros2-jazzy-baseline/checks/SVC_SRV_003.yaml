apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_003
    title: dhcp-server 서비스 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 DHCP 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 네트워크 주소 할당 서비스는 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s isc-dhcp-server &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled isc-dhcp-server.service isc-dhcp-server6.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active isc-dhcp-server.service isc-dhcp-server6.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: DHCP 서버 서비스는 네트워크에 연결된 장치에 IP 주소 및 네트워크 설정을 자동으로 할당하는 기능을 제공한다. 로봇 Host에서 해당 서비스가 활성화될 경우, 의도하지 않은 네트워크 장비에 주소를 할당하거나 네트워크 구성을 변경하여 통신 장애 또는 보안 사고를 유발할 수 있다.
    fixGuidance: 'isc-dhcp-server 패키지를 제거한다: apt purge -y isc-dhcp-server. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다: systemctl stop isc-dhcp-server.service isc-dhcp-server6.service && systemctl mask isc-dhcp-server.service isc-dhcp-server6.service.'
