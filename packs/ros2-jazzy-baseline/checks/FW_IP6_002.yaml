apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_IP6_002
    title: ip6tables 루프백 트래픽 처리 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 IPv6가 활성화되어 있고 ip6tables를 사용하는 경우, 루프백 인터페이스를 통한 트래픽은 허용되어야 하며, 외부 인터페이스에서 출발지 주소가 루프백(::1)으로 위조된 트래픽은 차단되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(ipv6_disabled="no"; grep -Pqs -- '\''^\h*0\b'\'' /sys/module/ipv6/parameters/disable || ipv6_disabled="yes"; if [ "$ipv6_disabled" = "no" ]; then sysctl net.ipv6.conf.all.disable_ipv6 2>/dev/null | grep -q '\''= 1'\'' && sysctl net.ipv6.conf.default.disable_ipv6 2>/dev/null | grep -q '\''= 1'\'' && ipv6_disabled="yes"; fi; echo $ipv6_disabled | grep -q yes && echo "PASS" || { fail=0; ip6tables -L INPUT -v -n 2>/dev/null | grep -q '\''ACCEPT.*lo.*::/0.*::/0'\'' || fail=1; ip6tables -L INPUT -v -n 2>/dev/null | grep -q '\''DROP.*::1'\'' || fail=1; ip6tables -L OUTPUT -v -n 2>/dev/null | grep -q '\''ACCEPT.*lo.*::/0.*::/0'\'' || fail=1; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL"; } 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 루프백 인터페이스는 동일 시스템 내 프로세스 간 통신에 사용되며, 해당 트래픽이 차단될 경우 시스템 기능 장애가 발생할 수 있다. 반면, 외부 인터페이스에서 루프백 주소를 출발지로 하는 트래픽을 허용할 경우 주소 위조 공격이 가능해진다.
    fixGuidance: |-
        IPv6가 활성화된 경우, ip6tables 루프백 규칙을 추가한다.

        ip6tables -A INPUT -i lo -j ACCEPT
        ip6tables -A OUTPUT -o lo -j ACCEPT
        ip6tables -A INPUT -s ::1 -j DROP
