apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_002
    title: libpam-modules 패키지 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서는 PAM 기본 기능을 제공하는 libpam-modules 패키지가 최신 버전으로 설치되어 있어야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(dpkg-query -s libpam-modules 2>/dev/null | grep -q ''\''''Status: install ok installed''\'''' && echo ''\''''PASS''\'''' || echo ''\''''FAIL''\'''' 2>&1)"; C2_OUT="$(dpkg --compare-versions "$(dpkg-query -W -f=''\''''${Version}''\'''' libpam-modules 2>/dev/null)" ge ''\''''1.5.3-5''\'''' && echo ''\''''PASS''\'''' || echo ''\''''FAIL''\'''' 2>&1)"; if { [ "$C1_OUT" = ''\''''PASS''\'''' ]; } && { [ "$C2_OUT" = ''\''''PASS''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: libpam-modules는 사용자 인증, 계정 검사, 세션 관리 등 PAM의 핵심 기능을 수행하는 표준 모듈을 포함한다. CIS 벤치마크에서 다루는 PAM 옵션에 대한 전체 기능과 접근을 보장하기 위해 필요하다.
    fixGuidance: |-
        libpam-modules 패키지를 설치하거나 최신 버전으로 업그레이드한다.

        apt update && apt upgrade libpam-modules
