apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_003
    title: systemd-journald 로그 회전 정책 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 systemd-journald 로그 회전 정책이 사이트 정책에 따라 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Phs '\''^\s*SystemMaxUse\s*='\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C2_OUT="$(grep -Phs '\''^\s*SystemKeepFree\s*='\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C3_OUT="$(grep -Phs '\''^\s*RuntimeMaxUse\s*='\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C4_OUT="$(grep -Phs '\''^\s*RuntimeKeepFree\s*='\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C5_OUT="$(grep -Phs '\''^\s*MaxFileSec\s*='\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; } && { [ -n "$C3_OUT" ]; } && { [ -n "$C4_OUT" ]; } && { [ -n "$C5_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 적절한 로그 회전 정책이 없으면 로그 파일이 디스크 공간을 모두 소비하거나, 너무 빨리 삭제되어 보안 분석에 필요한 로그가 손실될 수 있다.
    fixGuidance: |-
        /etc/systemd/journald.conf 또는 /etc/systemd/journald.conf.d/ 디렉토리에 .conf 파일을 생성하여 설정한다.

        예시 구성:
        [Journal]
        SystemMaxUse=1G
        SystemKeepFree=500M
        RuntimeMaxUse=200M
        RuntimeKeepFree=50M
        MaxFileSec=1month

        설정 파일 생성 예시:
        mkdir -p /etc/systemd/journald.conf.d/
        cat << 'EOF' > /etc/systemd/journald.conf.d/60-journald.conf
        [Journal]
        SystemMaxUse=1G
        SystemKeepFree=500M
        RuntimeMaxUse=200M
        RuntimeKeepFree=50M
        MaxFileSec=1month
        EOF

        systemctl restart systemd-journald
