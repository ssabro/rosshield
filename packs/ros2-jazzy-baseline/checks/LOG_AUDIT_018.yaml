apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_018
    title: 파일 시스템 마운트 이벤트 감사 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 파일 시스템 마운트 이벤트를 감사하는 규칙이 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(UID_MIN=$(awk '\''/^\s*UID_MIN/{print $2}'\'' /etc/login.defs); awk "/^ *-a *always,exit/ && / -F *arch=b64/ && (/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) && / -F *auid>=${UID_MIN}/ && / -S/ && /mount/ && (/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)" /etc/audit/rules.d/*.rules 2>/dev/null 2>&1)"; C2_OUT="$(UID_MIN=$(awk '\''/^\s*UID_MIN/{print $2}'\'' /etc/login.defs); awk "/^ *-a *always,exit/ && / -F *arch=b32/ && (/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) && / -F *auid>=${UID_MIN}/ && / -S/ && /mount/ && (/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)" /etc/audit/rules.d/*.rules 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 파일 시스템 마운트를 감사하면 외부 미디어 연결이나 무단 파일 시스템 마운트를 통한 데이터 유출 시도를 탐지할 수 있다.
    fixGuidance: |-
        다음 명령어를 실행하여 규칙을 생성한다:

        UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
        printf "
        -a always,exit -F arch=b32 -S mount -F auid>=$UID_MIN -F auid!=unset -k mounts
        -a always,exit -F arch=b64 -S mount -F auid>=$UID_MIN -F auid!=unset -k mounts
        " >> /etc/audit/rules.d/50-mounts.rules

        규칙을 로드한다:
        augenrules --load
