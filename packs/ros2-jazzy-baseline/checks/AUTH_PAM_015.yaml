apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_015
    title: 순차 문자 사용 제한 설정 확인
    description: 'ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호에 순차 문자(예: 123, abc)를 3자 이하만 사용할 수 있도록 설정되어야 한다.'
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*maxsequence\s*=\s*[1-3]\b'\'' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null 2>&1)"; C2_OUT="$(grep -Psi '\''^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so\s+([^#]*\s+)?maxsequence\s*=\s*(0|[4-9]|[1-9][0-9]+)\b'\'' /etc/pam.d/common-password 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 순차 문자열 사용을 제한하면 예측 가능한 비밀번호 패턴을 방지할 수 있다.
    fixGuidance: |-
        /etc/security/pwquality.conf.d/ 디렉토리에 설정 파일을 생성한다.

        mkdir -p /etc/security/pwquality.conf.d
        echo "maxsequence = 3" > /etc/security/pwquality.conf.d/50-pwmaxsequence.conf
