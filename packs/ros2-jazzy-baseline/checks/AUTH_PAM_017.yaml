apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_017
    title: 비밀번호 품질 검사 강제 적용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호 품질 검사 강제 적용(enforcing)이 비활성화되어 있지 않아야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -PHsi '\''^\s*enforcing\s*=\s*0\b'\'' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null || echo '\''PASS'\'' 2>&1)"; C2_OUT="$(grep -PHsi '\''^\s*password\s+[^#]*\s+pam_pwquality\.so\s+([^#]*\s+)?enforcing=0\b'\'' /etc/pam.d/common-password 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: enforcing=0으로 설정하면 비밀번호 품질 검사를 무시하고 약한 비밀번호를 설정할 수 있다.
    fixGuidance: |-
        enforcing = 0 설정이 있다면 주석 처리하거나 제거한다.

        sed -ri 's/^\s*enforcing\s*=\s*0/# &/' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null
