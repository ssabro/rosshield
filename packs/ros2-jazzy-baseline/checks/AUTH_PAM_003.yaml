apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_003
    title: libpam-pwquality 패키지 설치 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서는 비밀번호 품질 검사를 위한 libpam-pwquality 패키지가 설치되어 있어야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(dpkg-query -s libpam-pwquality 2>/dev/null | grep -q ''\''''Status: install ok installed''\'''' && echo ''\''''PASS''\'''' || echo ''\''''FAIL''\'''' 2>&1)"; if { [ "$C1_OUT" = ''\''''PASS''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: libpam-pwquality는 비밀번호 품질 검사 및 무작위성 기반 점수화를 위한 공통 함수를 제공한다. 강력한 비밀번호는 무차별 대입 공격으로 인한 시스템 해킹 위험을 줄인다.
    fixGuidance: |-
        libpam-pwquality 패키지를 설치한다.

        apt install libpam-pwquality
