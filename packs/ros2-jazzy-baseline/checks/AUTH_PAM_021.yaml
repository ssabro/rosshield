apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_021
    title: pam_pwhistory use_authtok 인자 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 pam_pwhistory 모듈의 use_authtok이 설정되어 이전 모듈에서 입력받은 비밀번호를 사용해야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*password\s+[^#]*\s+pam_pwhistory\.so\s+([^#]*\s+)?use_authtok\b'\'' /etc/pam.d/common-password 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: use_authtok을 설정하면 비밀번호를 중복 입력하지 않아도 되고, PAM 스택에서 일관된 비밀번호 처리가 가능하다.
    fixGuidance: |-
        pam-auth-update 프로필에서 pam_pwhistory.so 라인에 use_authtok을 추가한다.

        1. 프로필 파일 찾기:
        awk '/Password-Type:/{ f = 1;next } /-Type:/{ f = 0 } f {if (/pam_pwhistory\.so/) print FILENAME}' /usr/share/pam-configs/*

        2. 반환된 파일을 편집하여 pam_pwhistory.so 라인에 use_authtok 추가:
        requisite pam_pwhistory.so remember=24 enforce_for_root try_first_pass use_authtok

        3. 적용:
        pam-auth-update --enable pwhistory
