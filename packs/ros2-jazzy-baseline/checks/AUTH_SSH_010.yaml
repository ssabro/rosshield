apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_010
    title: SSH HostbasedAuthentication 비활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 호스트 기반 인증(HostbasedAuthentication)은 비활성화되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep hostbasedauthentication 2>&1)"; if { [ "$C1_OUT" = '\''hostbasedauthentication no'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 호스트 기반 인증은 클라이언트 호스트의 신뢰성에 의존하므로, 스푸핑 공격에 취약하다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 HostbasedAuthentication을 no로 설정한다.

        HostbasedAuthentication no
