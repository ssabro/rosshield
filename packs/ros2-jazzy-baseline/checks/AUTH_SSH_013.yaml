apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_013
    title: SSH LoginGraceTime 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 로그인 유예 시간(LoginGraceTime)이 60초 이하로 설정되어야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 로그인 유예 시간이 길면 인증되지 않은 연결이 오래 유지되어 서비스 거부 공격에 악용될 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 LoginGraceTime을 60초 이하로 설정한다.

        LoginGraceTime 60
