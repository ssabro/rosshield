apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_015
    title: rsyslog 기본 파일 권한 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 rsyslog를 사용하는 경우, $FileCreateMode가 0640 이하로 설정되어 있어야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: rsyslog가 생성하는 로그 파일의 기본 권한이 과도하면 민감한 로그 정보가 다른 사용자에게 노출될 수 있다. 0640 이하로 설정하면 소유자와 그룹만 읽기 가능하다.
    fixGuidance: |-
        /etc/rsyslog.conf 또는 /etc/rsyslog.d/ 디렉토리에 설정 파일을 생성한다:

        echo '$FileCreateMode 0640' >> /etc/rsyslog.d/60-rsyslog.conf

        서비스 재시작:
        systemctl reload-or-restart rsyslog
