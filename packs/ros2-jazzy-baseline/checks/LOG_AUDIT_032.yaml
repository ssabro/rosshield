apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_032
    title: 감사 로그 파일 그룹 소유자 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 감사 로그 파일의 그룹 소유자가 root 또는 adm이어야 하며, auditd.conf의 log_group이 adm 또는 root로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Piws -- '\''^\s*log_group\s*=\s*\S+\b'\'' /etc/audit/auditd.conf 2>/dev/null | grep -Pvi -- '\''(adm|root)'\'' | head -1 | grep -q . && echo '\''FAIL'\'' || echo '\''PASS'\'' 2>&1)"; C2_OUT="$([ -f /etc/audit/auditd.conf ] && find -L "$(dirname "$(awk -F= '\''/^\s*log_file/ {print $2}'\'' /etc/audit/auditd.conf | xargs)")" -not -path '\''*/lost+found'\'' -type f \( ! -group root -a ! -group adm \) 2>/dev/null | head -1 | grep -q . && echo '\''FAIL'\'' || echo '\''PASS'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 감사 로그 파일의 그룹 소유자가 적절하지 않으면 권한 없는 사용자가 그룹 권한을 통해 로그에 접근할 수 있다.
    fixGuidance: |-
        다음 명령어를 실행하여 감사 로그 파일의 그룹 소유자를 adm으로 변경한다:

        find $(dirname $(awk -F"=" '/^\s*log_file/ {print $2}' /etc/audit/auditd.conf | xargs)) -type f \( ! -group adm -a ! -group root \) -exec chgrp adm {} +

        log_group을 adm으로 설정한다:
        sed -ri 's/^\s*#?\s*log_group\s*=\s*\S+(\s*#.*)?.*$/log_group = adm\1/' /etc/audit/auditd.conf

        auditd를 재시작한다:
        systemctl restart auditd
