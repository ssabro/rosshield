apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_020
    title: SSH PermitRootLogin 비활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, root 계정의 직접 SSH 로그인(PermitRootLogin)이 비활성화되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep permitrootlogin 2>&1)"; if { [ "$C1_OUT" = '\''permitrootlogin no'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: root 계정으로의 직접 SSH 접속을 차단하면 무차별 대입 공격의 대상이 되는 것을 방지하고, 관리 작업에 대한 감사 추적이 가능해진다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 PermitRootLogin을 no로 설정한다.

        PermitRootLogin no
