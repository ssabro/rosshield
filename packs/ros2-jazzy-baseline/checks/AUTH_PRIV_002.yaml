apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PRIV_002
    title: sudo 명령 pty 사용 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 sudo는 가상 터미널(pty)에서만 다른 명령을 실행하도록 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -rPi '\''^\s*Defaults\s+([^#]*,\s*)?use_pty\b'\'' /etc/sudoers /etc/sudoers.d/ 2>/dev/null 2>&1)"; C2_OUT="$(grep -rPi '\''^\s*Defaults\s+([^#]*,\s*)?!use_pty\b'\'' /etc/sudoers /etc/sudoers.d/ 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: use_pty를 설정하면 sudo가 I/O 로깅을 위해 pty를 사용하여 화면 출력을 캡처할 수 있고, 악성 프로그램이 백그라운드에서 사용자 터미널을 제어하는 것을 방지한다.
    fixGuidance: |-
        /etc/sudoers 파일에 use_pty 설정을 추가한다.

        visudo로 편집하여 다음 라인 추가:
        Defaults use_pty

        !use_pty가 있다면 제거한다.
