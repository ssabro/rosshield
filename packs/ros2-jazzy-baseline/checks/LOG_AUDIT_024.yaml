apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_024
    title: setfacl 명령 사용 성공·실패 이벤트 감사 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 setfacl 명령의 사용을 감사하는 규칙이 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(UID_MIN=$(awk '\''/^\s*UID_MIN/{print $2}'\'' /etc/login.defs); awk "/^ *-a *always,exit/ && (/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) && / -F *auid>=${UID_MIN}/ && / -F *perm=x/ && / -F *path=\/usr\/bin\/setfacl/ && (/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)" /etc/audit/rules.d/*.rules 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: setfacl 명령은 파일의 ACL(Access Control List)을 설정한다. 이 명령의 사용을 감사하면 파일 접근 제어의 무단 변경을 탐지할 수 있다.
    fixGuidance: |-
        다음 명령어를 실행하여 규칙을 생성한다:

        UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
        printf "
        -a always,exit -F path=/usr/bin/setfacl -F perm=x -F auid>=${UID_MIN} -F auid!=unset -k perm_chng
        " >> /etc/audit/rules.d/50-perm_chng.rules

        규칙을 로드한다:
        augenrules --load
