apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_PAM_020
    title: root 계정 비밀번호 이력 정책 적용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 pam_pwhistory 모듈의 enforce_for_root가 설정되어 root 계정에도 비밀번호 이력 정책이 적용되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*password\s+[^#]*\s+pam_pwhistory\.so\s+([^#]*\s+)?enforce_for_root\b'\'' /etc/pam.d/common-password 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: root 계정은 시스템의 최고 권한을 가지므로 동일한 비밀번호 이력 정책을 적용해야 한다.
    fixGuidance: |-
        pam-auth-update 프로필에서 pam_pwhistory.so 라인에 enforce_for_root를 추가한다.

        1. 프로필 파일 찾기:
        awk '/Password-Type:/{ f = 1;next } /-Type:/{ f = 0 } f {if (/pam_pwhistory\.so/) print FILENAME}' /usr/share/pam-configs/*

        2. 반환된 파일을 편집하여 pam_pwhistory.so 라인에 enforce_for_root 추가:
        requisite pam_pwhistory.so remember=24 enforce_for_root try_first_pass use_authtok

        3. 적용:
        pam-auth-update --enable pwhistory
