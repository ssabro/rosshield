apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_CRON_004
    title: /etc/cron.hourly 디렉터리 권한 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 cron을 작업 스케줄러로 사용하는 경우, /etc/cron.hourly 디렉터리의 소유자 및 접근 권한은 적절하게 설정되어 있어야 한다. 해당 디렉터리는 관리자에 의해서만 관리되어야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: /etc/cron.hourly 디렉터리는 매시간 실행되는 스크립트를 저장하는 위치로, 이 디렉터리에 저장된 파일은 자동으로 실행된다. 권한이 과도하게 개방되어 있을 경우, 비인가 사용자가 악성 스크립트를 추가하여 주기적으로 실행되도록 할 수 있다.
    fixGuidance: |-
        /etc/cron.daily/ 디렉토리의 소유자와 권한을 설정한다.

        chown root:root /etc/cron.daily/
        chmod og-rwx /etc/cron.daily/
