apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_007
    title: ldap 서버 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 LDAP 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 중앙 인증 및 디렉터리 서비스 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s slapd &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled slapd.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active slapd.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: LDAP 서버 서비스는 사용자 계정, 인증 정보, 권한 데이터를 중앙에서 관리하는 기능을 제공한다. 로봇 Host에서 해당 서비스가 활성화될 경우, 외부 인증 요청 처리, 자격 증명 노출, 권한 오남용 등 보안 위협에 노출될 수 있다.
    fixGuidance: 'slapd 패키지를 제거한다: apt purge -y slapd. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.'
