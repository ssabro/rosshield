apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_008
    title: 감사 로그 디스크 공간 부족 경고 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 auditd의 space_left_action과 admin_space_left_action이 적절하게 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -P -- '\''^\s*space_left_action\s*=\s*(email|exec|single|halt)\b'\'' /etc/audit/auditd.conf 2>&1)"; C2_OUT="$(grep -P -- '\''^\s*admin_space_left_action\s*=\s*(single|halt)\b'\'' /etc/audit/auditd.conf 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ -n "$C2_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 디스크 공간 부족 시 적절한 경고 동작이 설정되지 않으면 관리자가 이를 인지하지 못하여 감사 로그가 유실될 수 있다.
    fixGuidance: |-
        사이트 정책에 따라 /etc/audit/auditd.conf에 다음 파라미터를 설정한다:

        space_left_action = <email|exec|single|halt>
        admin_space_left_action = <single|halt>

        예시:
        space_left_action = email
        admin_space_left_action = single

        참고: space_left_action을 email로 설정하려면 MTA(Mail Transfer Agent)가 설치 및 구성되어 있어야 한다.
