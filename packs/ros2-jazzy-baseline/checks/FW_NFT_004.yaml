apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_NFT_004
    title: nftables 테이블 존재 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 nftables를 방화벽 관리 도구로 사용하는 경우, 최소 하나 이상의 nftables 테이블이 구성되어 있어야 한다. 방화벽 규칙은 반드시 테이블 내에 정의되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(nft list tables 2>/dev/null | grep -q '\''table'\'' && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: nftables는 테이블(table), 체인(chain), 규칙(rule) 구조를 기반으로 네트워크 패킷 필터링을 수행한다. 테이블이 존재하지 않을 경우 체인과 규칙을 정의할 수 없으며, 결과적으로 방화벽 정책이 적용되지 않는다.
    fixGuidance: |-
        nftables 테이블을 생성한다.

        nft create table inet filter
