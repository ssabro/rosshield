apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_BANNER_005
    title: /etc/issue 파일 접근 권한 적절한 구성 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 로컬 로그인 경고 배너를 제어하는 /etc/issue 파일에 대한 접근 권한이 적절히 제한되어 있어야 한다. 해당 파일은 관리자 권한을 가진 사용자만 수정할 수 있도록 구성되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(stat -Lc '\''%a %u %g'\'' /etc/issue 2>/dev/null 2>&1)"; if { [ "$C1_OUT" = '\''644 0 0'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /etc/issue 파일은 로컬 콘솔 로그인 시 사용자에게 표시되는 경고 배너를 정의하며, 보안 고지 및 정보 노출 통제의 역할을 수행한다. 해당 파일에 대한 접근 통제가 미흡할 경우, 비인가 사용자가 경고 문구를 변경하거나 운영체제 및 시스템 정보를 삽입하여 공격에 악용할 수 있다.
    fixGuidance: /etc/issue 파일의 소유자를 root:root로, 권한을 644로 설정한다.
