apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_AUDIT_028
    title: 감사 구성 불변 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 감사 규칙이 불변(-e 2)으로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Ph -- '\''^\s*-e\s+2\b'\'' /etc/audit/rules.d/*.rules 2>/dev/null | tail -1 2>&1)"; if { printf '\''%s'\'' "$C1_OUT" | grep -qF '\''-e 2'\''; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: -e 2를 설정하면 감사 규칙을 변경할 수 없게 되어 시스템 재부팅 전까지 감사 구성이 보호된다. 이를 통해 공격자가 감사를 비활성화하거나 규칙을 수정하는 것을 방지한다.
    fixGuidance: |-
        /etc/audit/rules.d/99-finalize.rules 파일 끝에 -e 2를 추가한다:

        printf '\n-e 2' >> /etc/audit/rules.d/99-finalize.rules

        규칙을 로드한다:
        augenrules --load

        재부팅이 필요할 수 있다:
        if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then echo "Reboot required to load rules"; fi
