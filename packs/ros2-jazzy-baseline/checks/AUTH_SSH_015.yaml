apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_SSH_015
    title: SSH 취약 MAC 알고리즘 비활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 SSH 서버를 사용하는 경우, 취약한 MAC 알고리즘(hmac-md5, hmac-sha1-96 등)이 비활성화되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(sshd -T 2>/dev/null | grep -Pi "macs.*(hmac-md5|hmac-md5-96|hmac-ripemd160|hmac-sha1-96|umac-64@openssh\.com|hmac-md5-etm@openssh\.com|hmac-md5-96-etm@openssh\.com|hmac-ripemd160-etm@openssh\.com|hmac-sha1-96-etm@openssh\.com|umac-64-etm@openssh\.com|umac-128-etm@openssh\.com)" || echo "PASS" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: MD5, SHA1-96 등 취약한 해시 알고리즘은 충돌 공격에 노출될 수 있다.
    fixGuidance: |-
        /etc/ssh/sshd_config 파일에 취약 MAC 알고리즘을 제외하도록 설정한다.

        MACs -hmac-md5,hmac-md5-96,hmac-ripemd160,hmac-sha1-96,umac-64@openssh.com,hmac-md5-etm@openssh.com,hmac-md5-96-etm@openssh.com,hmac-ripemd160-etm@openssh.com,hmac-sha1-96-etm@openssh.com,umac-64-etm@openssh.com,umac-128-etm@openssh.com
