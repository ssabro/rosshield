apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_CRON_003
    title: /etc/crontab 파일 권한 설정 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 cron을 작업 스케줄러로 사용하는 경우, /etc/crontab 파일의 소유자 및 접근 권한은 적절하게 설정되어 있어야 한다. 해당 파일은 관리자에 의해서만 수정 가능해야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: /etc/crontab 파일은 시스템 전체에 적용되는 예약 작업을 정의하는 중요한 설정 파일이다. 파일 권한이 과도하게 개방되어 있을 경우, 비인가 사용자가 예약 작업을 추가하거나 수정하여 악성 명령을 주기적으로 실행할 수 있다.
    fixGuidance: |-
        /etc/cron.hourly/ 디렉토리의 소유자와 권한을 설정한다.

        chown root:root /etc/cron.hourly/
        chmod og-rwx /etc/cron.hourly/
