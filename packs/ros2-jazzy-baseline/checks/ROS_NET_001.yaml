apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: ROS_NET_001
    title: DDS 통신 범위 제한
    description: DDS 통신이 필요한 네트워크로 제한되었는지 확인
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(echo $ROS_LOCALHOST_ONLY 2>&1)"; if { [ "$C1_OUT" = '\''1'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 네트워크 공격 표면 감소
    fixGuidance: Fast DDS XML 프로파일을 생성하여 metatrafficUnicastLocatorList를 설정하고, FASTRTPS_DEFAULT_PROFILES_FILE 환경 변수를 해당 파일 경로로 설정한다.
