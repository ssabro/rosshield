apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_UFW_005
    title: ufw 아웃바운드 연결 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 UFW를 방화벽 관리 도구로 사용하는 경우, 아웃바운드 네트워크 연결에 대한 정책이 명확히 정의되고 구성되어 있어야 한다. 시스템은 로봇 운용에 필요한 외부 통신만 허용하도록 설정되어야 한다.
    severity: medium
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(ufw status numbered 2>/dev/null | grep -q ''\''''Status: active''\'''' && echo "CONFIGURED" || echo "NOT_CONFIGURED" 2>&1)"; if { [ "$C1_OUT" = ''\''''CONFIGURED''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 기본적으로 많은 방화벽 구성에서는 아웃바운드 트래픽을 모두 허용하는 경우가 많으나, 이는 악성 코드가 외부로 통신하거나 정보가 유출될 수 있는 경로를 제공할 수 있다. CIS 벤치마크에서는 아웃바운드 트래픽 또한 관리 대상임을 명확히 하고, 조직의 보안 정책에 따라 허용 범위를 정의할 것을 권고하고 있다.
    fixGuidance: |-
        사이트 정책에 따라 아웃바운드 규칙을 구성한다.

        예시 (모든 아웃바운드 허용):
        ufw allow out on all
