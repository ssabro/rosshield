apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_MAC_003
    title: 모든 AppArmor 프로파일이 enforce/complain 모드인지 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 AppArmor 프로파일이 로드되어 적용(enforce 또는 complain 상태)되어 있어야 한다.
    severity: high
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: AppArmor 프로파일이 로드되지 않은 경우 해당 애플리케이션은 MAC 보호를 받지 못한다. 피지컬 AI 로봇 환경에서는 네트워크 서비스, 시스템 데몬, ROS 2 관련 프로세스 등이 보호 없이 실행될 경우 공격 표면이 확대될 수 있다.
    fixGuidance: '모든 AppArmor 프로파일을 enforce 또는 complain 모드로 설정한다. enforce 모드: aa-enforce /etc/apparmor.d/*, complain 모드: aa-complain /etc/apparmor.d/*'
