apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_ACCT_008
    title: root 계정이 유일한 GID 0 계정인지 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 기본 GID 0을 가진 계정은 root만 존재해야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(awk -F: ''\''''($1 !~ /^(sync|shutdown|halt|operator)/ && $4=="0") {print $1}''\'''' /etc/passwd 2>&1)"; if { [ "$C1_OUT" = ''\''''root''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: GID 0은 root 그룹을 의미하며, root 계정만 기본 GID로 0을 가져야 한다. 다른 계정이 GID 0을 가지면 root 그룹의 파일에 부적절하게 접근할 수 있다.
    fixGuidance: |-
        GID 0을 가진 root가 아닌 다른 계정이 있으면 해당 계정의 GID를 변경한다:
        usermod -g <새GID> <사용자명>

        root 계정의 GID가 0이 아니면:
        usermod -g 0 root
