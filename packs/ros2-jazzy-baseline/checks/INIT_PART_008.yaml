apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_008
    title: /dev/shm 파티션에 noexec 옵션 설정
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 /dev/shm 디렉터리에 noexec 마운트 옵션이 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /dev/shm | grep noexec 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: /dev/shm은 악성 코드가 메모리 기반으로 생성·실행될 수 있는 위치가 될 수 있으므로, 실행 권한을 차단하여 공격 가능성을 줄여야 한다.
    fixGuidance: '/dev/shm 파티션의 /etc/fstab 마운트 항목에 noexec 옵션을 추가한다. 예: tmpfs /dev/shm tmpfs defaults,rw,nosuid,nodev,noexec,relatime 0 0. 설정 후 mount -o remount /dev/shm 명령으로 변경사항을 즉시 적용한다.'
