apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_020
    title: X Window Server 서비스 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 X 윈도우 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 그래픽 사용자 인터페이스 및 디스플레이 서버 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s xserver-common &>/dev/null && echo '\''installed'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: X 윈도우 서버 서비스는 그래픽 화면 출력 및 입력 장치 처리를 담당하며, 활성화될 경우 추가적인 시스템 서비스와 라이브러리가 함께 동작한다. 이러한 구성은 로컬 접근 경로 및 잠재적인 취약점을 증가시킬 수 있다.
    fixGuidance: X Window Server 패키지를 제거한다. 프로덕션 로봇 환경에서는 그래픽 서버가 불필요하다.
