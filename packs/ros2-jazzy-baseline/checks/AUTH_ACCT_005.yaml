apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_ACCT_005
    title: 비활성 계정 자동 잠금 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호 만료 후 비활성 기간(INACTIVE)이 45일 이하로 설정되어야 한다.
    severity: high
spec:
    auditCommand: 'bash -c ''set -o pipefail; C1_OUT="$(useradd -D 2>/dev/null | grep -P ''\''''INACTIVE=([0-9]|[1-3][0-9]|4[0-5])$''\'''' 2>&1)"; C2_OUT="$(awk -F: ''\''''($2~/^\$.+\$/) {if($7 > 45 || $7 < 0)print $1}''\'''' /etc/shadow 2>/dev/null || echo ''\''''PASS''\'''' 2>&1)"; if { [ -n "$C1_OUT" ]; } && { [ "$C2_OUT" = ''\''''''\'''' ]; }; then echo ''\''''** PASS **''\''''; else echo ''\''''** FAIL **''\''''; fi'''
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 비밀번호 만료 후 일정 기간이 지나면 계정을 자동으로 잠가 방치된 계정의 악용을 방지한다.
    fixGuidance: |-
        기본 INACTIVE 값을 45 이하로 설정한다.

        useradd -D -f 45

        기존 사용자의 설정을 변경한다:
        chage --inactive 45 <사용자>

        또는 모든 사용자 일괄 변경:
        awk -F: '($2~/^\$.+\$/) {if($7 > 45 || $7 < 0)system("chage --inactive 45 " $1)}' /etc/shadow
