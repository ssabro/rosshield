apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_ACCT_004
    title: 비밀번호 해시 알고리즘 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 비밀번호 해시 알고리즘(ENCRYPT_METHOD)이 SHA512 또는 YESCRYPT로 설정되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Pi '\''^\s*ENCRYPT_METHOD\s+(SHA512|YESCRYPT)\b'\'' /etc/login.defs 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: MD5나 DES와 같은 약한 해시 알고리즘은 레인보우 테이블 공격이나 무차별 대입 공격에 취약하다.
    fixGuidance: |-
        /etc/login.defs에서 ENCRYPT_METHOD를 SHA512 또는 YESCRYPT로 설정한다.

        sed -i 's/^ENCRYPT_METHOD.*/ENCRYPT_METHOD YESCRYPT/' /etc/login.defs

        참고: PAM 설정의 해시 알고리즘과 일관성을 유지해야 한다.
