apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: AUTH_ACCT_012
    title: root umask 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 root의 umask가 0027 이상의 제한적인 값으로 설정되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Psi '\''^\s*umask\s+(0?0?[0-1][0-7]|0?0?2[0-6])\b'\'' /root/.bash_profile /root/.bashrc 2>/dev/null || echo '\''PASS'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: umask는 새로 생성되는 파일과 디렉토리의 기본 권한을 결정한다. root가 생성하는 파일이 다른 사용자에게 과도한 권한을 부여하지 않도록 umask를 설정해야 한다.
    fixGuidance: |-
        /root/.bash_profile과 /root/.bashrc를 편집하여 umask를 0027 이상의 제한적인 값으로 설정하거나 제거한다:
        umask 0027

        또는 해당 라인을 주석 처리한다.
