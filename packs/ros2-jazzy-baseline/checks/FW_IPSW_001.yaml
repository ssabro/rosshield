apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_IPSW_001
    title: iptables 패키지 설치 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 iptables를 호스트 기반 방화벽 관리 도구로 사용하는 경우, iptables 관련 패키지는 시스템에 설치되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s iptables &>/dev/null && echo "installed" || echo "not installed" 2>&1)"; C2_OUT="$(dpkg-query -s iptables-persistent &>/dev/null && echo "installed" || echo "not installed" 2>&1)"; if { [ "$C1_OUT" = '\''installed'\'' ]; } && { [ "$C2_OUT" = '\''installed'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: iptables는 Linux 커널의 netfilter 방화벽 기능을 구성·관리하기 위한 핵심 도구이다. 해당 패키지가 설치되어 있지 않을 경우 방화벽 규칙을 정의하거나 적용할 수 없으며, 이는 네트워크 접근 통제 부재로 이어질 수 있다.
    fixGuidance: |-
        iptables와 iptables-persistent를 설치한다.

        apt install iptables iptables-persistent
