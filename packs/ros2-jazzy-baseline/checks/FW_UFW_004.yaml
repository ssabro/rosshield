apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_UFW_004
    title: ufw 루프백 트래픽 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 UFW를 방화벽 관리 도구로 사용하는 경우, 루프백 인터페이스(lo)를 통한 트래픽은 허용되어야 하며, 외부 인터페이스에서 출발지 주소가 루프백으로 위조된 트래픽은 차단되어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(fail=0; grep -q '\''ufw-before-input -i lo -j ACCEPT'\'' /etc/ufw/before.rules 2>/dev/null || fail=1; grep -q '\''ufw-before-output -o lo -j ACCEPT'\'' /etc/ufw/before.rules 2>/dev/null || fail=1; ufw status verbose 2>/dev/null | grep -q '\''DENY.*127.0.0.0/8'\'' || fail=1; [ $fail -eq 0 ] && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 루프백 인터페이스는 동일 시스템 내 프로세스 간 통신에 사용되며, ROS 2 노드 간 통신 및 미들웨어 내부 동작에 필수적이다. 루프백 트래픽이 차단될 경우 시스템 기능 장애가 발생할 수 있다.
    fixGuidance: |-
        루프백 트래픽을 구성한다.

        ufw allow in on lo
        ufw allow out on lo
        ufw deny in from 127.0.0.0/8
        ufw deny in from ::1
