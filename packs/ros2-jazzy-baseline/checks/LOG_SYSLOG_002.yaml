apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_002
    title: systemd-journald 로그 파일 접근 권한 설정 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 systemd-journald 로그 파일의 접근 권한이 0640 이하로 설정되어야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: 로그 파일에는 민감한 시스템 정보가 포함될 수 있다. 적절한 권한 설정으로 무단 접근을 방지해야 한다.
    fixGuidance: |-
        기본 구성이 사이트 요구사항에 맞지 않으면 /usr/lib/tmpfiles.d/systemd.conf를 /etc/tmpfiles.d/systemd.conf로 복사하고 필요에 따라 수정한다.

        로그 파일의 권장 권한: 0640 이하

        수정 후 적용:
        systemd-tmpfiles --create
