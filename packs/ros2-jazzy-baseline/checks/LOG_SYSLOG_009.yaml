apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: LOG_SYSLOG_009
    title: journald Syslog 전달 비활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇 Host 운영체제에서 journald가 기본 로깅 시스템인 경우, ForwardToSyslog가 no로 설정되어 있어야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(grep -Phs '\''^\s*ForwardToSyslog\s*=\s*no'\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null | head -1 2>&1)"; C2_OUT="$(grep -Phs '\''^\s*ForwardToSyslog\s*='\'' /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf 2>/dev/null 2>&1)"; if { [ -n "$C1_OUT" ]; } || { [ -z "$C2_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: journald만 사용하는 환경에서 ForwardToSyslog를 비활성화하면 중복 로깅을 방지하고 시스템 리소스를 절약할 수 있다.
    fixGuidance: |-
        /etc/systemd/journald.conf.d/ 디렉토리에 .conf 파일을 생성하여 설정한다:

        mkdir -p /etc/systemd/journald.conf.d/
        cat << 'EOF' > /etc/systemd/journald.conf.d/60-journald.conf
        [Journal]
        ForwardToSyslog=no
        EOF

        systemctl reload-or-restart systemd-journald
