apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PKG_001
    title: GPG 키 구성 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 패키지 저장소에 대한 GPG 키가 적절히 구성되어 있어야 한다. 패키지 관리자는 소프트웨어 패키지의 무결성과 출처를 검증할 수 있도록 신뢰된 GPG 키를 사용하여 저장소를 인증해야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(ls /etc/apt/trusted.gpg.d/*.gpg /etc/apt/trusted.gpg.d/*.asc /etc/apt/sources.list.d/*.gpg /etc/apt/sources.list.d/*.asc 2>/dev/null | head -1 | grep -q . && echo '\''PASS'\'' || echo '\''FAIL'\'' 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: GPG 키는 패키지 저장소 및 개별 패키지의 신뢰성을 검증하는 수단으로, 이를 통해 패키지가 전송 과정에서 변조되지 않았으며 신뢰할 수 있는 출처에서 제공되었음을 확인할 수 있다. GPG 키가 적절히 구성되지 않은 경우, 공격자가 악성 패키지를 정상 패키지로 위장하여 배포할 가능성이 있다.
    fixGuidance: |-
        사이트 정책에 따라 패키지 관리자 GPG 키를 업데이트한다.

        ROS 2 환경의 경우 ROS 공식 GPG 키가 올바르게 등록되어 있는지 확인한다:

        curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
