apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: NET_PARAM_010
    title: TCP SYN 쿠키 활성화 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 TCP SYN cookies 기능이 활성화되어 있어야 한다. 시스템은 대량의 TCP 연결 요청이 발생하더라도 연결 자원 고갈 없이 안정적으로 처리할 수 있도록 구성되어야 한다.
    severity: medium
spec:
    auditCommand: "true"
    evaluationRule:
        op: contains
        value: <degraded — Phase 2 fixture required>
    rationale: TCP SYN cookies는 SYN Flood 공격 발생 시에도 서버가 정상적인 TCP 연결을 유지할 수 있도록 하는 보호 메커니즘이다. 해당 기능이 비활성화되어 있을 경우, 공격자가 대량의 SYN 요청을 전송하여 시스템의 연결 큐를 고갈시키고 서비스 거부 상태를 유발할 수 있다.
    fixGuidance: |-
        TCP SYN 쿠키를 활성화한다.

        printf '%s\n' "net.ipv4.tcp_syncookies = 1" >> /etc/sysctl.d/60-netipv4_sysctl.conf
        sysctl -w net.ipv4.tcp_syncookies=1
        sysctl -w net.ipv4.route.flush=1
