apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: FW_NFT_003
    title: nftables 사용 시 iptables 규칙 초기화 여부 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서 nftables를 방화벽 관리 도구로 사용하는 경우, 기존 iptables 방화벽 규칙은 모두 제거(초기화)되어 있어야 한다. 시스템에는 nftables 규칙만 적용된 상태여야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(ipt_rules=$(iptables -L 2>/dev/null | grep -v '\''^Chain\|^target\|^$'\'' | wc -l); ip6t_rules=$(ip6tables -L 2>/dev/null | grep -v '\''^Chain\|^target\|^$'\'' | wc -l); [ "$ipt_rules" -eq 0 ] && [ "$ip6t_rules" -eq 0 ] && echo "PASS" || echo "FAIL" 2>&1)"; if { [ "$C1_OUT" = '\''PASS'\'' ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: iptables는 nftables의 이전 방화벽 관리 체계로, 두 방화벽 규칙이 동시에 존재할 경우 네트워크 트래픽 처리 결과를 예측하기 어려워진다. 잔존한 iptables 규칙은 nftables 규칙과 충돌하거나, 보안 정책을 우회하는 결과를 초래할 수 있다.
    fixGuidance: |-
        iptables 규칙을 초기화한다.

        iptables -F
        ip6tables -F
