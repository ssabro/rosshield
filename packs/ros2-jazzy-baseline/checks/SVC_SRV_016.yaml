apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: SVC_SRV_016
    title: tftp 서비스 미사용 확인
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 Samba 파일 서버 서비스가 사용되지 않도록 구성되어야 한다. 로봇 운용에 필요하지 않은 SMB/CIFS 기반 파일 공유 서버 기능은 비활성화되거나 제거되어야 한다.
    severity: high
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(dpkg-query -s tftpd-hpa &>/dev/null && echo '\''installed'\'' 2>&1)"; C2_OUT="$(systemctl is-enabled tftpd-hpa.service 2>/dev/null | grep '\''enabled'\'' 2>&1)"; C3_OUT="$(systemctl is-active tftpd-hpa.service 2>/dev/null | grep '\''^active'\'' 2>&1)"; if { [ -z "$C1_OUT" ]; } || { { [ -z "$C2_OUT" ]; } && { [ -z "$C3_OUT" ]; }; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: Samba 파일 서버 서비스는 네트워크를 통해 파일 및 프린터 공유 기능을 제공하며, smbd, nmbd 등의 데몬을 통해 다수의 포트를 개방한다. 해당 서비스가 활성화될 경우 비인가 파일 접근, 서비스 취약점 악용, 내부 네트워크 정보 노출 등의 보안 위협이 발생할 수 있다.
    fixGuidance: tftpd-hpa 패키지를 제거한다. 패키지가 의존성으로 필요한 경우 서비스를 중지하고 마스크한다.
