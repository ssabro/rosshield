apiVersion: rosshield.io/v1
kind: Check
metadata:
    id: INIT_PART_009
    title: /home을 별도 파티션으로 구성
    description: ROS 2 Jazzy 기반 피지컬 AI 로봇을 지원하는 Host 운영체제에서는 사용자 홈 디렉터리가 별도의 파티션으로 구성되도록 고려해야 한다. 사용자 홈 디렉터리는 반드시 /home 경로에 한정되지 않을 수 있으며, /etc/passwd에 정의된 사용자 홈 경로를 기준으로 실제 마운트 위치를 판단해야 한다.
    severity: medium
spec:
    auditCommand: bash -c 'set -o pipefail; C1_OUT="$(findmnt -kn /home 2>&1)"; if { [ -n "$C1_OUT" ]; }; then echo '\''** PASS **'\''; else echo '\''** FAIL **'\''; fi'
    evaluationRule:
        op: contains
        value: '** PASS **'
    rationale: 사용자 홈 디렉터리는 사용자 설정 파일, 스크립트, 데이터 등이 저장되는 영역으로, 시스템 운영 중 지속적으로 파일 생성 및 변경이 발생한다. 해당 영역이 루트 파일시스템과 분리되지 않은 경우, 사용자 데이터 증가 또는 악의적인 자원 고갈로 인해 시스템 안정성에 영향을 줄 수 있다.
    fixGuidance: 신규 설치 시 설치 과정에서 /home을 별도 파티션으로 구성한다. 기존 시스템의 경우 새 파티션을 생성하고 /etc/fstab에 /home 마운트 항목을 추가한다.
