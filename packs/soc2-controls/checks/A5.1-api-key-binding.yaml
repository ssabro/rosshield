# A5.1 — API key tenant binding (input authorization)
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: soc2.A5.1.apikey_tenant_binding
  title: A5.1 API key tenant binding 강제 (input authorization)
  description: |-
    SOC2 A5.1은 인증된 input + 적절한 인가를 요구합니다. API key는 tenant binding
    필수 — apikey.go 소스에 tenant_id 컬럼 검증.
  severity: low
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    ROOT="${ROSSHIELD_SOURCE_ROOT:-.}";
    F="$ROOT/internal/domain/tenant/apikey.go";
    if [ ! -f "$F" ]; then
      echo "** PASS ** $F 부재 (site policy skip — binary 배포)";
      exit 0;
    fi;
    if grep -qE "tenant_id|TenantID" "$F"; then
      echo "** PASS ** apikey.go tenant binding 코드 포함";
    else
      echo "** FAIL ** apikey.go tenant binding 누락 의심";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    tenant binding 없는 API key는 cross-tenant 접근 risk — multi-tenant boundary
    위반의 가장 흔한 vector.
  fixGuidance: |-
    1. apikey.go tenant_id 컬럼 강제 확인.
    2. 발급 endpoint에서 tenant 추출 + 강제.
    3. 본 check 재실행.
