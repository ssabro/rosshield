# CC6.6 — TPM PCR-sealed keystore 활성
#
# docs/compliance/soc2/cc6-logical-physical-access.md §CC6.6.
# Lodestar 자산: internal/platform/keystore/tpm/ (Phase 5 E34).
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: soc2.CC6.6.tpm_sealed_keystore
  title: CC6.6 TPM PCR-sealed keystore 활성 (Secure Boot + measured boot)
  description: |-
    SOC2 CC6.6의 키 관리 보강 — TPM PCR-sealed keystore는 변조된 부팅 환경에서
    unsealing 불가능합니다. 본 check는 config keystore_type=tpm 또는 ROSSHIELD_KEYSTORE_TYPE
    env 검증.

    TPM 미보유 환경(개발 · 클라우드 VM 일부)에서는 site policy로 skip — env 미설정 시 PASS.
  severity: medium
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    TYPE="${ROSSHIELD_KEYSTORE_TYPE:-}";
    CFG="${ROSSHIELD_CONFIG:-/etc/rosshield/config.yaml}";
    if [ -z "$TYPE" ] && [ ! -f "$CFG" ]; then
      echo "** PASS ** ROSSHIELD_KEYSTORE_TYPE 미설정 + config 부재 (site policy skip — TPM 미보유 환경 가정)";
      exit 0;
    fi;
    if [ "$TYPE" = "tpm" ]; then
      if [ -c /dev/tpm0 ] || [ -c /dev/tpmrm0 ]; then
        echo "** PASS ** keystore_type=tpm + TPM device 존재";
      else
        echo "** FAIL ** keystore_type=tpm 이나 /dev/tpm0 부재 (TPM 미보유)";
      fi;
      exit 0;
    fi;
    if [ -f "$CFG" ] && grep -qE "^\s*keystore_type\s*:\s*tpm\b" "$CFG" 2>/dev/null; then
      echo "** PASS ** config $CFG keystore_type=tpm";
      exit 0;
    fi;
    echo "** FAIL ** keystore_type=tpm 미설정 (file-backed keystore — TPM 보유 환경 권장 baseline 미충족)";'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    file-backed keystore는 부팅 환경 변조 시 키 자동 unsealing 가능 — TPM PCR-sealed는
    measured boot value가 일치할 때만 key 해제. Secure Boot enrollment 운영과 함께
    full chain trust 확보.
  fixGuidance: |-
    1. TPM 보유 확인: ls -l /dev/tpm0 /dev/tpmrm0
    2. docs/operations/secure-boot-enrollment.md 절차 따라 PCR seal 수행.
    3. config: keystore_type: tpm 또는 export ROSSHIELD_KEYSTORE_TYPE=tpm
    4. 서비스 재시작 — systemctl restart rosshield-server.
    5. 본 check 재실행.
