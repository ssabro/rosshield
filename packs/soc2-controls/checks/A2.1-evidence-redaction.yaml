# A2.1 — evidence redaction 활성 (confidentiality)
#
# docs/compliance/soc2/a2-confidentiality.md §A2.1.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: soc2.A2.1.evidence_redaction
  title: A2.1 evidence redaction 코드 활성 (internal/domain/evidence/redaction.go)
  description: |-
    SOC2 A2.1은 기밀 정보 식별·redaction을 요구합니다. Lodestar의 evidence redaction
    소스 파일 존재 확인.

    binary 배포 환경(.go 부재) site policy skip — runtime endpoint로 직접 검증 불가
    하므로 source presence baseline.
  severity: low
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    ROOT="${ROSSHIELD_SOURCE_ROOT:-.}";
    F="$ROOT/internal/domain/evidence/redaction.go";
    if [ ! -f "$F" ]; then
      echo "** PASS ** $F 부재 (site policy skip — binary 배포 환경)";
      exit 0;
    fi;
    if grep -qE "(redact|Redact)" "$F"; then
      echo "** PASS ** redaction.go 존재 + redact 함수 포함";
    else
      echo "** FAIL ** redaction.go 존재하나 redact 함수 부재";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    evidence redaction 부재는 PII·credential leakage risk — confidentiality 통제의
    baseline.
  fixGuidance: |-
    1. internal/domain/evidence/redaction.go 배포 확인.
    2. redaction 규칙 (password · API key · email 등) 점검.
    3. 본 check 재실행.
