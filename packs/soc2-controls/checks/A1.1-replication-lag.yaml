# A1.1 — replication lag < 60s (RPO 1m SLA)
#
# docs/compliance/soc2/a1-availability.md §A1.1 + A1.2 RPO.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: soc2.A1.1.replication_lag
  title: A1.1 PG streaming replication lag < 60s (RPO 1m SLA)
  description: |-
    SOC2 A1.1·A1.2의 RPO 1m SLA를 위해 replication lag < 60s 검증.
    metric rosshield_replication_lag_seconds 회수.
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    if [ -z "$ROSSHIELD_API_URL" ]; then
      echo "** PASS ** ROSSHIELD_API_URL 미설정 (site policy skip)";
      exit 0;
    fi;
    BODY=$(curl -fsS "$ROSSHIELD_API_URL/metrics" 2>/dev/null || echo "");
    LAG=$(echo "$BODY" | grep -E "^rosshield_replication_lag_seconds" | head -1 | awk "{print \$NF}");
    if [ -z "$LAG" ]; then
      echo "** PASS ** rosshield_replication_lag_seconds metric 부재 (site policy skip — single-region 가능)";
      exit 0;
    fi;
    INT=$(echo "$LAG" | awk "{print int(\$1)}");
    if [ "$INT" -lt 60 ] 2>/dev/null; then
      echo "** PASS ** replication lag=${LAG}s (<60)";
    else
      echo "** FAIL ** replication lag=${LAG}s exceeds 60s RPO baseline";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    lag > 60s는 RPO 1m SLA 위협 — alert WARN/CRIT으로 emit되어야 하며 정상 운영
    시간 동안 정기 검증 필요.
  fixGuidance: |-
    1. standby 노드 health 확인 — Patroni list.
    2. network bandwidth 확인 — replication 지연 원인 분석.
    3. WAL retention 설정 확인.
    4. 본 check 재실행.
