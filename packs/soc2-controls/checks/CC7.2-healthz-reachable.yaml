# CC7.2 — /healthz endpoint reachable
#
# docs/compliance/soc2/cc7-system-operations.md §CC7.2.
# Lodestar 자산: internal/api/handlers/handlers.go.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: soc2.CC7.2.healthz_reachable
  title: CC7.2 /healthz endpoint reachable + 200 응답
  description: |-
    SOC2 CC7.2는 시스템 component 모니터링 활성을 요구합니다. /healthz는 외부 LB/모니터링
    통합 baseline. 본 check는 endpoint 응답 + body 형식 확인.
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    if [ -z "$ROSSHIELD_API_URL" ]; then
      echo "** PASS ** ROSSHIELD_API_URL 미설정 (site policy skip)";
      exit 0;
    fi;
    CODE=$(curl -s -o /dev/null -w "%{http_code}" "$ROSSHIELD_API_URL/healthz" 2>/dev/null || echo "000");
    if [ "$CODE" = "200" ]; then
      echo "** PASS ** /healthz HTTP $CODE";
    else
      echo "** FAIL ** /healthz HTTP $CODE (200 expected)";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    /healthz 미응답은 운영 incident — LB가 health check fail 시 트래픽 차단.
    정기 polling으로 운영 효과성 baseline 검증.
  fixGuidance: |-
    1. 서비스 활성 확인 — systemctl status rosshield-server.
    2. journalctl -u rosshield-server -n 50 로 최근 오류 확인.
    3. dependency(DB · Redis) 가용성 확인.
    4. firewall · reverse proxy 라우팅 확인.
    5. 본 check 재실행 — HTTP 200 확인.
