# CC6.3 — invitation expiry policy 활성
#
# docs/compliance/soc2/cc6-logical-physical-access.md §CC6.3 provisioning lifecycle.
# Lodestar 자산: internal/api/handlers/invitation.go.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: soc2.CC6.3.invitation_expiry
  title: CC6.3 invitation token expiry 정책 활성 (provisioning lifecycle)
  description: |-
    SOC2 CC6.3은 사용자 등록 lifecycle 통제를 요구합니다. invitation token은 일정
    시간 이후 자동 만료해야 stale credential risk를 차단합니다 (default 72h 권장).

    본 check는 config file 또는 env로 ROSSHIELD_INVITATION_TTL 설정 여부 검증.
  severity: medium
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    TTL="${ROSSHIELD_INVITATION_TTL:-}";
    CFG="${ROSSHIELD_CONFIG:-/etc/rosshield/config.yaml}";
    if [ -n "$TTL" ]; then
      echo "** PASS ** ROSSHIELD_INVITATION_TTL=$TTL (env 설정)";
      exit 0;
    fi;
    if [ -f "$CFG" ] && grep -qE "^\s*invitation_ttl\s*:" "$CFG" 2>/dev/null; then
      VAL=$(grep -E "^\s*invitation_ttl\s*:" "$CFG" | head -1);
      echo "** PASS ** config $CFG 에 invitation_ttl 설정: $VAL";
      exit 0;
    fi;
    echo "** FAIL ** invitation_ttl 미설정 (env ROSSHIELD_INVITATION_TTL 또는 config invitation_ttl 권장 — default 72h)";'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    만료 없는 invitation token은 이메일 유출 시 영구 valid — onboarding 직후 즉시
    사용하지 않는 token은 stale credential. 72h(3일) 또는 14d 한도 권장.
  fixGuidance: |-
    1. 환경변수 설정: export ROSSHIELD_INVITATION_TTL=72h
    2. 또는 /etc/rosshield/config.yaml 에 추가:
         invitation_ttl: 72h
    3. systemctl restart rosshield-server 로 반영.
    4. 본 check 재실행 — TTL 설정 확인.
