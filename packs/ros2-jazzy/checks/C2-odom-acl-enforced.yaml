# C2 — /odom(Odometry) permissions.xml ACL 명시 (SROS2 publish/subscribe 권한 enforce)
#
# design doc: docs/design/notes/ros2-humble-dds-sros2-design.md §6.5 Stage 10.E-5.
# D-P10E-3 env override skip — site policy 의존, env 미설정 또는 keystore 부재 시 PASS skip.
# /odom 위변조는 SLAM·navigation의 위치 추정을 직접 왜곡 → robot 경로 이탈/충돌.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: ros2.C2.odom_topic_acl_enforced
  title: permissions.xml에 /odom(Odometry) ACL 명시
  description: |-
    /odom은 표준 nav_msgs/Odometry 토픽으로 wheel encoder · IMU fusion 결과 위치/속도
    추정값을 발행합니다. permissions.xml에 ACL이 명시되지 않으면 임의 노드가 spoofed
    odom 메시지를 publish해 navigation·SLAM의 위치 추정을 직접 왜곡 가능.

    본 check는 env `ROSSHIELD_SROS2_KEYSTORE`(default `~/sros2_keystore`)의 enclaves
    하위 permissions.xml에 `/odom` ACL entry 존재만 grep 검증합니다.

    env 미설정 또는 keystore 부재 시 PASS skip (D-P10E-3 site policy 의존 패턴 일관).
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    [ -f /opt/ros/jazzy/setup.bash ] && source /opt/ros/jazzy/setup.bash 2>/dev/null;
    KEYSTORE="${ROSSHIELD_SROS2_KEYSTORE:-$HOME/sros2_keystore}";
    if [ ! -d "$KEYSTORE" ]; then
      echo "** PASS ** keystore not found at $KEYSTORE (env override skip — site policy 미적용)";
      exit 0;
    fi;
    if [ ! -d "$KEYSTORE/enclaves" ]; then
      echo "** PASS ** keystore enclaves dir not found: $KEYSTORE/enclaves (env override skip)";
      exit 0;
    fi;
    CNT=$(grep -rh -E "<(topic|publish|subscribe)>.*odom" "$KEYSTORE/enclaves" 2>/dev/null | wc -l);
    if [ "$CNT" -ge 1 ]; then
      echo "** PASS ** /odom ACL entries count=$CNT";
    else
      echo "** FAIL ** /odom ACL entries count=0 (no publish/subscribe rule for /odom)";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    Odometry는 navigation stack의 위치 추정 입력으로 직접 사용 — spoofed /odom 주입은
    robot이 실제 위치와 다른 곳에 있다고 오인 → 경로 이탈, 충돌, 또는 의도하지 않은
    지역 진입. Cartographer · slam_toolbox · AMCL 등 대부분의 SLAM/Localization 패키지가
    /odom을 신뢰 입력으로 사용하므로 ACL 부재는 robot 안전에 직접 위협.

    env 미설정 시 PASS skip은 keystore 경로가 site별로 다른 customer를 false positive
    없이 cover (D-P10E-3 권장 default).
  fixGuidance: |-
    1. env 정의 — `export ROSSHIELD_SROS2_KEYSTORE=/opt/ros/keystore`
    2. enclaves/<context>/permissions.xml 파일 열기.
    3. odometry source 노드(예: base_controller, robot_localization)의 grant 섹션:
         <publish>
           <topics>
             <topic>odom</topic>
           </topics>
         </publish>
    4. navigation/SLAM 노드 grant 섹션에 subscribe 권한.
    5. ros2 daemon restart 후 본 check 재실행.
