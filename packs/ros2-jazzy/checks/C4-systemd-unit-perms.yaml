# C4 — ros2-*.service systemd unit owner=root + perms ≤ 0644
#
# design doc §2 C4 후보 'binary.systemd_unit_perms'.
# unit file world-writable 시 unprivileged user가 ExecStart 변경 → root code exec.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: ros2.C4.systemd_unit_perms
  title: systemd ros2-*.service — owner=root + perms ≤ 0644
  description: |-
    /etc/systemd/system/ros2-*.service 파일이 owner=root + perms ≤ 0644 이어야
    합니다. unit file이 world-writable 또는 non-root owner 일 경우 unprivileged
    user가 ExecStart line 변경 후 daemon-reload + restart 시 root 권한 임의
    코드 실행 가능.

    본 check는:
      1. /etc/systemd/system/ros2-*.service 1건 이상 존재 (없으면 본 check 비대상 — PASS)
      2. 모든 파일 owner=root (uid=0)
      3. 모든 파일 perms ≤ 0644 (group/other write bit 0)

    위 조건 충족 시 PASS.
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    [ -f /opt/ros/jazzy/setup.bash ] && source /opt/ros/jazzy/setup.bash 2>/dev/null;
    FILES=$(ls /etc/systemd/system/ros2-*.service 2>/dev/null);
    if [ -z "$FILES" ]; then
      echo "** PASS ** ros2-*.service unit 부재 (본 check 비대상)";
      exit 0;
    fi;
    BAD=0;
    for f in $FILES; do
      OWNER=$(stat -c "%u" "$f" 2>/dev/null);
      MODE=$(stat -c "%a" "$f" 2>/dev/null);
      if [ "$OWNER" != "0" ]; then
        echo "** FAIL ** owner!=root: $f (uid=$OWNER)";
        BAD=1;
      fi;
      if [ -z "$MODE" ] || [ "$MODE" -gt 644 ]; then
        echo "** FAIL ** perms>0644: $f (mode=$MODE)";
        BAD=1;
      fi;
    done;
    if [ "$BAD" -eq 0 ]; then
      echo "** PASS ** ros2-*.service unit owner=root + perms ≤ 0644";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    systemd unit file은 daemon-reload 후 즉시 적용되며 ExecStart=가 root 권한으로
    실행됩니다. world-writable(o+w) 또는 non-root owner 시 unprivileged user가
    ExecStart 라인을 reverse shell 등으로 교체 후 daemon-reload + restart 트리거
    가능 — TOCTOU 없이 직접 root code exec. ros2-*.service 부재 site는 본 check
    비대상으로 PASS 처리(false positive 차단).
  fixGuidance: |-
    1. owner 정상화:
         sudo chown root:root /etc/systemd/system/ros2-*.service
    2. perms 정상화:
         sudo chmod 0644 /etc/systemd/system/ros2-*.service
    3. systemd 재로드:
         sudo systemctl daemon-reload
    4. root cause 추적 (custom deployment script·잘못된 packaging) 후 재발 방지.
