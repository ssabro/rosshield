# C2 — /cmd_vel permissions.xml ACL 명시 (SROS2 publish 권한 enforce)
#
# design doc §2 C2 후보 'topic.cmd_vel_acl_enforced' 정확 일치.
# C1(SROS2 활성)이 plugin 활성화 담당이면 본 check는 permissions.xml에
# /cmd_vel publish 권한이 명시되어 enforce되는지 grep 검증.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: ros2.C2.cmd_vel_acl_enforced
  title: permissions.xml에 /cmd_vel publish 권한 명시
  description: |-
    SROS2 permissions.xml은 노드별 publish/subscribe 권한을 enforce합니다.
    /cmd_vel publish 권한이 명시되어 있지 않으면 임의 노드가 명령 발사 가능 (Enforce
    모드여도 권한 매핑이 없는 토픽은 cross-talk 가능성 존재).
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    [ -f /opt/ros/jazzy/setup.bash ] && source /opt/ros/jazzy/setup.bash 2>/dev/null;
    KEYSTORE="${ROS_SECURITY_KEYSTORE:-$HOME/.ros/keystore}";
    if [ ! -d "$KEYSTORE/enclaves" ]; then
      echo "** FAIL ** keystore enclaves dir not found: $KEYSTORE/enclaves";
      exit 0;
    fi;
    CNT=$(grep -rh -E "<(topic|publish)>.*cmd_vel" "$KEYSTORE/enclaves" 2>/dev/null | wc -l);
    if [ "$CNT" -ge 1 ]; then
      echo "** PASS ** cmd_vel ACL entries count=$CNT";
    else
      echo "** FAIL ** cmd_vel ACL entries count=0 (no publish/topic rule for /cmd_vel)";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    SROS2의 Enforce 모드(C1)는 permissions.xml에 명시된 토픽 매핑만 차단·허용합니다.
    /cmd_vel 같은 안전-critical 토픽에 publish/topic rule이 명시되지 않으면 enforce
    효과가 0 — DDS 기본 동작으로 fallback. 본 check는 grep으로 ACL entry 존재만 검증
    (rule이 publish인지 deny인지 등 세부 분석은 customer 정책 의존).
  fixGuidance: |-
    1. enclaves/<context>/permissions.xml 파일 열기.
    2. teleop 또는 navigation stack 노드의 grant 섹션에 다음 추가:
         <publish>
           <topics>
             <topic>cmd_vel</topic>
           </topics>
         </publish>
    3. ros2 daemon restart로 permissions reload.
    4. 검증 — 본 check 재실행.
