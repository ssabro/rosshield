# C2 — /scan(LiDAR) permissions.xml ACL 명시 (SROS2 subscribe 권한 enforce)
#
# design doc: docs/design/notes/ros2-humble-dds-sros2-design.md §6.5 Stage 10.E-5.
# D-P10E-3 env override skip — site policy 의존, env 미설정 또는 keystore 부재 시 PASS skip.
# /cmd_vel publisher 차단(C2-cmd-vel-acl-enforced)만으로는 부족 — LiDAR /scan 도청으로
# 환경 지도 정보 유출 + spoofed scan 주입으로 SLAM 공격 가능.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: ros2.C2.scan_topic_acl_enforced
  title: permissions.xml에 /scan(LiDAR) ACL 명시
  description: |-
    /scan은 표준 LiDAR sensor_msgs/LaserScan 토픽입니다. permissions.xml에 publish/subscribe
    ACL이 명시되지 않으면 임의 노드가 /scan을 subscribe해 환경 지도 정보를 도청하거나
    spoofed scan 메시지를 publish해 SLAM·navigation stack 공격 가능.

    본 check는 env `ROSSHIELD_SROS2_KEYSTORE`(default `~/sros2_keystore`)의 enclaves
    하위 permissions.xml에 `/scan` ACL entry 존재만 grep 검증합니다.

    env 미설정 또는 keystore 부재 시 PASS skip (D-P10E-3 site policy 의존 패턴 일관).
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    [ -f /opt/ros/jazzy/setup.bash ] && source /opt/ros/jazzy/setup.bash 2>/dev/null;
    KEYSTORE="${ROSSHIELD_SROS2_KEYSTORE:-$HOME/sros2_keystore}";
    if [ ! -d "$KEYSTORE" ]; then
      echo "** PASS ** keystore not found at $KEYSTORE (env override skip — site policy 미적용)";
      exit 0;
    fi;
    if [ ! -d "$KEYSTORE/enclaves" ]; then
      echo "** PASS ** keystore enclaves dir not found: $KEYSTORE/enclaves (env override skip)";
      exit 0;
    fi;
    CNT=$(grep -rh -E "<(topic|publish|subscribe)>.*scan" "$KEYSTORE/enclaves" 2>/dev/null | wc -l);
    if [ "$CNT" -ge 1 ]; then
      echo "** PASS ** /scan ACL entries count=$CNT";
    else
      echo "** FAIL ** /scan ACL entries count=0 (no publish/subscribe rule for /scan)";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    DDS Security Spec v1.1은 permissions.xml에 명시되지 않은 토픽에 대해 ACL 부재로
    fallback — 임의 노드가 subscribe 가능. /scan LiDAR 도청은 robot이 위치한 시설의
    구조 정보(복도 폭·벽·장애물 배치) 유출로 이어지며, 산업용 robot fleet의 경우
    공장 layout이 경쟁사에 노출 가능. spoofed scan 주입은 SLAM 알고리즘의 위치
    오인식 → robot 충돌 또는 의도하지 않은 경로 이탈.

    env 미설정 시 PASS skip은 site별로 keystore 경로가 다른 customer를 false positive
    없이 cover (D-P10E-3 권장 default — Round 3 패턴 일관).
  fixGuidance: |-
    1. env 정의 — customer site에서 keystore 경로를 `ROSSHIELD_SROS2_KEYSTORE`로 export.
       예: `export ROSSHIELD_SROS2_KEYSTORE=/opt/ros/keystore`
    2. enclaves/<context>/permissions.xml 파일 열기.
    3. LiDAR driver 노드의 grant 섹션에 publish 권한 명시:
         <publish>
           <topics>
             <topic>scan</topic>
           </topics>
         </publish>
    4. navigation·SLAM 노드의 grant 섹션에 subscribe 권한 명시.
    5. ros2 daemon restart로 permissions reload.
    6. 검증 — 본 check 재실행.
