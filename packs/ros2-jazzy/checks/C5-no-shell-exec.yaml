# C5 — launch.py 안 ExecuteProcess(shell=True) 차단 (shell injection 회피)
#
# design doc §2 C5 후보 'launch.no_shell_exec' 정확 일치.
# Round 2 MVP 우선 후보 — grep 단순 정적 검출 (full launch.py AST 분석은 carryover).
# shell=True + 외부 입력(launch arg, env) 조합은 shell injection 직접 노출.
apiVersion: rosshield.io/v1
kind: Check
metadata:
  id: ros2.C5.no_shell_exec
  title: Launch.py 안 ExecuteProcess(shell=True) 사용 0건
  description: |-
    ROS2 launch.py의 ExecuteProcess(shell=True)는 cmd 문자열을 shell 통해 실행 —
    launch arg 또는 env 값이 cmd에 직접 interpolation 되면 shell injection 직접
    노출 (예 `;rm -rf /` 같은 페이로드). shell=False(default) + 인자 list 형식이
    안전합니다. 본 check는 표준 디렉터리의 launch.py 안 정적 grep으로 검출 (full
    AST 분석은 carryover — single-line literal 위반만 잡습니다).
  severity: high
spec:
  auditCommand: |-
    bash -c 'set -o pipefail;
    DIRS=$(ls -d /opt/ros/jazzy/share/*/launch ~/ros2_ws/install/*/share/*/launch ~/ros2_ws/src 2>/dev/null);
    if [ -z "$DIRS" ]; then
      echo "** PASS ** launch.py 디렉터리 부재 (검사 대상 0)";
      exit 0;
    fi;
    HITS=$(grep -rhE "ExecuteProcess\(.*shell[[:space:]]*=[[:space:]]*True" $DIRS --include="*.py" 2>/dev/null | wc -l);
    if [ "$HITS" = "0" ]; then
      echo "** PASS ** ExecuteProcess(shell=True) 0건";
    else
      echo "** FAIL ** ExecuteProcess(shell=True) 발견 count=$HITS (shell=False + cmd list 권장)";
    fi'
  evaluationRule:
    op: contains
    value: '** PASS **'
  rationale: |-
    Python subprocess + shell=True는 cmd 문자열을 /bin/sh -c 로 실행. launch arg
    나 env 값이 cmd에 직접 들어가면 `;` `|` `$(...)` 같은 meta char가 shell에서
    해석돼 임의 명령 실행 가능 (CWE-78 OS Command Injection). ROS2 launch는
    runtime에 외부 입력 받는 경우가 흔해 shell=True는 위험. ExecuteProcess는
    기본 shell=False + cmd list 형식(['/usr/bin/node', '/path/to/node'])이 안전.
  fixGuidance: |-
    1. grep -rE "ExecuteProcess\(.*shell=True" <launch-dir> 로 위반 검출.
    2. 각 위반을 cmd list + shell=False 로 변환:
       - 변환 전: ExecuteProcess(cmd=['ros2 run pkg node ' + arg], shell=True)
       - 변환 후: ExecuteProcess(cmd=['ros2', 'run', 'pkg', 'node', arg])
    3. arg 값에 shell meta char가 필요하면 직접 escape 또는 wrapper script 사용.
    4. 검증 — 본 check 재실행, HITS=0 확인.
    5. (carryover) launch.py AST plugin check로 multi-line/dynamic 위반 검출 강화.
