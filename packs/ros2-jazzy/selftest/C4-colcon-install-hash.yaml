        stdout: '** PASS ** baseline digest 미설정 (env ROSSHIELD_COLCON_BASELINE_SHA256 정의 필요 — site policy skip)'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: PASS — colcon install 디렉터리 부재 (비대상 site)
      input:
        stdout: '** PASS ** colcon install/setup.bash 부재 (본 check 비대상 site)'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
