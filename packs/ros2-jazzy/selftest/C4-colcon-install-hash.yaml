      input:
        stdout: '** PASS ** colcon install/setup.bash digest 일치 (a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90)'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
