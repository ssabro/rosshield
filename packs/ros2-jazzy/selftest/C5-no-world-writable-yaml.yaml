# selftest — ros2.C5.no_world_writable_yaml
# evaluationRule: contains "** PASS **"
apiVersion: rosshield.io/v1
kind: SelfTest
metadata:
  checkId: ros2.C5.no_world_writable_yaml
spec:
  cases:
    - name: PASS — world-writable yaml 0건
      input:
        stdout: '** PASS ** world-writable yaml 0건'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: PASS — launch/param 디렉터리 부재 (검사 대상 0)
      input:
        stdout: '** PASS ** launch/param yaml 디렉터리 부재 (검사 대상 0)'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: FAIL — world-writable yaml 2건 발견
      input:
        stdout: '** FAIL ** world-writable yaml 발견 count=2 (chmod o-w 권장)'
        stderr: ''
        exitCode: 0
      expectedOutcome: FAIL
