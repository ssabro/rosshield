# selftest — ros2.C2.scan_topic_acl_enforced
# evaluationRule: contains "** PASS **"
apiVersion: rosshield.io/v1
kind: SelfTest
metadata:
  checkId: ros2.C2.scan_topic_acl_enforced
spec:
  cases:
    - name: PASS — /scan ACL entries 3건 명시
      input:
        stdout: '** PASS ** /scan ACL entries count=3'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: PASS — keystore not found (env override skip)
      input:
        stdout: '** PASS ** keystore not found at /home/ros/sros2_keystore (env override skip — site policy 미적용)'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: PASS — keystore enclaves dir 부재 (env override skip)
      input:
        stdout: '** PASS ** keystore enclaves dir not found: /home/ros/sros2_keystore/enclaves (env override skip)'
        stderr: ''
        exitCode: 0
      expectedOutcome: PASS
    - name: FAIL — /scan ACL entries 0건
      input:
        stdout: '** FAIL ** /scan ACL entries count=0 (no publish/subscribe rule for /scan)'
        stderr: ''
        exitCode: 0
      expectedOutcome: FAIL
