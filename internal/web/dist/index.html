<!doctype html>
<!-- lang="ko"는 초기 default — App.tsx의 useLocaleStore effect가 사용자 toggle 시
     `document.documentElement.lang`을 'ko'/'en'으로 동기 갱신한다 (KWCAG 1.3.1). -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 브랜드 favicon — public/favicon.svg (Stage 1에서 신규, 이전엔 inert 404). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS 홈 화면 아이콘 (manifest 표준 미흡 보완 — design doc D-PWA-3). -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- PWA manifest — installable + 홈 화면 추가 (Stage 1, SW 없이도 동작). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- 브라우저 chrome theme 컬러 — manifest theme_color 일관 (#0a0a0a). -->
    <meta name="theme-color" content="#0a0a0a" />
    <title>Lodestar Console</title>
    <script type="module" crossorigin src="/assets/index-BR55v97t.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-C4Bon6Bl.css">

  </body>
