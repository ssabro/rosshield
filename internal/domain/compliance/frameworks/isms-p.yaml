# ISMS-P 인증기준 (한국 정보보호 및 개인정보보호 관리체계)
#
# 출처: KISA 한국인터넷진흥원 ISMS-P 인증기준 (2024 개정).
# 공식 본문: https://isms-p.kisa.or.kr/
#
# 본 YAML은 통제 ID·자체 작성 한글 제목·짧은 요약(<=200자)·공식 사이트 URL만 담습니다.
# 표준 본문(원문)은 복사하지 않습니다 (R14-2 저작권 안전).
# 통제 ID 체계는 KISA 공식 코드만 사용 — 코드 자체는 저작 대상이 아닙니다.
#
# Phase 2 기본값: 80개 통제 중 핵심 30개 selection.
# Phase 3에서 풀 셋(80개)으로 확장 예정.
#
# mappedChecks는 향후 사용자가 보강하는 영역 — 현재는 저작권 안전한 일부 예시만 포함.

framework: isms-p
version: "2024"
sourceUrl: https://isms-p.kisa.or.kr/

controls:
  # 1. 관리체계 수립 및 운영 (Establishment of Management System)
  - id: "ISMS-P:1.1.1"
    title: "경영진의 참여"
    summary: "최고경영자의 지원과 참여를 보장하기 위한 의사결정 체계 구축."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.1.2"
    title: "최고책임자의 지정"
    summary: "정보보호 최고책임자(CISO) 및 개인정보 보호책임자(CPO) 공식 지정."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.1.3"
    title: "조직 구성"
    summary: "정보보호 및 개인정보보호 업무를 수행하는 전담 조직 구성."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.1.4"
    title: "범위 설정"
    summary: "관리체계의 범위를 명확히 정의하고 문서화."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.1.5"
    title: "정책 수립"
    summary: "정보보호 및 개인정보보호 정책을 수립하고 승인."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.2.1"
    title: "위험 식별"
    summary: "정보자산에 대한 위험을 식별하고 분류."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.2.2"
    title: "현황 및 흐름분석"
    summary: "주요 정보자산의 현황과 흐름을 분석하고 문서화."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.2.3"
    title: "위험 평가"
    summary: "식별된 위험에 대해 정량적·정성적 평가를 수행."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.2.4"
    title: "보호대책 선정"
    summary: "위험 평가 결과에 따라 적절한 보호대책을 선정."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:1.3.1"
    title: "보호대책 구현"
    summary: "선정된 보호대책을 실제로 구현하고 운영."
    referenceUrl: https://isms-p.kisa.or.kr/

  # 2. 보호대책 요구사항 (Protection Requirements)
  - id: "ISMS-P:2.1.1"
    title: "정책의 유지관리"
    summary: "수립한 정책을 정기적으로 검토하고 갱신."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.2.1"
    title: "주요 직무자 지정 및 관리"
    summary: "주요 직무자를 지정하고 권한을 적절히 관리."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.2.2"
    title: "직무 분리"
    summary: "권한 남용 방지를 위한 직무 분리 원칙 적용."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.2.3"
    title: "보안 서약"
    summary: "임직원 및 외부자에 대한 보안 서약서 징구."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.2.4"
    title: "인식제고 및 교육훈련"
    summary: "정기적인 정보보호 교육과 인식제고 활동 실시."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.5.1"
    title: "사용자 계정 관리"
    summary: "사용자 계정의 생성·변경·삭제 절차를 수립하고 운영."
    referenceUrl: https://isms-p.kisa.or.kr/
    mappedChecks:
      - "CIS-1.1.1.1"

  - id: "ISMS-P:2.5.2"
    title: "사용자 식별"
    summary: "고유한 식별자를 사용하여 모든 사용자를 식별."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.5.3"
    title: "사용자 인증"
    summary: "강력한 인증 메커니즘을 구현하고 운영."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.5.4"
    title: "비밀번호 관리"
    summary: "비밀번호 복잡도·변경주기·이력 관리 규칙 적용."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.5.5"
    title: "특수 계정 및 권한 관리"
    summary: "관리자·시스템 계정 등 특수 권한의 부여·회수 관리."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.5.6"
    title: "접근권한 검토"
    summary: "사용자 접근권한의 적정성을 정기적으로 검토."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.6.1"
    title: "네트워크 접근"
    summary: "네트워크 영역 분리와 접근통제 규칙 적용."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.6.2"
    title: "정보시스템 접근"
    summary: "서버·시스템에 대한 접근통제 정책 수립과 운영."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.6.3"
    title: "응용프로그램 접근"
    summary: "응용프로그램의 사용자 권한과 메뉴 접근통제."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.7.1"
    title: "암호정책 적용"
    summary: "암호화 적용 대상·알고리즘·키 관리 정책 수립."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.9.1"
    title: "변경관리"
    summary: "정보시스템 변경에 대한 절차와 통제 적용."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.9.4"
    title: "로그 및 접속기록 관리"
    summary: "주요 로그를 수집·보관·분석하는 체계 운영."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.10.1"
    title: "보안시스템 운영"
    summary: "방화벽·IDS·IPS 등 보안시스템의 정상 운영 보장."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.10.2"
    title: "클라우드 보안"
    summary: "클라우드 환경의 책임공유 모델과 보안설정 관리."
    referenceUrl: https://isms-p.kisa.or.kr/

  - id: "ISMS-P:2.11.1"
    title: "사고 예방 및 대응체계"
    summary: "정보보호 사고의 예방·탐지·대응 절차 수립."
    referenceUrl: https://isms-p.kisa.or.kr/
