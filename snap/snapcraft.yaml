name: rosshield
base: core22
adopt-info: rosshield-server
summary: ROS2 fleet security audit platform (codename rosshield)
description: |
  rosshield is a deterministic security audit platform for ROS2 robot fleets.
  This snap packages the rosshield-server binary with strict confinement for
  Ubuntu Core 22 appliances and classic Ubuntu desktops.

  Key features in this snap:
    - Single binary server (rosshield-server) вҖ” embeds web console + API.
    - SQLite default storage at /var/snap/rosshield/common/data/data.db.
    - PostgreSQL backend opt-in via ROSSHIELD_DATABASE_URL.
    - Cosign keyless signed releases (Sigstore Rekor public log).

  Configuration:
    snap set rosshield addr=127.0.0.1:8080
    snap set rosshield storage=sqlite
    snap set rosshield log-level=info
    snap restart rosshield.server

  Documentation: https://github.com/ssabro/rosshield (visibility TBD).

  Design: docs/design/notes/e25-ha-design.md, docs/operations/ha-deployment.md.

# rosshield-serverлҠ” strict confinementм—җ м Ғн•© вҖ” мҷёл¶Җ лӘ…л № мӢӨн–ү м—ҶмқҢ, мһҗмІҙ web м„ңл№ҷ.
# нӣ„мҶҚм—җ SSH кё°л°ҳ robot scan executorк°Җ м¶”к°Җлҗҳл©ҙ plugs(network)лҠ” мқҙлҜё м¶©л¶„.
confinement: strict
grade: stable

# R40-1 кІ°м • (2026-05-11): core22 LTS м•Ҳм •м„ұ мҡ°м„ . core24 м „нҷҳмқҖ customer нҷҳкІҪ кІҖмҰқ нӣ„.
# м„Өкі„: docs/design/phase5-backlog.md В§E33.

architectures:
  - build-on: amd64
    build-for: amd64
  - build-on: amd64
    build-for: arm64

apps:
  server:
    # snap apps.server.commandлҠ” alphanumeric + space + `/ . _ # : $ -`л§Ң н—Ҳмҡ© вҖ” `=`
    # кұ°л¶Җлқј `--addr=...` м§Ғм ‘ лӘ…мӢң л¶Ҳк°Җ. serverлҠ” ROSSHIELD_ADDR envлЎң default мһ¬м •мқҳ
    # (main.go м°ёмЎ°). snapм—җм„ңлҠ” мҡҙмҳҒмһҗ к°Җмқҙл“ңмҷҖ мқјкҙҖлҗҳкІҢ 127.0.0.1:8080 кі м •.
    # configure hookм—җм„ң addr мҳөм…ҳ wire(snap set)лҠ” нӣ„мҶҚ stage.
    command: bin/rosshield-server
    daemon: simple
    restart-condition: on-failure
    install-mode: enable
    plugs:
      - network         # API м„ңл№ҷ + outbound webhook + LLM API
      - network-bind    # 8080 listen
      - home            # --data-dir мӮ¬мҡ©мһҗ home мҳөм…ҳ
    environment:
      ROSSHIELD_DATA_DIR: $SNAP_COMMON/data
      ROSSHIELD_ADDR: 127.0.0.1:8080
      # ROSSHIELD_DATABASE_URLмқҖ мҡҙмҳҒмһҗк°Җ snap setмңјлЎң м„Өм •
      # ROSSHIELD_LICENSE_TOKENлҸ„ лҸҷмқј

  cli:
    command: bin/rosshield
    plugs:
      - network         # CLIлҠ” server нҳём¶ң (loginВ·inviteВ·webhook л“ұ)
      - home

  audit-verify:
    command: bin/rosshield-audit-verify
    plugs:
      - home            # report bundleмқ„ homeм—җм„ң мқҪмқҢ

parts:
  rosshield-server:
    plugin: nil
    source: .
    build-snaps:
      - go/1.22/stable      # Go 1.22+ (1.26лҠ” snap channel лҜёмЎҙмһ¬ мӢң 1.22лЎң fallback)
      - node/20/stable      # web л№Ңл“ңмҡ©
    build-packages:
      - git                  # version ldflagsмҡ©
    override-pull: |
      craftctl default
      # version л©”нғҖ м¶”м¶ң (release-pipeline.ymlкіј лҸҷмқј нҢЁн„ҙ)
      VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0-dev")
      COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
      BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      craftctl set version="${VERSION#v}"
    override-build: |
      set -e
      # 1) Web Console л№Ңл“ң (Vite + tsc) вҖ” internal/web/distм—җ мӮ°м¶ң.
      if [ -d web ] && [ -f web/package.json ]; then
        echo "==> Building web console"
        npm install -g pnpm@10
        cd web
        pnpm install --frozen-lockfile
        pnpm build
        cd ..
      fi

      # 2) Built-in pack archive л№Ңл“ң (E12) вҖ” embed.go //go:embed _archives/*.tar.gz
      # нҢЁн„ҙмқҙ fresh cloneм—җм„ң 'no matching files found'лЎң fail. release-pipeline.yml
      # + ci.yml лҸҷмқј нҢЁн„ҙ м Ғмҡ©. snap buildлҠ” release мӢңм җмқҙлҜҖлЎң fallback keygen м¶©л¶„
      # (dev pubkey embed мғҒмҲҳмҷҖ mismatch мӢң binary мӮ¬мҡ©мһҗк°Җ customer нҷҳкІҪм—җм„ң лі„ trust).
      echo "==> Building pack-tools + archive (E12)"
      go build -o bin/pack-tools ./cmd/pack-tools
      mkdir -p scripts
      ./bin/pack-tools keygen -out scripts/dev-pack-signer.key -pub-out scripts/dev-pack-signer.pub.hex -force
      make pack-archive

      # 3) Go л°”мқҙл„ҲлҰ¬ 3мў… л№Ңл“ң (serverВ·CLIВ·audit-verify).
      VERSION="$(craftctl get version)"
      COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
      BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      LDFLAGS="-s -w \
        -X 'github.com/ssabro/rosshield/cmd/rosshield.Version=${VERSION}' \
        -X 'github.com/ssabro/rosshield/cmd/rosshield.BuildCommit=${COMMIT}' \
        -X 'github.com/ssabro/rosshield/cmd/rosshield.BuildTime=${BUILD_TIME}'"

      mkdir -p "$CRAFT_PART_INSTALL/bin"
      go build -trimpath -ldflags "$LDFLAGS" -o "$CRAFT_PART_INSTALL/bin/rosshield-server" ./cmd/rosshield-server
      go build -trimpath -ldflags "$LDFLAGS" -o "$CRAFT_PART_INSTALL/bin/rosshield" ./cmd/rosshield
      go build -trimpath -ldflags "$LDFLAGS" -o "$CRAFT_PART_INSTALL/bin/rosshield-audit-verify" ./cmd/rosshield-audit-verify

# E35 вҖ” snap hooks (post-refresh + configure)лҠ” snap/hooks/ л””л үн„°лҰ¬м—җм„ң мһҗлҸҷ мқёмӢқ.
# plugsлҠ” лӘ…мӢң н•„мҡ”:
hooks:
  post-refresh:
    plugs:
      - network    # curl localhost healthz
  # configure hook мһҗмІҙлҠ” snap/hooks/configure scriptлЎң мһҗлҸҷ мқёмӢқ (snapdк°Җ
  # hooks/ л””л үн„°лҰ¬ мҠӨмә”). snapcraft 8.xлҠ” hooks:configure:plugs: [] л№Ҳ list
  # кұ°л¶Җ + configure: empty blockлҸ„ invalidмқҙлҜҖлЎң hooks sectionм—җм„ң мҷ„м „ мғқлһө.
  # plugк°Җ н•„мҡ”н•  кІҪмҡ° м¶”к°Җ лӘ…мӢң.

# н–Ҙнӣ„ stage(E34 нӣ„мҶҚВ·E37 D1):
#   - configure hook нҷ•мһҘ (snap set rosshield addr=... storage=... л“ұ)
#   - layout м¶”к°Җ (TPM device path) вҖ” keystore=tpm мӮ¬мҡ© мӢң
