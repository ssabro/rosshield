openapi: 3.1.0

info:
  title: rosshield API
  version: 0.0.1
  summary: ROS2 Fleet Security Audit Platform API
  description: |
    Skeleton spec for Phase 0. Contract-first — server handlers, client SDKs,
    and CLI command shapes are generated from this document. See
    `docs/design/05-api-and-auth.md` for the full design.

    Status: v1 under design. No operation here is considered stable.
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  - url: http://127.0.0.1:8080
    description: Local desktop / development
  - url: https://{host}
    description: On-prem or appliance
    variables:
      host:
        default: rosshield.example.internal

tags:
  - { name: health,     description: Liveness / readiness probes }
  - { name: auth,       description: Authentication and session }
  - { name: tenant,     description: Tenant, user, role management }
  - { name: fleet,      description: Fleet groupings and policies }
  - { name: robot,      description: Robot inventory and credentials }
  - { name: benchmark,  description: Signed benchmark packs }
  - { name: scan,       description: Scan sessions and results }
  - { name: evidence,   description: Raw evidence records }
  - { name: insight,    description: Drift, anomaly, root cause }
  - { name: advisor,    description: LLM-backed explanations (opt-in) }
  - { name: compliance, description: Framework mappings and scores }
  - { name: reporting,  description: Signed reports }
  - { name: audit,      description: Hash-chained audit log }
  - { name: webhook,    description: Outbound webhook endpoints + delivery log (E23) }
  - { name: sso,        description: SSO providers + OIDC/SAML login flows (E20) }
  - { name: invitation, description: Tenant invitations and accept-by-token (E21) }

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealthz
      security: []
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok

  /readyz:
    get:
      tags: [health]
      operationId: getReadyz
      security: []
      summary: Readiness probe
      description: Returns 200 only after DB, event bus, and pack index are ready.
      x-status: todo
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []
      summary: Local credential login
      description: |
        Dual mode (C6):
          - `X-Cookie-Auth: true` → refresh token은 응답 본문에서 제외되고
            HttpOnly `rosshield_refresh` cookie로 송출 (Web Console).
          - 헤더 부재 → 본문에 refresh token 포함 (CLI legacy 호환).
      x-status: todo
      parameters:
        - in: header
          name: X-Cookie-Auth
          schema: { type: string, enum: ["true"] }
          description: Set to `true` to receive refresh token via HttpOnly cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly refresh cookie (only when X-Cookie-Auth is true).
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:  { type: string }
                  refreshToken: { type: string, description: "Omitted in cookie mode." }
                  user:
                    type: object
                    properties:
                      id:          { type: string }
                      email:       { type: string }
                      displayName: { type: string }
                      tenantId:    { type: string }
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      operationId: refreshAuth
      security: []
      summary: Rotate access token using refresh token
      description: |
        Dual mode (C6): cookie 우선 → 본문 fallback.
          - Web Console (`X-Cookie-Auth: true`) → HttpOnly cookie에서 refresh 추출,
            새 refresh를 다시 cookie로 송출(rotation), 본문에는 access만.
          - CLI → 본문 `refreshToken` 사용, 본문에 새 refresh 포함.
        실패(만료/취소/재사용 탐지)는 모두 401 + cookie clear.
      x-status: todo
      parameters:
        - in: header
          name: X-Cookie-Auth
          schema: { type: string, enum: ["true"] }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string, description: "Legacy mode (CLI)." }
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              schema: { type: string }
              description: New HttpOnly refresh cookie (cookie mode only).
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:  { type: string }
                  refreshToken: { type: string, description: "Omitted in cookie mode." }
        "401":
          description: Refresh failed (expired/revoked/reuse-detected)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      operationId: logoutAuth
      security: []
      summary: Revoke refresh token and clear cookie
      description: |
        Idempotent. Clears `rosshield_refresh` cookie regardless of token presence.
        Cookie 또는 본문 `refreshToken`에서 토큰을 추출해 도메인 layer가 revoke.
      x-status: todo
      parameters:
        - in: header
          name: X-Cookie-Auth
          schema: { type: string, enum: ["true"] }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "204":
          description: No Content (cookie cleared)
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Empty/expired refresh cookie.
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/me:
    get:
      tags: [auth]
      operationId: getCurrentSession
      summary: Current session info
      x-status: todo
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/tenants/current:
    get:
      tags: [tenant]
      operationId: getCurrentTenant
      summary: Current tenant
      x-status: todo
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/robots:
    get:
      tags: [robot]
      operationId: listRobots
      summary: List robots
      x-status: todo
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - { in: query, name: fleetId, schema: { type: string } }
        - { in: query, name: tag,     schema: { type: string } }
        - { in: query, name: q,       schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRobotsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [robot]
      operationId: createRobot
      summary: Register a robot
      description: |
        Accepts plaintext credentials (memory-only) — domain layer wraps via KEK→DEK.
        Response excludes plaintext credentials (Robot meta + credentialId only).
        Conflicts (409): duplicate name within fleet, duplicate host:port.
      x-status: todo
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRobotRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRobotResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/robots/{robotId}:
    parameters:
      - { in: path, name: robotId, required: true, schema: { type: string, pattern: "^ro_[A-Z0-9]+$" } }
    get:
      tags: [robot]
      operationId: getRobot
      summary: Get a robot
      x-status: todo
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/scans:
    get:
      tags: [scan]
      operationId: listScans
      summary: List scan sessions
      x-status: todo
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: status,  schema: { type: string } }
        - { in: query, name: fleetId, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [scan]
      operationId: createScan
      summary: Start a new scan session
      description: |
        Phase 1 Stage B: inserts session in `pending` state — Orchestrator(scanrun)
        start is deferred to a later Stage. `total` is optional (orchestrator computes
        it; current Stage accepts external value).
      x-status: todo
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartScanRequest"
      responses:
        "201":
          description: Created (pending session)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanSession"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/scans/{sessionId}/progress:
    parameters:
      - { in: path, name: sessionId, required: true, schema: { type: string } }
    get:
      tags: [scan]
      operationId: streamScanProgress
      summary: Stream scan progress (WebSocket upgrade)
      description: |
        WebSocket upgrade endpoint — OpenAPI 3.0/3.1 has no first-class WebSocket
        modeling, so this entry is documentation-only. The HTTP GET handler upgrades
        the connection (`coder/websocket.Accept`) and pushes JSON frames matching
        `ScanProgressMessage` schema (see `components/schemas/ScanProgressMessage`).
        See `internal/api/handlers/scan_ws.go` for the wire protocol.

        Subscribes to `scan.progress` and `scan.completed` events for the given
        sessionId within the caller tenant scope. Emits one `completed` frame
        (status=completed/failed/cancelled) and closes.

        Auth: Authorization Bearer is required; browser WebSocket API cannot set
        custom headers — Phase 1 assumes same-origin. Phase 2 will explore
        `?access_token=` query token or session cookie.
      x-status: phase1
      x-protocol: websocket
      responses:
        "101":
          description: Switching Protocols (WebSocket upgrade)
        "401":
          description: Missing/invalid bearer token
        "503":
          description: Event bus not configured
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/reports:
    get:
      tags: [reporting]
      operationId: listReports
      summary: List reports
      description: |
        Lists generated reports for the current tenant. PDF body is not included —
        only metadata + signature presence flag. Filter by `sessionId` to scope to a
        single scan.
      x-status: phase1
      parameters:
        - { in: query, name: sessionId, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReportsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/reports/{reportId}:verify:
    post:
      tags: [reporting]
      operationId: verifyReport
      summary: Verify the signature of a report
      x-status: todo
      parameters:
        - { in: path, name: reportId, required: true, schema: { type: string } }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/license:
    get:
      tags: [tenant]
      operationId: getLicenseInfo
      summary: License metadata (E24)
      description: |
        Returns the active license edition (community|enterprise), expiry, active
        features, and quotas. Token and signature are NEVER exposed — only metadata
        the operator needs. License unset → community defaults.
      x-status: phase3
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  edition:    { type: string, enum: [community, enterprise] }
                  issuedTo:   { type: string }
                  issuedAt:   { type: string, format: date-time }
                  expiresAt:  { type: string, format: date-time }
                  expired:    { type: boolean }
                  features:   { type: array, items: { type: string } }
                  quotas:
                    type: object
                    properties:
                      robotsMax:       { type: integer, description: "0 = unlimited" }
                      scansPerDay:     { type: integer, description: "0 = unlimited" }
                      llmTokensPerDay: { type: integer, description: "0 = unlimited" }
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/packs:
    get:
      tags: [benchmark]
      operationId: listPacks
      summary: Built-in + tenant 벤치마크 팩 목록 (E12 Stage 3)
      description: |
        호출자 tenant pack과 systemTenant("system") cross-tenant 공유 pack을 합쳐 반환.
        systemTenant pack은 §4.2에서 명시된 cross-tenant 공유 자산(built-in seed 또는
        운영자 system tenant install). 결과는 packKey 알파벳 정렬, checks 미포함(메타만).

        scans 페이지 Pack 선택 드롭다운 + system 페이지 PacksCard에서 사용.
      x-status: phase5
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [packs]
                properties:
                  packs:
                    type: array
                    items:
                      $ref: "#/components/schemas/PackMeta"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/packs/{packKey}:
    get:
      tags: [benchmark]
      operationId: getPack
      summary: 단일 벤치마크 팩 + checks 상세 (E12 Stage 5)
      description: |
        systemTenant 우선 → 호출자 tenant fallback. checks는 CheckID 알파벳 정렬.
      x-status: phase5
      parameters:
        - in: path
          name: packKey
          required: true
          schema: { type: string }
          description: vendor-name-version 합성 키
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackDetail"
        "404":
          description: Pack not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/packs/{packKey}/checks/{checkId}:
    get:
      tags: [benchmark]
      operationId: getCheck
      summary: 단일 check 상세 (audit cmd + eval rule + rationale + fix) (E12 Stage 6)
      description: |
        pack 안의 단일 check 메타 + 실행 명령 + 평가 규칙 AST + 정당성 + 수정
        가이드 반환. systemTenant 우선 → caller fallback.
      x-status: phase5
      parameters:
        - in: path
          name: packKey
          required: true
          schema: { type: string }
          description: vendor-name-version 합성 키
        - in: path
          name: checkId
          required: true
          schema: { type: string }
          description: 팩 내 식별자 (예 CIS-1.1.1.1)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckDetail"
        "404":
          description: Pack or check not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/packs/{packKey}/checks/{checkId}/selftest:
    get:
      tags: [benchmark]
      operationId: getCheckSelftest
      summary: 단일 check의 selftest fixture (E12 Stage 7)
      description: |
        builtin pack scope 한정 — pack converter가 만든 selftest yaml 케이스
        (input + expectedOutcome) 반환. tenant 임포트 pack은 selftest 정보가
        InstallPack 시점에 버려지므로 404. degraded check(자동 변환 실패)도 404.
      x-status: phase5
      parameters:
        - in: path
          name: packKey
          required: true
          schema: { type: string }
        - in: path
          name: checkId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckSelftest"
        "404":
          description: builtin pack 아님 또는 selftest 부재
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/audit/head:
    get:
      tags: [audit]
      operationId: getAuditHead
      summary: Current hash-chain head
      description: |
        Returns tenant-scoped chain head (Seq + Hash). When no audit entries exist,
        returns genesis head (Seq=0, Hash=zero) — Web UI renders "초기 상태".
      x-status: phase1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditHead"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/audit/verify:
    post:
      tags: [audit]
      operationId: verifyAuditChain
      summary: Verify a range of the audit chain (external verifier)
      x-status: todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from: { type: string, format: date-time }
                to:   { type: string, format: date-time }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # E17 (Phase 2) — Insight 도메인 표면.
  /api/v1/insights:
    get:
      tags: [insight]
      operationId: listInsights
      summary: List active (non-dismissed) insights
      x-status: phase2
      parameters:
        - $ref: "#/components/parameters/Limit"
        - { in: query, name: kind,     schema: { type: string, enum: [drift, anomaly, peer, root_cause, prediction] } }
        - { in: query, name: severity, schema: { type: string, enum: [info, low, medium, high, critical] } }
        - { in: query, name: robotId,  schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInsightsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/insights/{insightId}:dismiss:
    post:
      tags: [insight]
      operationId: dismissInsight
      summary: Mark an insight as dismissed
      x-status: phase2
      parameters:
        - { in: path, name: insightId, required: true, schema: { type: string, pattern: "^ins_[A-Z0-9]+$" } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 1, maxLength: 500 }
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insight"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/fleets/{fleetId}/insights:run:
    post:
      tags: [insight]
      operationId: runFleetInsights
      summary: Trigger insight detectors for a fleet (drift/anomaly/peer)
      description: |
        Manually runs the insight pipeline for the given fleet. E19 will subscribe
        this to scan.completed events for automation; this endpoint remains for
        on-demand recompute.
      x-status: phase2
      parameters:
        - { in: path, name: fleetId, required: true, schema: { type: string } }
      responses:
        "200":
          description: Detectors ran (may produce 0 insights if no history)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunInsightsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # E17 (Phase 2) — Compliance 도메인 표면.
  /api/v1/compliance/profiles:
    get:
      tags: [compliance]
      operationId: listComplianceProfiles
      summary: List compliance profiles for the current tenant
      x-status: phase2
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComplianceProfilesResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [compliance]
      operationId: createComplianceProfile
      summary: Activate a compliance framework
      x-status: phase2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [framework, frameworkVersion]
              properties:
                framework:        { type: string, enum: [isms-p, iso27001-2022, nist-800-53-rev5] }
                frameworkVersion: { type: string }
                enabled:          { type: boolean, default: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceProfile"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/compliance/profiles/{profileId}/snapshots:
    parameters:
      - { in: path, name: profileId, required: true, schema: { type: string, pattern: "^cp_[A-Z0-9]+$" } }
    get:
      tags: [compliance]
      operationId: listComplianceSnapshots
      summary: List snapshots for a profile (created_at DESC)
      x-status: phase2
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListComplianceSnapshotsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [compliance]
      operationId: generateComplianceSnapshot
      summary: Generate a snapshot from a scan session
      x-status: phase2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId]
              properties:
                sessionId: { type: string }
      responses:
        "201":
          description: Generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceSnapshot"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # E16/E19-3 (Phase 2) — Advisor 도메인 표면 (LLM 옵트인).
  #
  # LLM provider가 noop이면 모든 ask는 503 Service Unavailable (advisor.ErrAdvisorDisabled).
  # 활성화 방법: 서버 시작 시 `--llm-provider=ollama|=anthropic`.
  #
  # 핸들러는 chi 직접 mount (gen.ServerInterface 미구현, gen.Unimplemented가 자동 501).
  # spec은 문서·계약 목적으로만 정의.
  /api/v1/advisor/conversations:ask:
    post:
      tags: [advisor]
      operationId: askAdvisor
      summary: Ask the advisor a natural-language question (opt-in)
      description: |
        Starts a new conversation (when conversationId is empty) or appends to an
        existing one. The orchestrator runs an LLM/tool dispatch loop and returns
        the final answer plus the turns produced in this request.

        Returns 503 if the LLM provider is disabled (noop).
      x-status: phase2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                conversationId: { type: string, description: "Empty → new conversation" }
                question:       { type: string, minLength: 1 }
                maxToolCalls:   { type: integer, minimum: 0, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorAskResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/advisor/conversations:
    get:
      tags: [advisor]
      operationId: listAdvisorConversations
      summary: List the current user's conversations (updated_at DESC)
      x-status: phase2
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAdvisorConversationsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/advisor/conversations/{conversationId}:
    parameters:
      - { in: path, name: conversationId, required: true, schema: { type: string } }
    get:
      tags: [advisor]
      operationId: getAdvisorConversation
      summary: Get a conversation with all its turns (sequence ASC)
      x-status: phase2
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvisorConversationDetail"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # E23-C (Phase 3) — Webhook CRUD HTTP 표면.
  # Secret은 응답에서 마지막 4자만 노출 (`secretLast4`). 평문 secret은 PUT/POST 입력 전용.
  /api/v1/webhooks:
    get:
      tags: [webhook]
      operationId: listWebhookEndpoints
      summary: List webhook endpoints for the current tenant
      x-status: phase3
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWebhookEndpointsResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [webhook]
      operationId: createWebhookEndpoint
      summary: Register a new webhook endpoint
      description: |
        Validates URL (absolute http/https), secret (non-empty for HMAC), and event
        types (must be in known set: scan.completed, insight.created, audit.checkpoint).
      x-status: phase3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEndpointCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/webhooks/{endpointId}:
    parameters:
      - { in: path, name: endpointId, required: true, schema: { type: string, pattern: "^wh_[A-Z0-9]+$" } }
    get:
      tags: [webhook]
      operationId: getWebhookEndpoint
      summary: Get a webhook endpoint
      x-status: phase3
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [webhook]
      operationId: updateWebhookEndpoint
      summary: Update a webhook endpoint (URL · secret · events · format · enabled)
      x-status: phase3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEndpointUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [webhook]
      operationId: deleteWebhookEndpoint
      summary: Delete a webhook endpoint (deliveries are preserved — append-only)
      x-status: phase3
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/webhooks/{endpointId}/deliveries:
    get:
      tags: [webhook]
      operationId: listWebhookDeliveries
      summary: List delivery attempts for a webhook endpoint (created_at DESC)
      x-status: phase3
      parameters:
        - { in: path, name: endpointId, required: true, schema: { type: string, pattern: "^wh_[A-Z0-9]+$" } }
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWebhookDeliveriesResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # E29 — one-off ping endpoint: dispatcher.PingEndpoint() to validate URL/secret/network
  # without inserting a delivery row. Operator-facing diagnostic only.
  /api/v1/webhooks/{endpointId}/test:
    post:
      tags: [webhook]
      operationId: testWebhookEndpoint
      summary: Send a one-off ping to a webhook endpoint (E29)
      description: |
        POSTs a synthetic payload to the configured URL with HMAC signature, returning
        the upstream HTTP status, latency, and any transport error. **No delivery row
        is inserted** — purely an ad-hoc diagnostic for operators verifying URL/secret
        configuration. Returns 503 if the dispatcher is not configured.
      x-status: phase3
      parameters:
        - { in: path, name: endpointId, required: true, schema: { type: string, pattern: "^wh_[A-Z0-9]+$" } }
      responses:
        "200":
          description: OK — ping completed (success may be false if upstream returned non-2xx)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Dispatcher not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # ─── E20 SSO Provider CRUD + login flows ─────────────────────────────
  # Provider CRUD requires authenticated tenant. Login flows are unauthenticated
  # (state parameter binds the attempt). chi-direct mounted; gen.Unimplemented
  # is never invoked.
  /api/v1/sso/providers:
    get:
      tags: [sso]
      operationId: listSSOProviders
      summary: List SSO providers for the current tenant
      x-status: phase3
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSSOProvidersResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          description: SSO service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [sso]
      operationId: createSSOProvider
      summary: Register a new SSO provider (OIDC or SAML)
      description: |
        Creates a provider record bound to the current tenant. `config` is a raw JSON
        object validated by the provider type (OIDC: issuer/clientId/clientSecret/...;
        SAML: entityId/ssoUrl/certificate). Returns 409 if a provider with the same
        name already exists in the tenant.
      x-status: phase3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SSOProviderCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSOProvider"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          description: Provider name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: SSO service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/sso/providers/{providerId}:
    parameters:
      - { in: path, name: providerId, required: true, schema: { type: string } }
    get:
      tags: [sso]
      operationId: getSSOProvider
      summary: Get an SSO provider
      x-status: phase3
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSOProvider"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [sso]
      operationId: updateSSOProvider
      summary: Update an SSO provider (partial — name/enabled/config independently optional)
      description: |
        All body fields are optional; omitted fields are not modified. `config` if
        present fully replaces the existing JSON document.
      x-status: phase3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SSOProviderUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSOProvider"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [sso]
      operationId: deleteSSOProvider
      summary: Delete an SSO provider (hard delete + audit emit)
      x-status: phase3
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/sso/{providerId}/login:
    get:
      tags: [sso]
      operationId: startSSOLogin
      summary: Begin SSO login flow (returns IdP redirect URL or 302)
      description: |
        Initiates an SSO authorization attempt. For OIDC providers with a configured
        IdP client the response is a 302 redirect to the authorization endpoint. In
        scaffold mode (no client) or for SAML, returns a 200 JSON body containing the
        opaque `state` token to be carried back via the callback. Authentication is
        not required — the `state` token binds the attempt to a tenant on completion.
      x-status: phase3
      security: []
      parameters:
        - { in: path,  name: providerId,    required: true,  schema: { type: string } }
        - { in: query, name: redirectAfter, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK (scaffold or SAML — JSON body with state)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSOStartLoginResponse"
        "302":
          description: Redirect to IdP authorization endpoint
          headers:
            Location:
              schema: { type: string }
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: SSO service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/sso/{providerId}/callback:
    get:
      tags: [sso]
      operationId: completeSSOLoginOIDC
      summary: OIDC authorization-code callback (state + code via query string)
      description: |
        Completes an OIDC authorization attempt. State is validated against the active
        attempt row (CSRF + replay protection). Authorization code is exchanged with
        the IdP token endpoint, id_token verified, and an external identity record
        upserted. Token issuance for the resulting user is performed in a follow-up
        stage (E20-D). Authentication is not required — `state` is the capability.
      x-status: phase3
      security: []
      parameters:
        - { in: path,  name: providerId, required: true,  schema: { type: string } }
        - { in: query, name: state,      required: true,  schema: { type: string } }
        - { in: query, name: code,       required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSOCallbackResponse"
        "400":
          description: Invalid/expired state, IdP mismatch, or id_token verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "502":
          description: Upstream IdP HTTP failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: SSO service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/sso/{providerId}/saml/acs:
    post:
      tags: [sso]
      operationId: completeSSOLoginSAML
      summary: SAML SP-initiated POST binding endpoint (Assertion Consumer Service)
      description: |
        Accepts a `application/x-www-form-urlencoded` body with `SAMLResponse` and
        `RelayState` fields per SAML POST binding spec. RelayState is the state token
        produced by `startSSOLogin`. Assertion verification (signature + NameID
        extraction) is performed by the SAML adapter. Authentication is not required.
      x-status: phase3
      security: []
      parameters:
        - { in: path, name: providerId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [SAMLResponse, RelayState]
              properties:
                SAMLResponse: { type: string, description: "Base64 SAML assertion" }
                RelayState:   { type: string, description: "State token from startSSOLogin" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSOCallbackResponse"
        "400":
          description: Invalid form, state, or SAML assertion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: SSO service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # ─── E21 Invitation CRUD + accept-by-token ───────────────────────────
  # CRUD requires authenticated tenant admin. by-token endpoints are unauthenticated
  # (the token itself is the capability). Accept performs Bootstrap Tx (no tenant ctx).
  /api/v1/invitations:
    get:
      tags: [invitation]
      operationId: listInvitations
      summary: List invitations for the current tenant (pending + accepted + expired)
      x-status: phase3
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvitationsResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "503":
          description: Invitation service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [invitation]
      operationId: createInvitation
      summary: Create a tenant invitation (admin)
      description: |
        Generates a single-use cryptographic token bound to (email, roleName).
        The token is included in the **response body once** — caller must transport it
        out-of-band to the invited user (email/Slack/secret manager). Default TTL is
        7 days when `expiresInHours` is omitted or zero.
      x-status: phase3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationCreateResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          description: Email already has an active invitation or registered user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Invitation service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/invitations/{invitationId}:
    parameters:
      - { in: path, name: invitationId, required: true, schema: { type: string } }
    delete:
      tags: [invitation]
      operationId: revokeInvitation
      summary: Revoke an invitation (immediately marks expired)
      x-status: phase3
      responses:
        "204":
          description: Revoked
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          description: Invitation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/invitations/by-token/{token}:
    parameters:
      - { in: path, name: token, required: true, schema: { type: string } }
    get:
      tags: [invitation]
      operationId: getInvitationByToken
      summary: Preview an invitation by token (unauthenticated)
      description: |
        Returns minimal preview (email + roleName + expiresAt + accepted flag) so the
        accept page can render before the user submits credentials. The token itself
        is the capability — no auth header required. Lookup is via Bootstrap Tx since
        the tenant context is unknown at request time.
      x-status: phase3
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationCapabilityResponse"
        "404":
          description: Token not found, expired, or already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Invitation service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/invitations/by-token/{token}/accept:
    parameters:
      - { in: path, name: token, required: true, schema: { type: string } }
    post:
      tags: [invitation]
      operationId: acceptInvitation
      summary: Accept an invitation (creates user + assigns role)
      description: |
        Creates a local user with the supplied password + display name, then assigns
        the role specified by the invitation. The invitation is marked accepted
        atomically. **No auth tokens are issued** — the accepted user must hit
        `/auth/login` separately to obtain access/refresh tokens. Unauthenticated.
      x-status: phase3
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationAcceptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationAcceptResponse"
        "400":
          description: Invalid body, password too short, role mismatch, or email mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "503":
          description: Invitation service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # B7 Stage 2-C — 자동 백업 archive list + download.
  #
  # 백업 schedule(--backup-schedule cron)이 BackupDir에 .tar.gz를 적층 — 본 endpoint는
  # 운영자가 web /system 페이지에서 archive 목록·다운로드를 수행하기 위한 표면.
  # 핸들러는 chi 직접 mount (advisor·license와 동일 패턴, gen.Unimplemented가 자동 501).
  # spec은 문서·계약 목적으로만 정의.
  /api/v1/backups:
    get:
      tags: [tenant]
      operationId: listBackups
      summary: List automatic backup archives
      description: |
        Returns .tar.gz archives present in the configured BackupDir (자동 백업
        schedule 결과). 빈 디렉터리이거나 BackupDir 미설정이면 빈 배열을 반환합니다.
      x-status: phase3
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, value]
                properties:
                  ok:    { type: boolean, const: true }
                  value:
                    $ref: "#/components/schemas/BackupListResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/backups/{filename}/download:
    get:
      tags: [tenant]
      operationId: downloadBackup
      summary: Download a backup archive
      description: |
        Streams a single .tar.gz file from BackupDir. Filename은 단순 base name이어야
        하며 path traversal(`..`, separator)은 거부됩니다. `.tar.gz` suffix가 강제됩니다.
        Range request·Last-Modified는 `http.ServeContent`가 자동 처리합니다.
      x-status: phase3
      parameters:
        - in: path
          name: filename
          required: true
          schema:
            type: string
            pattern: "^[A-Za-z0-9._-]+\\.tar\\.gz$"
            description: Base name of the archive (no directory components).
      responses:
        "200":
          description: OK — binary archive
          headers:
            Content-Disposition:
              schema: { type: string }
              description: "`attachment; filename=\"<name>.tar.gz\"`"
            Content-Length:
              schema: { type: integer, format: int64 }
            Last-Modified:
              schema: { type: string }
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid filename (path traversal or wrong suffix)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          description: Backup not found or BackupDir unset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by `/api/v1/auth/login` or OIDC/SAML callback
    apiKeyAuth:
      type: http
      scheme: bearer
      description: "API key in `Authorization: Bearer fg_live_...` form"

  parameters:
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
    Cursor:
      in: query
      name: cursor
      schema: { type: string }
    Sort:
      in: query
      name: sort
      description: "Field name; prefix with `-` for descending."
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      description: ULID or UUID. Same key within 24h returns the original response.
      schema: { type: string, minLength: 16, maxLength: 64 }

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, degraded, unavailable] }

    Meta:
      type: object
      required: [requestId]
      properties:
        requestId:     { type: string }
        serverVersion: { type: string }
        responseAt:    { type: string, format: date-time }

    PageMeta:
      type: object
      properties:
        nextCursor:  { type: string, nullable: true }
        prevCursor:  { type: string, nullable: true }
        approxTotal: { type: integer, minimum: 0 }

    Envelope:
      type: object
      required: [ok]
      properties:
        ok:    { type: boolean, const: true }
        value: {}
        meta:  { $ref: "#/components/schemas/Meta" }

    ErrorCategory:
      type: string
      enum:
        - unauthenticated
        - forbidden
        - not_found
        - conflict
        - validation
        - rate_limited
        - upstream
        - internal

    Error:
      type: object
      required: [code, category, message]
      properties:
        code:     { type: string, description: "Dotted code (e.g. `robot.not_found`)" }
        category: { $ref: "#/components/schemas/ErrorCategory" }
        message:  { type: string }
        target:
          type: object
          properties:
            type: { type: string }
            id:   { type: string }
        details:
          type: object
          additionalProperties: true

    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:    { type: boolean, const: false }
        error: { $ref: "#/components/schemas/Error" }
        meta:  { $ref: "#/components/schemas/Meta" }

    # ─── Robot ────────────────────────────────────────────────────────────
    Robot:
      type: object
      required: [id, tenantId, fleetId, name, host, port, authType, criticality]
      properties:
        id:          { type: string }
        tenantId:    { type: string }
        fleetId:     { type: string }
        name:        { type: string }
        host:        { type: string }
        port:        { type: integer }
        authType:    { type: string, enum: [password, privateKey] }
        osDistro:    { type: string }
        rosDistro:   { type: string }
        tags:
          type: array
          items: { type: string }
        role:        { type: string }
        criticality: { type: string, enum: [low, medium, high, critical] }

    ListRobotsResponse:
      type: object
      required: [robots]
      properties:
        robots:
          type: array
          items: { $ref: "#/components/schemas/Robot" }

    CreateRobotRequest:
      type: object
      required: [fleetId, name, host, authType, username]
      properties:
        fleetId:              { type: string }
        name:                 { type: string }
        host:                 { type: string }
        port:                 { type: integer, description: "0 → domain default (22)" }
        authType:             { type: string, enum: [password, privateKey] }
        username:             { type: string }
        password:             { type: string, format: password }
        privateKeyPem:        { type: string }
        privateKeyPassphrase: { type: string, format: password }
        osDistro:             { type: string }
        rosDistro:            { type: string }
        tags:
          type: array
          items: { type: string }
        role:                 { type: string }
        criticality:          { type: string, enum: [low, medium, high, critical], description: "Empty → domain default (medium)" }

    CreateRobotResponse:
      type: object
      required: [robot, credentialId]
      properties:
        robot:        { $ref: "#/components/schemas/Robot" }
        credentialId: { type: string }

    # ─── Scan ─────────────────────────────────────────────────────────────
    StartScanRequest:
      type: object
      required: [fleetId, packId]
      properties:
        fleetId: { type: string }
        packId:  { type: string }
        trigger: { type: string, description: "Empty → manual" }
        total:   { type: integer, description: "Optional — orchestrator will compute" }

    ScanSession:
      type: object
      required: [sessionId, tenantId, fleetId, packId, trigger, status, total, completed, failed]
      properties:
        sessionId: { type: string }
        tenantId:  { type: string }
        fleetId:   { type: string }
        packId:    { type: string }
        trigger:   { type: string }
        status:    { type: string }
        total:     { type: integer }
        completed: { type: integer }
        failed:    { type: integer }

    # ─── Scan progress (WebSocket frame) ─────────────────────────────────
    ScanProgressMessage:
      type: object
      description: |
        Single frame pushed via WebSocket on `/api/v1/scans/{sessionId}/progress`.
        kind="progress" → progress payload; kind="completed" → final frame.
      required: [kind, type, sessionId, total, completed, failed, occurredAt]
      properties:
        kind:          { type: string, enum: [progress, completed] }
        type:          { type: string, description: "Original EventBus type (e.g. scan.progress)" }
        sessionId:     { type: string }
        total:         { type: integer }
        completed:     { type: integer }
        failed:        { type: integer }
        status:        { type: string, description: "completed/failed/cancelled — only on completed frame" }
        reason:        { type: string, description: "failed/cancelled reason — only on completed frame" }
        occurredAt:    { type: string, format: date-time }
        correlationId: { type: string }

    # ─── Audit ────────────────────────────────────────────────────────────
    AuditHead:
      type: object
      required: [tenantId, seq, hashHex]
      properties:
        tenantId:  { type: string }
        seq:       { type: integer, format: int64 }
        hashHex:   { type: string, description: "Hash bytes (32B) hex-encoded — 64 chars" }
        updatedAt: { type: string, format: date-time }

    # ─── Reporting ────────────────────────────────────────────────────────
    Report:
      type: object
      required: [id, tenantId, sessionId, format, pdfSha256, pdfSizeBytes, generatedAt, generatedBy, signed]
      properties:
        id:           { type: string }
        tenantId:     { type: string }
        sessionId:    { type: string }
        format:       { type: string }
        pdfSha256:    { type: string }
        pdfSizeBytes: { type: integer, format: int64 }
        generatedAt:  { type: string, format: date-time }
        generatedBy:  { type: string }
        signed:       { type: boolean }

    ListReportsResponse:
      type: object
      required: [reports]
      properties:
        reports:
          type: array
          items: { $ref: "#/components/schemas/Report" }

    # ─── Insight ──────────────────────────────────────────────────────────
    Insight:
      type: object
      required: [id, tenantId, kind, severity, summary, confidence, producedBy, createdAt]
      properties:
        id:           { type: string }
        tenantId:     { type: string }
        kind:         { type: string }
        severity:     { type: string }
        robotId:      { type: string }
        fleetId:      { type: string }
        checkId:      { type: string }
        summary:      { type: string }
        reasoning:    { type: string }
        rulesApplied:
          type: array
          items: { type: string }
        confidence:   { type: number, format: double }
        producedBy:   { type: string }
        createdAt:    { type: string, format: date-time }
        dismissedAt:  { type: string, format: date-time }
        dismissedBy:  { type: string }

    ListInsightsResponse:
      type: object
      required: [insights]
      properties:
        insights:
          type: array
          items: { $ref: "#/components/schemas/Insight" }

    RunInsightsResponse:
      type: object
      required: [produced, count]
      properties:
        produced:
          type: array
          items: { $ref: "#/components/schemas/Insight" }
        count: { type: integer }

    # ─── Compliance ───────────────────────────────────────────────────────
    ComplianceProfile:
      type: object
      required: [id, tenantId, framework, frameworkVersion, enabled, createdAt, updatedAt]
      properties:
        id:               { type: string }
        tenantId:         { type: string }
        framework:        { type: string }
        frameworkVersion: { type: string }
        enabled:          { type: boolean }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }

    ListComplianceProfilesResponse:
      type: object
      required: [profiles]
      properties:
        profiles:
          type: array
          items: { $ref: "#/components/schemas/ComplianceProfile" }

    ComplianceControlStatus:
      type: object
      required: [controlId, status, passCount, failCount]
      properties:
        controlId: { type: string }
        status:    { type: string, description: "pass/fail/partial/not_applicable/unmapped" }
        passCount: { type: integer }
        failCount: { type: integer }
        notes:     { type: string }

    ComplianceSnapshot:
      type: object
      required: [id, tenantId, profileId, overallScore, passCount, failCount, partialCount, notApplicableCount, unmappedCount, chainHeadSeq, chainHeadHash, createdAt]
      properties:
        id:                 { type: string }
        tenantId:           { type: string }
        profileId:          { type: string }
        sessionId:          { type: string }
        overallScore:       { type: number, format: double }
        passCount:          { type: integer }
        failCount:          { type: integer }
        partialCount:       { type: integer }
        notApplicableCount: { type: integer }
        unmappedCount:      { type: integer }
        chainHeadSeq:       { type: integer, format: int64 }
        chainHeadHash:      { type: string }
        statuses:
          type: array
          items: { $ref: "#/components/schemas/ComplianceControlStatus" }
        createdAt:          { type: string, format: date-time }

    ListComplianceSnapshotsResponse:
      type: object
      required: [snapshots]
      properties:
        snapshots:
          type: array
          items: { $ref: "#/components/schemas/ComplianceSnapshot" }

    # ─── Advisor ──────────────────────────────────────────────────────────
    AdvisorToolCall:
      type: object
      required: [id, toolName, durationMs]
      properties:
        id:         { type: string }
        toolName:   { type: string }
        argsJson:   { type: string }
        resultJson: { type: string }
        error:      { type: string }
        durationMs: { type: integer, format: int64 }

    AdvisorTurn:
      type: object
      required: [id, conversationId, role, content, sequence, createdAt]
      properties:
        id:             { type: string }
        conversationId: { type: string }
        role:           { type: string, description: "user/assistant/tool/system" }
        content:        { type: string }
        sequence:       { type: integer }
        llmProvider:    { type: string }
        llmModel:       { type: string }
        inputTokens:    { type: integer }
        outputTokens:   { type: integer }
        costUsd:        { type: number, format: double }
        createdAt:      { type: string, format: date-time }
        toolCalls:
          type: array
          items: { $ref: "#/components/schemas/AdvisorToolCall" }

    AdvisorConversation:
      type: object
      required: [id, tenantId, userId, title, createdAt, updatedAt]
      properties:
        id:        { type: string }
        tenantId:  { type: string }
        userId:    { type: string }
        title:     { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdvisorAskResponse:
      type: object
      required: [conversationId, finalAnswer, turns]
      properties:
        conversationId: { type: string }
        finalAnswer:    { type: string }
        turns:
          type: array
          items: { $ref: "#/components/schemas/AdvisorTurn" }

    ListAdvisorConversationsResponse:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items: { $ref: "#/components/schemas/AdvisorConversation" }

    AdvisorConversationDetail:
      type: object
      required: [conversation, turns]
      properties:
        conversation: { $ref: "#/components/schemas/AdvisorConversation" }
        turns:
          type: array
          items: { $ref: "#/components/schemas/AdvisorTurn" }

    # ─── Webhook (E23-C) ──────────────────────────────────────────────────
    WebhookEventType:
      type: string
      description: |
        Domain event type subscribed by the webhook. Empty `events` means all known
        events. Add new types only after operator agreement (signed pack).
      enum: [scan.completed, insight.created, audit.checkpoint]

    WebhookFormat:
      type: string
      description: |
        Payload serialization format.
          - json (default): rosshield raw JSON envelope.
          - cef: ArcSight Common Event Format (Splunk OOTB).
          - ecs: Elastic Common Schema.
      enum: [json, cef, ecs]

    WebhookEndpoint:
      type: object
      required: [id, tenantId, url, secretLast4, events, format, enabled, createdAt, updatedAt]
      properties:
        id:          { type: string, pattern: "^wh_[A-Z0-9]+$" }
        tenantId:    { type: string }
        url:         { type: string, format: uri, description: "Absolute http/https URL" }
        secretLast4:
          type: string
          description: |
            Last 4 chars of the HMAC-SHA256 signing secret (`****` if shorter than 4).
            Full secret is never returned — operator must manage rotation via the
            UPDATE endpoint or external secret manager.
        events:
          type: array
          description: "Empty array → subscribes to all known event types."
          items: { $ref: "#/components/schemas/WebhookEventType" }
        format:      { $ref: "#/components/schemas/WebhookFormat" }
        enabled:     { type: boolean }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }

    WebhookEndpointCreate:
      type: object
      required: [url, secret]
      properties:
        url:     { type: string, format: uri }
        secret:  { type: string, minLength: 1, description: "HMAC-SHA256 signing key" }
        events:
          type: array
          items: { $ref: "#/components/schemas/WebhookEventType" }
        format:  { $ref: "#/components/schemas/WebhookFormat" }
        enabled: { type: boolean, default: true }

    WebhookEndpointUpdate:
      type: object
      required: [url, secret]
      description: |
        Full replacement — caller must supply current values for fields that should
        not change (URL, secret, events, format, enabled).
      properties:
        url:     { type: string, format: uri }
        secret:  { type: string, minLength: 1 }
        events:
          type: array
          items: { $ref: "#/components/schemas/WebhookEventType" }
        format:  { $ref: "#/components/schemas/WebhookFormat" }
        enabled: { type: boolean }

    ListWebhookEndpointsResponse:
      type: object
      required: [endpoints]
      properties:
        endpoints:
          type: array
          items: { $ref: "#/components/schemas/WebhookEndpoint" }

    WebhookDelivery:
      type: object
      required: [id, endpointId, tenantId, eventType, eventId, attemptCount, nextAttemptAt, succeeded, lastResponseStatus, createdAt]
      properties:
        id:                  { type: string, pattern: "^whd_[A-Z0-9]+$" }
        endpointId:          { type: string }
        tenantId:            { type: string }
        eventType:           { $ref: "#/components/schemas/WebhookEventType" }
        eventId:             { type: string, description: "Source EventBus.Event.ID for cross-reference." }
        payloadBase64:       { type: string, description: "Serialized body (CEF/ECS/JSON), base64-encoded." }
        attemptCount:        { type: integer, description: "0=enqueued, 1..5=actual attempts." }
        lastAttemptedAt:     { type: string, format: date-time }
        nextAttemptAt:       { type: string, format: date-time }
        succeeded:           { type: boolean }
        lastResponseStatus:  { type: integer, description: "HTTP status of last attempt (0 if never attempted)." }
        lastError:           { type: string }
        createdAt:           { type: string, format: date-time }

    ListWebhookDeliveriesResponse:
      type: object
      required: [deliveries]
      properties:
        deliveries:
          type: array
          items: { $ref: "#/components/schemas/WebhookDelivery" }

    # ─── Backup (B7 Stage 2-C) ───────────────────────────────────────────
    BackupMeta:
      type: object
      required: [filename, size, sha256, generatedAt, includesEvidence]
      properties:
        filename:         { type: string, description: "Base name (no path)" }
        size:             { type: integer, format: int64, description: "Archive size in bytes" }
        sha256:           { type: string, description: "Hex digest of the archive" }
        generatedAt:      { type: string, format: date-time, description: "RFC3339Nano UTC" }
        includesEvidence: { type: boolean }

    BackupListResponse:
      type: object
      required: [backups]
      properties:
        backups:
          type: array
          items: { $ref: "#/components/schemas/BackupMeta" }

    # ─── Pack (E12 Stage 3) ──────────────────────────────────────────────
    PackMeta:
      type: object
      required: [id, tenantId, packKey, name, vendor, version, schemaVersion, installedAt, isBuiltin]
      description: |
        벤치마크 팩 메타. checks 미포함 — 자세한 정보는 (후속) GET /api/v1/packs/{id}.
        IsBuiltin=true이면 systemTenant 소속(cross-tenant 공유, §4.2) — built-in seed
        또는 운영자가 명시적으로 system tenant에 install.
      properties:
        id:            { type: string, description: "pack_<ULID>" }
        tenantId:      { type: string, description: "소유 tenant ID — 'system'이면 cross-tenant 공유" }
        packKey:       { type: string, description: "vendor-name-version 합성 unique 키" }
        name:          { type: string }
        vendor:        { type: string }
        version:       { type: string }
        description:   { type: string }
        schemaVersion: { type: integer }
        signerKeyId:   { type: string }
        installedAt:   { type: string, format: date-time }
        isBuiltin:     { type: boolean, description: "true이면 systemTenant 소속(built-in 또는 cross-tenant 공유)" }

    PackListResponse:
      type: object
      required: [packs]
      properties:
        packs:
          type: array
          items: { $ref: "#/components/schemas/PackMeta" }

    PackCheck:
      type: object
      required: [id, checkId, title, severity]
      description: 단일 check 메타 — pack 안의 검사 항목.
      properties:
        id:          { type: string, description: "ck_<ULID>" }
        checkId:     { type: string, description: "팩 내 식별자 (예: CIS-1.1.1.1)" }
        title:       { type: string }
        severity:    { type: string, enum: [low, medium, high, critical] }
        description: { type: string }

    PackDetail:
      allOf:
        - $ref: "#/components/schemas/PackMeta"
        - type: object
          required: [checks]
          properties:
            checks:
              type: array
              description: CheckID 알파벳 정렬
              items: { $ref: "#/components/schemas/PackCheck" }

    CheckDetail:
      allOf:
        - $ref: "#/components/schemas/PackCheck"
        - type: object
          required: [packKey, auditCommand, evaluationRule]
          properties:
            packKey:        { type: string, description: 소속 pack의 packKey }
            auditCommand:   { type: string, description: SSH 실행 명령 (bash 직번역) }
            evaluationRule:
              type: object
              description: 평가 규칙 AST (sealed white-list)
              additionalProperties: true
            rationale:      { type: string, description: 검사 정당성·근거 }
            fixGuidance:    { type: string, description: 수정 가이드 (운영자 친화적 절차) }

    SelftestCase:
      type: object
      required: [name, input, expectedOutcome]
      properties:
        name:   { type: string, description: "케이스 이름 (예: 'passes when stdout contains ** PASS **')" }
        input:
          type: object
          description: SSH 실행 결과 시뮬레이션 (stdout/stderr/exitCode)
          additionalProperties: true
        expectedOutcome: { type: string, enum: [PASS, FAIL, INDETERMINATE, ERROR, SKIPPED] }

    CheckSelftest:
      type: object
      required: [checkId, packKey, cases]
      properties:
        checkId: { type: string }
        packKey: { type: string }
        cases:
          type: array
          items: { $ref: "#/components/schemas/SelftestCase" }

    # ─── Webhook test (E29) ──────────────────────────────────────────────
    WebhookTestResponse:
      type: object
      required: [success, status, latencyMs]
      description: |
        Result of a one-off ping. `success=true` iff the upstream returned a 2xx
        status. Transport-level failures (DNS, TLS, timeout) populate `error` with
        a human-readable message and leave `status=0`.
      properties:
        success:   { type: boolean }
        status:    { type: integer, description: "HTTP status (0 if transport error)" }
        error:     { type: string,  description: "Transport or upstream error message" }
        latencyMs: { type: integer, format: int64, description: "Round-trip time in milliseconds" }

    # ─── SSO (E20) ───────────────────────────────────────────────────────
    SSOProviderType:
      type: string
      description: |
        Provider protocol type. `oidc` uses Authorization Code + PKCE; `saml` uses
        SP-initiated HTTP-POST binding.
      enum: [oidc, saml]

    SSOProvider:
      type: object
      required: [id, type, name, enabled, config, createdAt, updatedAt]
      properties:
        id:        { type: string }
        type:      { $ref: "#/components/schemas/SSOProviderType" }
        name:      { type: string, description: "Operator-visible label, unique within tenant" }
        enabled:   { type: boolean }
        config:
          description: |
            Provider-specific configuration document. For `oidc`: issuer, clientId,
            clientSecret, redirectUri, scopes. For `saml`: entityId, ssoUrl,
            certificate. Schema is enforced by the domain validator at create/update.
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SSOProviderCreate:
      type: object
      required: [type, name, enabled, config]
      properties:
        type:    { $ref: "#/components/schemas/SSOProviderType" }
        name:    { type: string, minLength: 1 }
        enabled: { type: boolean }
        config:
          type: object
          additionalProperties: true

    SSOProviderUpdate:
      type: object
      description: |
        All fields optional. `config`, when present, fully replaces the existing
        document. Omitted fields leave the current value untouched.
      properties:
        name:    { type: string }
        enabled: { type: boolean }
        config:
          type: object
          additionalProperties: true

    ListSSOProvidersResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items: { $ref: "#/components/schemas/SSOProvider" }

    SSOStartLoginResponse:
      type: object
      required: [state, providerId]
      description: |
        Returned only when the OIDC client is not configured (scaffold) or for SAML.
        For configured OIDC, the server responds with 302 instead.
      properties:
        state:       { type: string, description: "Opaque attempt identifier (CSRF + replay binding)" }
        redirectUrl: { type: string, description: "IdP authorization endpoint URL (empty in scaffold)" }
        providerId:  { type: string }
        stub:        { type: boolean, description: "True when the response is from scaffold mode" }

    SSOCallbackResponse:
      type: object
      required: [state]
      properties:
        state:   { type: string }
        subject: { type: string, description: "External identity subject (sub claim / NameID)" }
        email:   { type: string, format: email }
        userId:  { type: string, description: "Mapped local user ID (empty if mapping not yet performed)" }
        stub:    { type: boolean, description: "True when no IdP client/SAML adapter is configured" }

    # ─── Invitation (E21) ────────────────────────────────────────────────
    Invitation:
      type: object
      required: [id, email, roleName, invitedBy, expiresAt, createdAt]
      description: |
        Invitation metadata. The token itself is **never** returned by list/get —
        it is exposed only in the create response and must be transported out-of-band.
      properties:
        id:         { type: string }
        email:      { type: string, format: email }
        roleName:   { type: string, description: "admin | auditor | operator | <custom>" }
        invitedBy:  { type: string, description: "User ID of the issuer" }
        expiresAt:  { type: string, format: date-time }
        acceptedAt: { type: string, format: date-time }
        acceptedBy: { type: string, description: "Resolved user ID once accepted" }
        createdAt:  { type: string, format: date-time }

    ListInvitationsResponse:
      type: object
      required: [invitations]
      properties:
        invitations:
          type: array
          items: { $ref: "#/components/schemas/Invitation" }

    InvitationCreateRequest:
      type: object
      required: [email, roleName]
      properties:
        email:          { type: string, format: email }
        roleName:       { type: string, minLength: 1 }
        expiresInHours: { type: integer, minimum: 0, description: "0 → server default (7 days)" }

    InvitationCreateResponse:
      allOf:
        - $ref: "#/components/schemas/Invitation"
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: |
                Single-use cryptographic token. Returned only on creation — store and
                transport out-of-band. Server retains only the hash (token cannot be
                recovered later).

    InvitationCapabilityResponse:
      type: object
      required: [email, roleName, expiresAt, accepted]
      description: Minimal preview shown on the accept page. The token itself is in the path.
      properties:
        email:     { type: string, format: email }
        roleName:  { type: string }
        expiresAt: { type: string, format: date-time }
        accepted:  { type: boolean }

    InvitationAcceptRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:       { type: string, format: email, description: "Must equal the invited email" }
        password:    { type: string, format: password, minLength: 8 }
        displayName: { type: string, minLength: 1 }

    InvitationAcceptResponse:
      type: object
      required: [userId, email, displayName, roles]
      description: |
        Returned after successful accept. **No auth tokens are issued** — the user must
        call `/auth/login` separately to obtain access/refresh tokens.
      properties:
        userId:      { type: string }
        email:       { type: string, format: email }
        displayName: { type: string }
        roles:
          type: array
          items: { type: string }
