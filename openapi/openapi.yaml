openapi: 3.1.0

info:
  title: rosshield API
  version: 0.0.1
  summary: ROS2 Fleet Security Audit Platform API
  description: |
    Skeleton spec for Phase 0. Contract-first ÔÇö server handlers, client SDKs,
    and CLI command shapes are generated from this document. See
    `docs/design/05-api-and-auth.md` for the full design.

    Status: v1 under design. No operation here is considered stable.
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  - url: http://127.0.0.1:8080
    description: Local desktop / development
  - url: https://{host}
    description: On-prem or appliance
    variables:
      host:
        default: rosshield.example.internal

tags:
  - { name: health,     description: Liveness / readiness probes }
  - { name: auth,       description: Authentication and session }
  - { name: tenant,     description: Tenant, user, role management }
  - { name: fleet,      description: Fleet groupings and policies }
  - { name: robot,      description: Robot inventory and credentials }
  - { name: benchmark,  description: Signed benchmark packs }
  - { name: scan,       description: Scan sessions and results }
  - { name: evidence,   description: Raw evidence records }
  - { name: insight,    description: Drift, anomaly, root cause }
  - { name: advisor,    description: LLM-backed explanations (opt-in) }
  - { name: compliance, description: Framework mappings and scores }
  - { name: reporting,  description: Signed reports }
  - { name: audit,      description: Hash-chained audit log }

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealthz
      security: []
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              example:
                status: ok

  /readyz:
    get:
      tags: [health]
      operationId: getReadyz
      security: []
      summary: Readiness probe
      description: Returns 200 only after DB, event bus, and pack index are ready.
      x-status: todo
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []
      summary: Local credential login
      description: |
        Dual mode (C6):
          - `X-Cookie-Auth: true` Ôćĺ refresh tokenýŁÇ ýŁĹŰőÁ Ű│ŞŰČŞýŚÉýäť ýáťýÖŞŰÉśŕ│á
            HttpOnly `rosshield_refresh` cookieŰíť ýćíýÂť (Web Console).
          - ÝŚĄŰŹö ŰÂÇý×Č Ôćĺ Ű│ŞŰČŞýŚÉ refresh token ÝĆČÝĽĘ (CLI legacy ÝśŞÝÖś).
      x-status: todo
      parameters:
        - in: header
          name: X-Cookie-Auth
          schema: { type: string, enum: ["true"] }
          description: Set to `true` to receive refresh token via HttpOnly cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly refresh cookie (only when X-Cookie-Auth is true).
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:  { type: string }
                  refreshToken: { type: string, description: "Omitted in cookie mode." }
                  user:
                    type: object
                    properties:
                      id:          { type: string }
                      email:       { type: string }
                      displayName: { type: string }
                      tenantId:    { type: string }
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      operationId: refreshAuth
      security: []
      summary: Rotate access token using refresh token
      description: |
        Dual mode (C6): cookie ýÜ░ýäá Ôćĺ Ű│ŞŰČŞ fallback.
          - Web Console (`X-Cookie-Auth: true`) Ôćĺ HttpOnly cookieýŚÉýäť refresh ýÂöýÂť,
            ýâł refreshŰą╝ ŰőĄýőť cookieŰíť ýćíýÂť(rotation), Ű│ŞŰČŞýŚÉŰŐö accessŰžî.
          - CLI Ôćĺ Ű│ŞŰČŞ `refreshToken` ýéČýÜę, Ű│ŞŰČŞýŚÉ ýâł refresh ÝĆČÝĽĘ.
        ýőĄÝîĘ(ŰžîŰúî/ýĚĘýćî/ý×ČýéČýÜę ÝâÉýžÇ)ŰŐö Ű¬ĘŰĹÉ 401 + cookie clear.
      x-status: todo
      parameters:
        - in: header
          name: X-Cookie-Auth
          schema: { type: string, enum: ["true"] }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string, description: "Legacy mode (CLI)." }
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              schema: { type: string }
              description: New HttpOnly refresh cookie (cookie mode only).
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:  { type: string }
                  refreshToken: { type: string, description: "Omitted in cookie mode." }
        "401":
          description: Refresh failed (expired/revoked/reuse-detected)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      operationId: logoutAuth
      security: []
      summary: Revoke refresh token and clear cookie
      description: |
        Idempotent. Clears `rosshield_refresh` cookie regardless of token presence.
        Cookie ŰśÉŰŐö Ű│ŞŰČŞ `refreshToken`ýŚÉýäť ÝćáÝü░ýŁä ýÂöýÂťÝĽ┤ ŰĆäŰęöýŁŞ layerŕ░Ç revoke.
      x-status: todo
      parameters:
        - in: header
          name: X-Cookie-Auth
          schema: { type: string, enum: ["true"] }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "204":
          description: No Content (cookie cleared)
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Empty/expired refresh cookie.
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/auth/me:
    get:
      tags: [auth]
      operationId: getCurrentSession
      summary: Current session info
      x-status: todo
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/tenants/current:
    get:
      tags: [tenant]
      operationId: getCurrentTenant
      summary: Current tenant
      x-status: todo
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/robots:
    get:
      tags: [robot]
      operationId: listRobots
      summary: List robots
      x-status: todo
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Sort"
        - { in: query, name: fleetId, schema: { type: string } }
        - { in: query, name: tag,     schema: { type: string } }
        - { in: query, name: q,       schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [robot]
      operationId: createRobot
      summary: Register a robot
      x-status: todo
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/robots/{robotId}:
    parameters:
      - { in: path, name: robotId, required: true, schema: { type: string, pattern: "^ro_[A-Z0-9]+$" } }
    get:
      tags: [robot]
      operationId: getRobot
      summary: Get a robot
      x-status: todo
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/scans:
    get:
      tags: [scan]
      operationId: listScans
      summary: List scan sessions
      x-status: todo
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - { in: query, name: status,  schema: { type: string } }
        - { in: query, name: fleetId, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [scan]
      operationId: createScan
      summary: Start a new scan session
      x-status: todo
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/reports/{reportId}:verify:
    post:
      tags: [reporting]
      operationId: verifyReport
      summary: Verify the signature of a report
      x-status: todo
      parameters:
        - { in: path, name: reportId, required: true, schema: { type: string } }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/audit/head:
    get:
      tags: [audit]
      operationId: getAuditHead
      summary: Current hash-chain head
      x-status: todo
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/audit/verify:
    post:
      tags: [audit]
      operationId: verifyAuditChain
      summary: Verify a range of the audit chain (external verifier)
      x-status: todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from: { type: string, format: date-time }
                to:   { type: string, format: date-time }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # E17 (Phase 2) ÔÇö Insight ŰĆäŰęöýŁŞ ÝĹťŰę┤.
  /api/v1/insights:
    get:
      tags: [insight]
      operationId: listInsights
      summary: List active (non-dismissed) insights
      x-status: phase2
      parameters:
        - $ref: "#/components/parameters/Limit"
        - { in: query, name: kind,     schema: { type: string, enum: [drift, anomaly, peer, root_cause, prediction] } }
        - { in: query, name: severity, schema: { type: string, enum: [info, low, medium, high, critical] } }
        - { in: query, name: robotId,  schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/insights/{insightId}:dismiss:
    post:
      tags: [insight]
      operationId: dismissInsight
      summary: Mark an insight as dismissed
      x-status: phase2
      parameters:
        - { in: path, name: insightId, required: true, schema: { type: string, pattern: "^ins_[A-Z0-9]+$" } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 1, maxLength: 500 }
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/fleets/{fleetId}/insights:run:
    post:
      tags: [insight]
      operationId: runFleetInsights
      summary: Trigger insight detectors for a fleet (drift/anomaly/peer)
      description: |
        Manually runs the insight pipeline for the given fleet. E19 will subscribe
        this to scan.completed events for automation; this endpoint remains for
        on-demand recompute.
      x-status: phase2
      parameters:
        - { in: path, name: fleetId, required: true, schema: { type: string } }
      responses:
        "200":
          description: Detectors ran (may produce 0 insights if no history)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # E17 (Phase 2) ÔÇö Compliance ŰĆäŰęöýŁŞ ÝĹťŰę┤.
  /api/v1/compliance/profiles:
    get:
      tags: [compliance]
      operationId: listComplianceProfiles
      summary: List compliance profiles for the current tenant
      x-status: phase2
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [compliance]
      operationId: createComplianceProfile
      summary: Activate a compliance framework
      x-status: phase2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [framework, frameworkVersion]
              properties:
                framework:        { type: string, enum: [isms-p, iso27001-2022, nist-800-53-rev5] }
                frameworkVersion: { type: string }
                enabled:          { type: boolean, default: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/compliance/profiles/{profileId}/snapshots:
    parameters:
      - { in: path, name: profileId, required: true, schema: { type: string, pattern: "^cp_[A-Z0-9]+$" } }
    get:
      tags: [compliance]
      operationId: listComplianceSnapshots
      summary: List snapshots for a profile (created_at DESC)
      x-status: phase2
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [compliance]
      operationId: generateComplianceSnapshot
      summary: Generate a snapshot from a scan session
      x-status: phase2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId]
              properties:
                sessionId: { type: string }
      responses:
        "201":
          description: Generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  # E16/E19-3 (Phase 2) ÔÇö Advisor ŰĆäŰęöýŁŞ ÝĹťŰę┤ (LLM ýśÁÝŐŞýŁŞ).
  #
  # LLM providerŕ░Ç noopýŁ┤Űę┤ Ű¬ĘŰôá askŰŐö 503 Service Unavailable (advisor.ErrAdvisorDisabled).
  # ÝÖťýä▒ÝÖö Ű░ęŰ▓Ľ: ýäťŰ▓ä ýőťý×Ĺ ýőť `--llm-provider=ollama|=anthropic`.
  #
  # ÝĽŞŰôĄŰčČŰŐö chi ýžüýáĹ mount (gen.ServerInterface Ű»ŞŕÁČÝśä, gen.Unimplementedŕ░Ç ý×ÉŰĆÖ 501).
  # specýŁÇ ŰČŞýäť┬Ěŕ│äýĽŻ Ű¬ęýáüýť╝ŰíťŰžî ýáĽýŁś.
  /api/v1/advisor/conversations:ask:
    post:
      tags: [advisor]
      operationId: askAdvisor
      summary: Ask the advisor a natural-language question (opt-in)
      description: |
        Starts a new conversation (when conversationId is empty) or appends to an
        existing one. The orchestrator runs an LLM/tool dispatch loop and returns
        the final answer plus the turns produced in this request.

        Returns 503 if the LLM provider is disabled (noop).
      x-status: phase2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                conversationId: { type: string, description: "Empty Ôćĺ new conversation" }
                question:       { type: string, minLength: 1 }
                maxToolCalls:   { type: integer, minimum: 0, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/advisor/conversations:
    get:
      tags: [advisor]
      operationId: listAdvisorConversations
      summary: List the current user's conversations (updated_at DESC)
      x-status: phase2
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

  /api/v1/advisor/conversations/{conversationId}:
    parameters:
      - { in: path, name: conversationId, required: true, schema: { type: string } }
    get:
      tags: [advisor]
      operationId: getAdvisorConversation
      summary: Get a conversation with all its turns (sequence ASC)
      x-status: phase2
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        default:
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by `/api/v1/auth/login` or OIDC/SAML callback
    apiKeyAuth:
      type: http
      scheme: bearer
      description: "API key in `Authorization: Bearer fg_live_...` form"

  parameters:
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
    Cursor:
      in: query
      name: cursor
      schema: { type: string }
    Sort:
      in: query
      name: sort
      description: "Field name; prefix with `-` for descending."
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      description: ULID or UUID. Same key within 24h returns the original response.
      schema: { type: string, minLength: 16, maxLength: 64 }

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, degraded, unavailable] }

    Meta:
      type: object
      required: [requestId]
      properties:
        requestId:     { type: string }
        serverVersion: { type: string }
        responseAt:    { type: string, format: date-time }

    PageMeta:
      type: object
      properties:
        nextCursor:  { type: string, nullable: true }
        prevCursor:  { type: string, nullable: true }
        approxTotal: { type: integer, minimum: 0 }

    Envelope:
      type: object
      required: [ok]
      properties:
        ok:    { type: boolean, const: true }
        value: {}
        meta:  { $ref: "#/components/schemas/Meta" }

    ErrorCategory:
      type: string
      enum:
        - unauthenticated
        - forbidden
        - not_found
        - conflict
        - validation
        - rate_limited
        - upstream
        - internal

    Error:
      type: object
      required: [code, category, message]
      properties:
        code:     { type: string, description: "Dotted code (e.g. `robot.not_found`)" }
        category: { $ref: "#/components/schemas/ErrorCategory" }
        message:  { type: string }
        target:
          type: object
          properties:
            type: { type: string }
            id:   { type: string }
        details:
          type: object
          additionalProperties: true

    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:    { type: boolean, const: false }
        error: { $ref: "#/components/schemas/Error" }
        meta:  { $ref: "#/components/schemas/Meta" }
